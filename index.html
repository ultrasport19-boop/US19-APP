function parseRoutineText(text){
  var lines = text.split("\n");
  var result = {
    name: "",
    clientName: "",
    weeks: 4,
    notes: "",
    days: [] // [{dayIdx, label, exercises:[{name, matchedId, sets, reps, weight, rest}]}]
  };
  var currentDay = null;
  var dayMap = {
    "lunes":0,"lun":0,"monday":0,"mon":0,"l":0,
    "martes":1,"mar":1,"tuesday":1,"tue":1,"m":1,
    "miercoles":2,"miércoles":2,"mie":2,"mié":2,"wednesday":2,"wed":2,"x":2,
    "jueves":3,"jue":3,"thursday":3,"thu":3,"j":3,
    "viernes":4,"vie":4,"friday":4,"fri":4,"v":4,
    "sabado":5,"sábado":5,"sab":5,"sáb":5,"saturday":5,"sat":5,"s":5,
    "domingo":6,"dom":6,"sunday":6,"sun":6,"d":6
  };

  for (var i=0; i<lines.length; i++){
    var line = lines[i].trim();
    if (!line) continue;

    var mName = line.match(/^(?:rutina|nombre|routine|name)\s*[:=]\s*(.+)/i);
    if (mName){ result.name = mName[1].trim(); continue; }

    var mClient = line.match(/^(?:cliente|client|para|alumno)\s*[:=]\s*(.+)/i);
    if (mClient){ result.clientName = mClient[1].trim(); continue; }

    var mWeeks = line.match(/^(?:semanas|weeks|duración|duracion)\s*[:=]\s*(\d+)/i);
    if (mWeeks){ result.weeks = parseInt(mWeeks[1],10); continue; }

    var mNotes = line.match(/^(?:notas?|notes?|obs|observaciones?)\s*[:=]\s*(.+)/i);
    if (mNotes){ result.notes = mNotes[1].trim(); continue; }

    var mDay = line.match(/^(?:d[ií]a\s*(\d)(?:\s*[-–:])?\s*(.*)?|([a-záéíóúñü]+)\s*[-–:]?\s*(.*)?)\s*[:.]?\s*$/i);
    if (mDay){
      var dayWord = null, dayLabel = "";
      if (mDay[1]){
        var dNum = parseInt(mDay[1],10) - 1;
        if (dNum >= 0 && dNum < 7){
          currentDay = { dayIdx: dNum, label: line, exercises: [] };
          result.days.push(currentDay);
          continue;
        }
      }
      if (mDay[3]){
        dayWord = mDay[3].toLowerCase().replace(/[^a-záéíóúñü]/g,"");
        dayLabel = mDay[4] || "";
      }
      if (dayWord && dayMap.hasOwnProperty(dayWord)){
        currentDay = { dayIdx: dayMap[dayWord], label: line.replace(/[:.]$/,"").trim(), exercises: [] };
        result.days.push(currentDay);
        continue;
      }
    }

    if (!currentDay) continue;
    var exLine = line.replace(/^[-*•·\d.)\]]+\s*/, "").trim();
    if (!exLine) continue;

    var parsed = parseExerciseLine(exLine);
    if (parsed){
      parsed.matchedId = fuzzyMatchExercise(parsed.name);
      currentDay.exercises.push(parsed);
    }
  }

  return result;
}

function parseExerciseLine(line){

  var sets = "", reps = "", weight = "", rest = "";

  var sxr = line.match(/(\d+)\s*[xX×]\s*(\d+(?:\s*[-–a]\s*\d+)?)/);
  if (sxr){
    sets = sxr[1];
    reps = sxr[2].replace(/\s/g,"");
  }

  if (!sxr){
    var sxA = line.match(/(\d+)\s*[xX×]\s*(AMRAP|\d+\s*(?:s|seg|sec|min|minutos?))/i);
    if (sxA){
      sets = sxA[1];
      reps = sxA[2].replace(/\s/g,"");
    }
  }

  if (!sets){
    var mSets = line.match(/(\d+)\s*(?:series|sets|s\.)/i);
    if (mSets) sets = mSets[1];
  }
  if (!reps){
    var mReps = line.match(/(\d+(?:\s*[-–a]\s*\d+)?)\s*(?:reps?|repeticiones)/i);
    if (mReps) reps = mReps[1].replace(/\s/g,"");
  }

  var mWeight = line.match(/(\d+(?:[.,]\d+)?)\s*(?:kg|kgs|lb|lbs)/i);
  if (mWeight) weight = mWeight[1].replace(",",".");

  var mRest = line.match(/(?:descanso\s*)?(\d+(?:[.,]\d+)?)\s*(s|seg|sec|segundos)\b/i);
  if (mRest) rest = mRest[1] + "s";
  if (!rest){
    var mRestMin = line.match(/(?:descanso\s*)?(\d+(?:[.,]\d+)?)\s*(min|minutos?|m)\b/i);
    if (mRestMin) rest = mRestMin[1] + "min";
  }
  if (!rest){
    var mRestPlain = line.match(/descanso\s*[:=]?\s*(\d+)/i);
    if (mRestPlain) rest = mRestPlain[1] + "s";
  }

  if (!reps){
    var mTime = line.match(/(\d+\s*(?:s|seg|sec|min|minutos?))\b/i);
    if (mTime && !mWeight) reps = mTime[1].replace(/\s/g,"");
    if (!reps && /amrap/i.test(line)) reps = "AMRAP";
  }

  var name = line;
  name = name.replace(/(\d+\s*[xX×]\s*\d+(?:\s*[-–a]\s*\d+)?)/,"")
    .replace(/(\d+(?:[.,]\d+)?)\s*(?:kg|kgs|lb|lbs)/ig,"")
    .replace(/(?:descanso\s*[:=]?\s*)?\d+\s*(?:s|seg|sec|min|minutos?)\b/ig,"")
    .replace(/(\d+)\s*(?:series|sets|reps?|repeticiones)/ig,"")
    .replace(/\bamrap\b/ig,"")
    .replace(/\bdescanso\b/ig,"")
    .replace(/[·,\-–]+/g," ")
    .replace(/\d+[xX×]/g,"")
    .replace(/\s+\d+\s*$/,"")
    .replace(/\s{2,}/g," ")
    .trim()
    .replace(/\s+[smSM]$/,"");

  if (!name || name.length < 2) return null;

  return {
    name: name,
    sets: sets || "3",
    reps: reps || "10",
    weight: weight,
    rest: rest || "60s"
  };
}

function fuzzyMatchExercise(name){
  if (!name || !state.exercises.length) return "";
  var q = normalizeForMatch(name);
  var best = null, bestScore = 0;

  for (var i=0; i<state.exercises.length; i++){
    var ex = state.exercises[i];
    var target = normalizeForMatch(ex.name);
    var score = fuzzyScore(q, target);
    if (score > bestScore){ bestScore = score; best = ex; }
  }

  if (bestScore >= 0.4 && best) return best.id;
  return "";
}

function normalizeForMatch(s){
  return (s||"").toLowerCase()
    .replace(/[áà]/g,"a").replace(/[éè]/g,"e").replace(/[íì]/g,"i")
    .replace(/[óò]/g,"o").replace(/[úù]/g,"u").replace(/ñ/g,"n")
    .replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," ").trim();
}

var STOP_WORDS = {"de":1,"del":1,"con":1,"a":1,"en":1,"la":1,"el":1,"los":1,"las":1,"una":1,"uno":1,"por":1,"al":1,"y":1,"o":1,"e":1};

function filterStopWords(words){
  return words.filter(function(w){ return w.length > 1 && !STOP_WORDS[w]; });
}

function wordStem(w){
  if (w.length <= 3) return w;
  return w.replace(/(es|as|os|s)$/, "");
}

function fuzzyScore(query, target){
  if (!query || !target) return 0;
  if (query === target) return 1;
  if (target.indexOf(query) >= 0) return 0.9;
  if (query.indexOf(target) >= 0) return 0.85;

  var qWords = filterStopWords(query.split(" ").filter(Boolean));
  var tWords = filterStopWords(target.split(" ").filter(Boolean));
  if (!qWords.length) qWords = query.split(" ").filter(Boolean);
  if (!tWords.length) tWords = target.split(" ").filter(Boolean);
  if (!qWords.length || !tWords.length) return 0;

  var matches = 0;
  for (var i=0; i<qWords.length; i++){
    var qw = qWords[i];
    var qs = wordStem(qw);
    var bestWordScore = 0;
    for (var j=0; j<tWords.length; j++){
      var tw = tWords[j];
      var ts = wordStem(tw);
      if (qw === tw){ bestWordScore = 1; break; }
      if (qs === ts){ bestWordScore = Math.max(bestWordScore, 0.95); continue; }
      if (qw.length >= 3 && tw.length >= 3){
        if (tw.indexOf(qw) >= 0 || qw.indexOf(tw) >= 0){ bestWordScore = Math.max(bestWordScore, 0.8); continue; }
        if (ts.indexOf(qs) >= 0 || qs.indexOf(ts) >= 0){ bestWordScore = Math.max(bestWordScore, 0.75); continue; }
      }
    }
    matches += bestWordScore;
  }

  var precision = qWords.length > 0 ? matches / qWords.length : 0;
  var recall = tWords.length > 0 ? matches / tWords.length : 0;
  return precision * 0.7 + recall * 0.3;
}

function createFromTextImport(){

    var text = document.getElementById("ti-text").value;
    if (!text.trim()){ toast("Escribe la rutina primero","error"); return; }
    parsed = parseRoutineText(text);
  }
  if (!parsed.days.length){ toast("No se detectaron días","error"); return; }

  var clientId = "";
  if (parsed.clientName){
    var cn = parsed.clientName.toLowerCase();
    for (var c=0; c<state.clients.length; c++){
      if (state.clients[c].name.toLowerCase().indexOf(cn) >= 0 || cn.indexOf(state.clients[c].name.toLowerCase()) >= 0){
        clientId = state.clients[c].id;
        break;
      }
    }
  }

  var days = [];
  for (var d=0; d<7; d++) days.push({ day: d+1, exercises: [] });

  for (var di=0; di<parsed.days.length; di++){
    var pDay = parsed.days[di];
    var dayIdx = pDay.dayIdx;
    if (dayIdx < 0 || dayIdx > 6) continue;

    for (var ei=0; ei<pDay.exercises.length; ei++){
      var pEx = pDay.exercises[ei];
      var exId = pEx.matchedId;

      if (!exId){
        var newEx = {
          id: genId(),
          name: pEx.name,
          muscle: "",
          equipment: "",
          desc: "",
          gif: ""
        };
        state.exercises.push(newEx);
        exId = newEx.id;
      }

      days[dayIdx].exercises.push({
        exerciseId: exId,
        sets: pEx.sets || "3",
        reps: pEx.reps || "10",
        weight: pEx.weight || "",
        rest: pEx.rest || "60s",
        notes: ""
      });
    }
  }

  var routine = {
    id: genId(),
    name: parsed.name || "Rutina importada",
    clientId: clientId,
    weeks: parsed.weeks || 4,
    startDate: "",
    notes: parsed.notes || "",
    status: "active",
    days: days,
    createdAt: Date.now(),
    updatedAt: Date.now()
  };

  state.routines.push(routine);
  saveState();
  closeModal();
  window._lastParsedImport = null;

  var matchedCount = 0, newCount = 0;
  for (var x=0; x<parsed.days.length; x++){
    for (var y=0; y<parsed.days[x].exercises.length; y++){
      if (parsed.days[x].exercises[y].matchedId) matchedCount++;
      else newCount++;
    }
  }

  toast("Rutina creada: " + (matchedCount+newCount) + " ejercicios" + (newCount ? " ("+newCount+" nuevos)" : ""), "success");
  openRoutineBuilder(routine.id);
}

function parseExerciseImportText(text){
  var lines = text.split("\n");
  var rows = [];
  var validMuscles = {
    "pecho":"Pecho","espalda":"Espalda","hombro":"Hombro","hombros":"Hombro",
    "brazo":"Brazo","brazos":"Brazo","biceps":"Brazo","bíceps":"Brazo","triceps":"Brazo","tríceps":"Brazo",
    "pierna":"Pierna","piernas":"Pierna","cuadriceps":"Pierna","cuádriceps":"Pierna","femoral":"Pierna","gemelos":"Pierna","pantorrilla":"Pierna",
    "gluteo":"Glúteo","glúteo":"Glúteo","gluteos":"Glúteo","glúteos":"Glúteo",
    "core":"Core","abdomen":"Core","abdominales":"Core","abs":"Core",
    "cardio":"Cardio","movilidad":"Movilidad","estiramiento":"Movilidad"
  };

  for (var i=0; i<lines.length; i++){
    var raw = lines[i].trim();
    if (!raw) continue;
    // Strip leading bullets/numbers
    raw = raw.replace(/^[-*•·]+\s*/, "").replace(/^\d+[.)]\s*/, "");
    if (!raw) continue;

    var parts = raw.split("|").map(function(p){ return p.trim(); });
    var name = parts[0] || "";
    if (!name) continue;

    var rawMuscle = parts[1] || "";
    var muscleKey = rawMuscle.toLowerCase().replace(/[^a-záéíóúñü]/g,"");
    var muscle = validMuscles[muscleKey] || (rawMuscle ? rawMuscle : "");

    var equipment = parts[2] || "";
    var gif = parts[3] || "";
    // Validate gif URL loosely
    var gifValid = gif && /^https?:\/\//i.test(gif);

    // Check duplicate by name (case-insensitive)
    var exists = false;
    for (var k=0; k<state.exercises.length; k++){
      if ((state.exercises[k].name||"").trim().toLowerCase() === name.toLowerCase()){ exists = true; break; }
    }

    rows.push({
      name: name,
      muscle: muscle,
      equipment: equipment,
      gif: gifValid ? gif : "",
      gifInvalid: gif && !gifValid,
      duplicate: exists
    });
  }
  return rows;
}

function renderLibraryGrid(){

  var q = (_libFilter.search||"").trim().toLowerCase();

  var filtered = state.exercises.filter(function(e){
    if (muscle){
      if (muscle === "terap:"){ if (!e.terap) return false; }
      else if (muscle.indexOf("terap:") === 0){ if (e.terap !== muscle.slice(6)) return false; }
      else if (muscle === "contr:"){ if (!e.contr) return false; }
      else if (muscle.indexOf("contr:") === 0){ if (e.contr !== muscle.slice(6)) return false; }

function deleteExercise(id){
  var e = getExercise(id);
  if (!e) return;
  var usages = 0;
  for (var i=0;i<state.routines.length;i++){
    var r = state.routines[i];
    if (!r.days) continue;
    for (var j=0;j<r.days.length;j++){
      var d = r.days[j];
      if (!d.exercises) continue;
      for (var k=0;k<d.exercises.length;k++){
        if (d.exercises[k].exerciseId === id) usages++;
      }
    }
  }
  var msg = '<p>¿Eliminar el ejercicio <strong>'+escapeHtml(e.name)+'</strong>?</p>';
  if (usages){
    msg += '<p class="text-sm text-muted" style="margin-top:.5rem;">Se usa '+usages+' vez/veces en tus rutinas. Se mantendrá la fila pero quedará marcada como ejercicio desconocido.</p>';
  }
  openModal({
    title:"Eliminar ejercicio",
    bodyHtml: msg,
    footer:[
      { label:"Cancelar", cls:"btn-ghost" },
      { label:"Eliminar", cls:"btn-danger", onClick: function(){
        state.exercises = state.exercises.filter(function(x){ return x.id !== id; });
        saveState();
        closeModal();
        renderLibraryGrid();
        toast("Ejercicio eliminado","success");
      }}
    ]
  });
}

function buildShareData(routine){
  var client = getClient(routine.clientId);
  var usedExIds = {};
  if (routine.days){
    for (var i=0;i<routine.days.length;i++){
      var d = routine.days[i];
      if (!d.exercises) continue;
      for (var j=0;j<d.exercises.length;j++){
        if (d.exercises[j].exerciseId) usedExIds[d.exercises[j].exerciseId] = true;
      }
    }
  }
  var skippedHeavy = 0;
  var exercises = [];
  for (var id in usedExIds){
    var ex = getExercise(id);
    if (!ex) continue;
    var copy = {
      id: ex.id,
      name: ex.name,
      muscle: ex.muscle || "",
      equipment: ex.equipment || "",
      desc: ex.desc || "",
      gif: ex.gif || ""
    };
    if (copy.gif && copy.gif.indexOf("data:") === 0){
      copy.gif = "";
      skippedHeavy++;
    }
    exercises.push(copy);
  }
  return {
    type: "routine",
    v: 1,
    routine: {
      id: routine.id,
      name: routine.name || "",
      clientId: routine.clientId || "",
      weeks: routine.weeks || 4,
      startDate: routine.startDate || "",
      notes: routine.notes || "",
      days: routine.days || []
    },
    client: client ? { id: client.id, name: client.name } : null,
    exercises: exercises,
    skippedHeavy: skippedHeavy,
    sharedAt: Date.now()
  };
}

function encodeShareData(data){
  var json = JSON.stringify(data);
  var compressed = LZString.compressToEncodedURIComponent(json);
  return "c1:" + compressed;
}

function decodeShareData(str){
  if (!str) return null;
  if (str.indexOf("c1:") === 0){
    var raw = str.slice(3);
    var json = LZString.decompressFromEncodedURIComponent(raw);
    if (!json) throw new Error("decompress failed");
    return JSON.parse(json);
  }
  try {
    var decoded = atob(decodeURIComponent(str));
    return JSON.parse(decoded);
  } catch(e){
    var json2 = LZString.decompressFromEncodedURIComponent(str);
    if (json2) return JSON.parse(json2);
    throw new Error("Formato no reconocido");
  }
}

function generateQrSvg(text, size){
  size = size || 240;
  var qr = null;
  for (var t = 4; t <= 40; t++){
    try {
      var q = qrcode(t, "M");
      q.addData(text);
      q.make();
      qr = q;
      break;
    } catch(e){ continue; }
  }
  if (!qr){
    try { qr = qrcode(40, "L"); qr.addData(text); qr.make(); }
    catch(e){ throw new Error("Texto demasiado largo para QR"); }
  }
  var moduleCount = qr.getModuleCount();
  var cellSize = Math.max(2, Math.floor(size / moduleCount));
  var actualSize = cellSize * moduleCount;
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="'+actualSize+'" height="'+actualSize+'" viewBox="0 0 '+actualSize+' '+actualSize+'" shape-rendering="crispEdges">';
  svg += '<rect width="100%" height="100%" fill="#ffffff"/>';
  var path = '';
  for (var r=0; r<moduleCount; r++){
    for (var c=0; c<moduleCount; c++){
      if (qr.isDark(r, c)){
        path += 'M' + (c*cellSize) + ',' + (r*cellSize) + 'h' + cellSize + 'v' + cellSize + 'h-' + cellSize + 'z';
      }
    }
  }
  svg += '<path fill="#0b1014" d="'+path+'"/>';
  svg += '</svg>';
  return { svg: svg, size: actualSize };
}

function getGitHubConfig(){
  if (!settings.githubToken || !settings.githubRepo) return null;
  var parts = settings.githubRepo.split("/");
  if (parts.length !== 2) return null;
  return {
    owner: parts[0],
    repo: parts[1],
    branch: settings.githubBranch || "main",
    token: settings.githubToken
  };
}

function uploadToCloud(data, prefix){
  var cfg = getGitHubConfig();
  if (!cfg) return Promise.reject(new Error("GitHub no configurado"));
  var repoFull = (getDerivedRepo() || (cfg.owner + "/" + cfg.repo));
  prefix = prefix || "r";
  var fileId = (prefix === "p" ? "p" : "r") + "_" + Date.now().toString(36) + "_" + genId();
  var path = "data/" + fileId + ".json";
  var json = JSON.stringify(data);
  var b64 = btoa(unescape(encodeURIComponent(json)));
  var url = "https://api.github.com/repos/"+repoFull+"/contents/"+path;
  return ensureDataBranch(repoFull, cfg.token).then(function(){
    return fetch(url, {
      method: "PUT",
      headers: {
        "Authorization": "token " + cfg.token,
        "Accept": "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "ultrasport19: upload " + fileId,
        content: b64,
        branch: DATA_BRANCH
      })
    });
  }).then(function(res){
    if (!res.ok) return res.text().then(function(t){ throw new Error("GitHub: "+res.status+" "+t.slice(0,200)); });
    return { fileId: fileId, path: path };
  });
}

function downloadFromCloud(fileId, cfg){

function shortenWithBitlyToken(longUrl, token, domain){
  var realToken = unmaskToken(token || "");
  if (!realToken) return Promise.reject(new Error("Sin token Bitly"));
  var body = { long_url: longUrl };
  if (domain && domain !== "bit.ly") body.domain = domain;
  return fetch("https://api-ssl.bitly.com/v4/shorten", {
    method: "POST",
    headers: { "Authorization": "Bearer " + realToken, "Content-Type": "application/json" },
    body: JSON.stringify(body)
  }).then(function(res){
    if (!res.ok) return res.text().then(function(t){ throw new Error("Bitly " + res.status); });
    return res.json();
  }).then(function(d){ return d.link || ""; });
}

function shortenWithBitly(longUrl){
  if (!settings.bitlyToken) return Promise.reject(new Error("Bitly no configurado"));
  var body = { long_url: longUrl };
  if (settings.bitlyDomain && settings.bitlyDomain !== "bit.ly") body.domain = settings.bitlyDomain;
  return fetch("https://api-ssl.bitly.com/v4/shorten", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + settings.bitlyToken,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  }).then(function(res){
    if (!res.ok) return res.text().then(function(t){ throw new Error("Bitly " + res.status + ": " + t.slice(0,120)); });
    return res.json();
  }).then(function(data){
    if (!data.link) throw new Error("Bitly no devolvió link");
    return data.link; // e.g. "https://bit.ly/XXXXX"
  });
}

function copyToClipboard(text){
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){ toast("Link copiado","success"); })
    .catch(function(){ legacyCopy(text); });
  } else legacyCopy(text);
}
function legacyCopy(text){
  var ta = document.createElement("textarea");
  ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); toast("Link copiado","success"); }
  catch(e){ toast("No se pudo copiar","error"); }
  document.body.removeChild(ta);
}

function downloadQrPng(url, filename, sizePx){
  sizePx = sizePx || 600;
  try {
    var qr = generateQrSvg(url, sizePx);
    var canvas = document.createElement("canvas");
    canvas.width = sizePx; canvas.height = sizePx;
    var ctx = canvas.getContext("2d");
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, sizePx, sizePx);
    var img = new Image();
    var svgBlob = new Blob([qr.svg], { type:"image/svg+xml;charset=utf-8" });
    var urlObj = URL.createObjectURL(svgBlob);
    img.onload = function(){
      ctx.drawImage(img, 0, 0, sizePx, sizePx);
      URL.revokeObjectURL(urlObj);
      canvas.toBlob(function(blob){
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = (filename||"qr") + ".png";
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
        toast("QR descargado","success");
      }, "image/png");
    };
    img.onerror = function(){ toast("No se pudo descargar el QR","error"); URL.revokeObjectURL(urlObj); };
    img.src = urlObj;
  } catch(e){
    toast("Error: " + e.message, "error");
  }
}

function computeSessionStats(r, progress){
  var totalSets=0, doneSets=0, partialSets=0, exStats=[];
  for (var di=0; di<7; di++){
    var day = r.days[di];
    if (!day || !day.exercises || !day.exercises.length) continue;
    for (var ei=0; ei<day.exercises.length; ei++){
      var rowEx = day.exercises[ei];
      var setsCount = parseInt(rowEx.sets,10) || 1;
      var exDone=0, exPartial=0;
      for (var s=0; s<setsCount; s++){
        totalSets++;
        var p = progress[di+":"+ei+":"+s] || {};
        if (p.done){ doneSets++; exDone++; }
        else if (p.reps||p.weight||p.rpe||p.eva){ partialSets++; exPartial++; }
      }
      exStats.push({ dayIdx:di, exIdx:ei, exId:rowEx.exerciseId, setsCount:setsCount, done:exDone, partial:exPartial });
    }
  }
  var pct = totalSets ? Math.round(doneSets*100/totalSets) : 0;
  return { total:totalSets, done:doneSets, partial:partialSets, pct:pct, exStats:exStats };
}

function buildExerciseBlock(shareData, r, di, ei, progress){

    if (p.done) doneCt++;

  }
  var exStatus = doneCt===setsCount ? "done" : (doneCt>0||partialCt>0 ? "partial" : "pending");

    +'<h4>'+escapeHtml(name)+'</h4>'

    +(def&&def.muscle?'<span class="badge green">'+escapeHtml(def.muscle)+'</span>':'')

    +'</div></div>';

  html += '</div>';

function splitIntoBullets(desc){
  if (!desc) return [];
  var parts = desc.split(/\.\s+/).map(function(s){ return s.trim().replace(/\.$/, ""); }).filter(Boolean);
  if (parts.length > 4) parts = parts.slice(0,4);
  if (parts.length < 2) parts = desc.split(/,\s+/).map(function(s){ return s.trim(); }).filter(Boolean).slice(0,4);
  if (!parts.length) parts = [desc.trim()];
  return parts;
}

function bindClientInputs(){
  var inputs = document.querySelectorAll("#view-client [data-set-key]");
  for (var i=0; i<inputs.length; i++){
    var ev = inputs[i].type==="checkbox" ? "change" : "input";
    inputs[i].addEventListener(ev, onSetInput);
  }
  var di = document.getElementById("session-date-input");
  if (di) di.addEventListener("change", function(){ try { localStorage.setItem(_clientProgressKey+"_date", this.value); } catch(e){} });
  var ni = document.getElementById("session-notes-input");
  if (ni) ni.addEventListener("input", function(){ try { localStorage.setItem(_clientProgressKey+"_notes", this.value); } catch(e){} });
  var hs = document.getElementById("hist-ex-select");
  if (hs){ hs.addEventListener("change", drawHistChart); drawHistChart(); }
  var hm = document.getElementById("hist-metric-select");
  if (hm) hm.addEventListener("change", drawHistChart);
}

function onSetInput(){
  var key = this.getAttribute("data-set-key");
  var field = this.getAttribute("data-field");
  var val = this.type==="checkbox" ? this.checked : this.value;
  var progress = loadProgress();
  if (field==="comment"){
    progress[key] = val;
  } else {
    if (!progress[key]) progress[key] = {};
    progress[key][field] = val;
  }
  saveProgress(progress);
  if (field!=="comment"){
    updateSetRowStyle(key, progress[key]);
    updateExerciseBlockStatus(key, progress);
    updateGlobalProgressBar();
    updateSummaryChecklist(progress);
  }
}

function updateSetRowStyle(key, p){
  var row = document.getElementById("setrow-"+key);
  if (!row) return;
  row.className = p.done ? "set-done" : ((p.reps||p.weight||p.rpe||p.eva) ? "set-partial" : "");
}

function updateExerciseBlockStatus(key, progress){
  var parts = key.split(":");
  if (parts.length < 2) return;
  var di=parseInt(parts[0],10), ei=parseInt(parts[1],10);
  var r = _clientShareData.routine;
  var day = r.days[di];
  if (!day||!day.exercises) return;
  var rowEx = day.exercises[ei];
  var setsCount = parseInt(rowEx&&rowEx.sets||"1",10)||1;
  var doneCt=0, partialCt=0;
  for (var s=0; s<setsCount; s++){
    var p = progress[di+":"+ei+":"+s] || {};
    if (p.done) doneCt++;
    else if (p.reps||p.weight||p.rpe||p.eva) partialCt++;
  }
  var status = doneCt===setsCount?"done":(doneCt>0||partialCt>0?"partial":"pending");
  var statusLabels = {done:"✓ Completado",partial:"En progreso",pending:"Pendiente"};
  var pill = document.querySelector("#exblock-"+di+"-"+ei+" .status-pill");
  if (pill){ pill.className="status-pill "+status; pill.textContent=statusLabels[status]; }
}

function updateGlobalProgressBar(){
  if (!_clientShareData) return;
  var progress = loadProgress();
  var stats = computeSessionStats(_clientShareData.routine, progress);
  var fill = document.getElementById("client-prog-fill");
  var label = document.getElementById("client-pct-label");
  var detail = document.getElementById("client-prog-detail");
  if (fill) fill.style.width = stats.pct+"%";
  if (label) label.textContent = stats.pct+"% completado";
  if (detail) detail.textContent = stats.done+" sets completados · "+stats.partial+" parciales · "+(stats.total-stats.done-stats.partial)+" pendientes";
}

function updateSummaryChecklist(progress){
  if (!_clientShareData) return;
  var stats = computeSessionStats(_clientShareData.routine, progress);
  var rows = document.querySelectorAll(".checklist-row");
  for (var i=0; i<rows.length && i<stats.exStats.length; i++){
    var es = stats.exStats[i];
    var status = es.done===es.setsCount?"done":(es.done>0||es.partial>0?"partial":"pending");
    var icon = {done:"✓",partial:"◑",pending:"○"}[status];
    var ci = rows[i].querySelector(".ci");
    var sc = rows[i].querySelector(".sets-cl");
    if (ci){ ci.className="ci "+status; ci.textContent=icon; }
    if (sc) sc.textContent = es.done+"/"+es.setsCount+" sets";
  }
  var vals = document.querySelectorAll(".summary-stat .val");
  if (vals.length>=3){
    vals[0].textContent=stats.done; vals[1].textContent=stats.partial;
    vals[2].textContent=stats.total-stats.done-stats.partial;
  }
  var pb = document.querySelector(".session-summary .progress-bar-fill");
  if (pb) pb.style.width = stats.pct+"%";
  var pctEl = document.querySelector(".session-summary .progress-pct");
  if (pctEl){ pctEl.textContent=stats.pct+"%"; pctEl.className="progress-pct "+(stats.pct>=80?"high":stats.pct>=40?"mid":"low"); }
}

window.openResetProgressModal = function(){
  if (!_clientShareData) return;
  var r = _clientShareData.routine;
  var progress = loadProgress();

  // Compute per-day stats
  var dayStats = [];
  for (var di=0; di<7; di++){
    var day = r.days[di];
    if (!day || !day.exercises || !day.exercises.length){ dayStats.push(null); continue; }
    var totalSets=0, doneSets=0, partialSets=0;
    for (var ei=0; ei<day.exercises.length; ei++){
      var setsCount = parseInt(day.exercises[ei].sets,10) || 1;
      for (var s=0; s<setsCount; s++){
        totalSets++;
        var p = progress[di+":"+ei+":"+s] || {};
        if (p.done) doneSets++;
        else if (p.reps||p.weight||p.rpe||p.eva) partialSets++;
      }
    }
    dayStats.push({total:totalSets, done:doneSets, partial:partialSets, hasData:doneSets>0||partialSets>0});
  }

  var bodyHtml = '<p style="margin-bottom:1rem;">Selecciona los días que quieres reiniciar. Se borrarán todos los datos registrados (reps, peso, RPE, checks, notas) de los días marcados.</p>';

  // Select all checkbox
  bodyHtml += '<div style="margin-bottom:.8rem;padding-bottom:.6rem;border-bottom:1px solid var(--border);">'
    + '<label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-weight:700;font-size:.9rem;">'
    + '<input type="checkbox" id="reset-all" style="width:20px;height:20px;accent-color:var(--accent);" onchange="toggleResetAll(this.checked)">'
    + ' Seleccionar todos</label></div>';

  // Day checkboxes
  for (var d=0; d<7; d++){
    var ds = dayStats[d];
    if (!ds) continue;
    var pct = ds.total ? Math.round(ds.done*100/ds.total) : 0;
    var pctColor = pct >= 80 ? "var(--success)" : pct >= 1 ? "var(--warn)" : "var(--muted)";
    bodyHtml += '<label style="display:flex;align-items:center;gap:.7rem;padding:.55rem .3rem;border-bottom:1px solid var(--border);cursor:pointer;">'
      + '<input type="checkbox" class="reset-day-cb" data-day="'+d+'" style="width:20px;height:20px;accent-color:var(--accent);"'+(ds.hasData?' checked':'')+'>'
      + '<span style="flex:1;font-weight:600;">'+DAY_NAMES[d]+'</span>'
      + '<span style="font-size:.78rem;color:'+pctColor+';font-family:var(--font-mono);">'
        + ds.done+'/'+ds.total+' sets ('+pct+'%)'
      + '</span>'
      + '</label>';
  }

  // Send progress first option
  bodyHtml += '<div style="margin-top:1rem;padding-top:.8rem;border-top:1px solid var(--border);">'
    + '<label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.88rem;color:var(--accent);">'
    + '<input type="checkbox" id="reset-send-first" checked style="width:20px;height:20px;accent-color:var(--accent);">'
    + ' Enviar progreso al entrenador antes de borrar</label>'
    + '<div class="field-hint" style="margin-top:.3rem;">Se abrirá el envío de progreso y después se borrará lo seleccionado.</div>'
    + '</div>';

  openModal({
    title: "Reiniciar progreso",
    bodyHtml: bodyHtml,
    footer: [
      { label: "Cancelar", cls: "btn-ghost" },
      { label: "Reiniciar seleccionados", cls: "btn-danger", onClick: function(){
        var sendFirst = document.getElementById("reset-send-first").checked;
        var selectedDays = [];
        var cbs = document.querySelectorAll(".reset-day-cb");
        for (var i=0; i<cbs.length; i++){
          if (cbs[i].checked) selectedDays.push(parseInt(cbs[i].getAttribute("data-day"),10));
        }
        if (!selectedDays.length){ toast("Selecciona al menos un día","warn"); return; }
        closeModal();
        if (sendFirst){
          openClientProgressShare();
          // Set a flag so after the share modal closes, we do the reset
          window._pendingReset = selectedDays;
          toast("Envía tu progreso. Al cerrar, se reiniciará.","info");
        } else {
          executeReset(selectedDays);
        }
      }}
    ]
  });
};

window.toggleResetAll = function(checked){
  var cbs = document.querySelectorAll(".reset-day-cb");
  for (var i=0; i<cbs.length; i++) cbs[i].checked = checked;
};

function executeReset(dayIndices){
  var progress = loadProgress();
  var r = _clientShareData.routine;
  var cleared = 0;

  for (var di=0; di<dayIndices.length; di++){
    var dayIdx = dayIndices[di];
    var day = r.days[dayIdx];
    if (!day || !day.exercises) continue;
    for (var ei=0; ei<day.exercises.length; ei++){
      var setsCount = parseInt(day.exercises[ei].sets,10) || 1;
      for (var s=0; s<setsCount; s++){
        var key = dayIdx+":"+ei+":"+s;
        if (progress[key]){ delete progress[key]; cleared++; }
      }
      // Also clear exercise comment
      var ck = dayIdx+":"+ei+":comment";
      if (progress[ck]) delete progress[ck];
    }
  }

  saveProgress(progress);
  // Clear session notes and date if all days were reset
  var allDays = true;
  for (var d=0; d<7; d++){
    var dd = r.days[d];
    if (dd && dd.exercises && dd.exercises.length){
      if (dayIndices.indexOf(d) < 0){ allDays = false; break; }
    }
  }
  if (allDays){
    try {
      localStorage.removeItem(_clientProgressKey+"_notes");
      localStorage.removeItem(_clientProgressKey+"_date");
    } catch(e){}
  }

  toast(cleared+" registros borrados de "+dayIndices.length+" día"+(dayIndices.length===1?"":"s"), "success");
  // Re-render the entire client view
  showClientView(_clientShareData);
}

// Hook into modal close to execute pending reset
var _origCloseModal = closeModal;
closeModal = function(){
  _origCloseModal();
  if (window._pendingReset){
    var days = window._pendingReset;
    window._pendingReset = null;
    setTimeout(function(){ executeReset(days); }, 300);
  }
};

window.openClientProgressShare = function openClientProgressShare(){
  if (!_clientShareData) return;
  var r = _clientShareData.routine;
  var progress = loadProgress();
  var stats = computeSessionStats(r, progress);
  var sessionNotes = "", sessionDate = "";
  try { sessionNotes=localStorage.getItem(_clientProgressKey+"_notes")||""; sessionDate=localStorage.getItem(_clientProgressKey+"_date")||""; } catch(e){}

  var report = {
    type:"progress", v:2,
    routine:r, client:_clientShareData.client, exercises:_clientShareData.exercises,
    progress:progress, stats:stats,
    sessionNotes:sessionNotes, sessionDate:sessionDate, sentAt:Date.now()
  };

  var encoded = encodeShareData(report);
  var sc = _clientShortenerCfg || {};
  var baseUrl = getAppBaseUrl(sc.bu);
  var longUrl = baseUrl+"#progreso/"+encoded;
  var hasGitHub = !!(sc.gt && sc.gr && unmaskToken(sc.gt));
  var hasBitly = !!(sc.bt && unmaskToken(sc.bt));
  var pc = stats.pct>=80?"high":stats.pct>=40?"mid":"low";

  var bodyHtml =
    '<div style="text-align:center;margin-bottom:1rem;">'
      +'<div class="progress-pct '+pc+'">'+stats.pct+'%</div>'
      +'<div class="text-sm text-muted">'+stats.done+' / '+stats.total+' sets completados</div>'
      +'<div class="progress-bar" style="margin:.6rem auto;max-width:300px;"><div class="progress-bar-fill" style="width:'+stats.pct+'%;"></div></div>'
    +'</div>'
    +'<div id="share-status" class="text-sm text-muted" style="margin-bottom:.5rem;text-align:center;">'+(hasBitly?'🔗 Acortando con Bitly...':hasGitHub?'☁ Subiendo a GitHub...':'Preparando link...')+'</div>'
    +'<div class="share-qr-wrap" id="share-qr"></div>'
    +'<div class="share-link-box" id="share-link-text"></div>'
    +'<div class="share-grid">'
      +'<button class="btn btn-secondary" id="btn-copy-link">Copiar link</button>'
      +'<button class="btn btn-wa" id="btn-wa">WhatsApp</button>'
    +'</div>';

  openModal({
    title:"Enviar progreso", large:true, bodyHtml:bodyHtml,
    footer:[{label:"Cerrar",cls:"btn-ghost"}],
    bodyMount: function(){
      var currentUrl = longUrl;
      function renderQrFor(url){
        try { var q=generateQrSvg(url,280); document.getElementById("share-qr").innerHTML=q.svg; }
        catch(e){ document.getElementById("share-qr").innerHTML='<p style="color:#000;padding:1rem;">Link muy largo. Copia el link directamente.</p>'; }
        document.getElementById("share-link-text").textContent=url;
      }
      renderQrFor(currentUrl);
      function setStatus(h){ var s=document.getElementById("share-status"); if(s)s.innerHTML=h; }
      function buildWaMsg(){
        return "Hola! Te envio mi reporte de progreso:\n\n"
          +"*"+(r.name||"Rutina")+"*\n"
          +stats.done+" de "+stats.total+" sets completados ("+stats.pct+"%)\n"
          +(sessionDate?"Sesion: "+sessionDate+"\n":"")
          +(sessionNotes?"Nota: "+sessionNotes+"\n":"")
          +"\nVer reporte completo:\n"+currentUrl+"\n\n_Enviado desde Ultra-Sport 19_";
      }
      document.getElementById("btn-copy-link").addEventListener("click", function(){ copyToClipboard(currentUrl); });
      document.getElementById("btn-wa").addEventListener("click", function(){ window.open("https://wa.me/?text="+encodeURIComponent(buildWaMsg()),"_blank","noopener"); });

      if (hasBitly){
        shortenWithBitlyToken(longUrl, sc.bt, sc.bd).then(function(short){
          currentUrl=short; renderQrFor(short);
          setStatus('<span style="color:var(--accent);">🔗 Bitly: '+escapeHtml(short)+'</span>');
        }).catch(function(e){
          setStatus('<span style="color:var(--warn);">⚠ Bitly: '+escapeHtml(e.message)+'</span>');
          if (hasGitHub) doGitHub();
        });
      } else if (hasGitHub){
        doGitHub();
      } else {
        setStatus('<span class="text-muted">Link largo ('+longUrl.length+' car). Tu entrenador puede configurar Bitly/GitHub para links cortos.</span>');
      }

      function doGitHub(){
        setStatus("☁ Subiendo a GitHub...");
        uploadToCloudWithConfig(report,"p",sc).then(function(res){
          var short=baseUrl+"#p/"+res.fileId; currentUrl=short; renderQrFor(short);
          setStatus('<span style="color:var(--accent);">☁ Link corto: '+escapeHtml(short)+'</span>');
        }).catch(function(e){ setStatus('<span style="color:var(--warn);">⚠ GitHub: '+escapeHtml(e.message)+'. Envía el link largo.</span>'); });
      }
    }
  });
};

function exportBackup(){
  var payload = {
    app: "ultrasport19",
    version: 1,
    exportedAt: new Date().toISOString(),
    clients: state.clients,
    routines: state.routines,
    exercises: state.exercises,
    protocols: state.protocols || []
  };
  var blob = new Blob([JSON.stringify(payload, null, 2)], { type:"application/json" });
  var ts = new Date().toISOString().slice(0, 10);
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ultrasport19-respaldo-"+ts+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
  toast("Respaldo descargado","success");
  try { localStorage.setItem(APP_KEY+"_lastbackup", String(Date.now())); } catch(e){}
  var _bb = document.querySelector(".backup-banner");
  if (_bb && _bb.parentNode) _bb.parentNode.removeChild(_bb);
}

function importBackup(file){
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var data = JSON.parse(e.target.result);
      if (data.app !== "ultrasport19") {
        if (!confirm("Este archivo no parece ser un respaldo de Ultra-Sport 19. ¿Importar de todos modos?")) return;
      }
      var counts = {
        clients: Array.isArray(data.clients) ? data.clients.length : 0,
        routines: Array.isArray(data.routines) ? data.routines.length : 0,
        exercises: Array.isArray(data.exercises) ? data.exercises.length : 0
      };
      var msg = "Vas a importar:\n• " + counts.clients + " clientes\n• " + counts.routines + " rutinas\n• " + counts.exercises + " ejercicios\n\n¿Reemplazar tus datos actuales?";
      if (!confirm(msg)) return;
      if (Array.isArray(data.clients)) state.clients = data.clients;
      if (Array.isArray(data.routines)) state.routines = data.routines;
      if (Array.isArray(data.exercises)) state.exercises = data.exercises;
      saveState();
      closeModal();
      showView("dashboard");
      toast("Respaldo importado","success");
    } catch(err){
      toast("Archivo inválido: " + err.message, "error");
    }
  };
  reader.readAsText(file);
}

/* ============================================================
   CIFRADO DE DATOS (Web Crypto · AES-GCM 256 + PBKDF2)
   El state.json se sube como sobre auto-contenido:
   { enc:1, v:1, keys:{ pw:{salt,iv,ct}, rec:{salt,iv,ct} }, data:{iv,ct} }
   - MK (master key aleatoria) cifra los datos.
   - MK va "envuelta" por la contraseña Y por la clave de recuperación.
   - El sobre es público-safe: sin contraseña/clave es inservible.
   Las rutinas compartidas a pacientes NO se cifran (ellos deben leerlas).
   ============================================================ */
var ENC_MK_KEY  = "ultrasport19_mk";   // master key (b64) cacheada por dispositivo
var ENC_ENV_KEY = "ultrasport19_env";  // sobre de llaves (JSON) cacheado
var ENC_PBKDF2_ITERS = 150000;
var _encMkRaw = null;    // ArrayBuffer de la master key en memoria
var _encEnvelope = null; // { pw:{...}, rec:{...} }
var _encPromptTs = 0;

function _cryptoOk(){ return !!(window.crypto && window.crypto.subtle && window.TextEncoder); }
function encEnabled(){ return !!settings.encEnabled; }
function encUnlocked(){ return !!_encMkRaw; }

function _encB64(buf){ var b=new Uint8Array(buf), s=""; for (var i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s); }
function _encUnb64(str){ var s=atob(String(str).replace(/\s/g,"")), b=new Uint8Array(s.length); for (var i=0;i<s.length;i++) b[i]=s.charCodeAt(i); return b.buffer; }
function _encRand(n){ var a=new Uint8Array(n); window.crypto.getRandomValues(a); return a; }
function _encGv(id){ var e=document.getElementById(id); return e ? e.value.trim() : ""; }

function _encKEK(secret, saltBuf){
  return window.crypto.subtle.importKey("raw", new TextEncoder().encode(secret), {name:"PBKDF2"}, false, ["deriveKey"])
    .then(function(base){
      return window.crypto.subtle.deriveKey(
        { name:"PBKDF2", salt: saltBuf, iterations: ENC_PBKDF2_ITERS, hash:"SHA-256" },
        base, { name:"AES-GCM", length:256 }, false, ["encrypt","decrypt"]);
    });
}
function _encWrapMK(mkRaw, secret){
  var salt=_encRand(16), iv=_encRand(12);
  return _encKEK(secret, salt).then(function(kek){
    return window.crypto.subtle.encrypt({name:"AES-GCM", iv:iv}, kek, mkRaw);
  }).then(function(ct){ return { salt:_encB64(salt), iv:_encB64(iv), ct:_encB64(ct) }; });
}
function _encUnwrapMK(wrap, secret){
  return _encKEK(secret, new Uint8Array(_encUnb64(wrap.salt))).then(function(kek){
    return window.crypto.subtle.decrypt({name:"AES-GCM", iv:new Uint8Array(_encUnb64(wrap.iv))}, kek, _encUnb64(wrap.ct));
  }); // resuelve MK (ArrayBuffer); lanza si el secreto es incorrecto
}
function _encImportMK(mkRaw){ return window.crypto.subtle.importKey("raw", mkRaw, {name:"AES-GCM"}, false, ["encrypt","decrypt"]); }

function encRestoreFromCache(){
  try {
    var mk = localStorage.getItem(ENC_MK_KEY);
    if (mk) _encMkRaw = _encUnb64(mk);
    var env = localStorage.getItem(ENC_ENV_KEY);
    if (env) _encEnvelope = JSON.parse(env);
  } catch(e){ _encMkRaw=null; }
}
function _encCache(){
  try {
    if (_encMkRaw) localStorage.setItem(ENC_MK_KEY, _encB64(_encMkRaw));
    if (_encEnvelope) localStorage.setItem(ENC_ENV_KEY, JSON.stringify(_encEnvelope));
  } catch(e){}
}
function encForgetDevice(){ _encMkRaw=null; try{ localStorage.removeItem(ENC_MK_KEY); }catch(e){} }

/* Cifra un string JSON -> objeto sobre listo para subir */
function encEncryptPayload(jsonStr){
  if (!_encMkRaw || !_encEnvelope) return Promise.reject(new Error("Cifrado bloqueado"));
  var iv=_encRand(12);
  return _encImportMK(_encMkRaw).then(function(key){
    return window.crypto.subtle.encrypt({name:"AES-GCM", iv:iv}, key, new TextEncoder().encode(jsonStr));
  }).then(function(ct){
    return { enc:1, v:1, kdf:{iters:ENC_PBKDF2_ITERS}, keys:_encEnvelope, data:{ iv:_encB64(iv), ct:_encB64(ct) } };
  });
}
/* Descifra un objeto sobre -> string JSON */
function encDecryptPayload(obj){
  if (!_encMkRaw) return Promise.reject(new Error("LOCKED"));
  return _encImportMK(_encMkRaw).then(function(key){
    return window.crypto.subtle.decrypt({name:"AES-GCM", iv:new Uint8Array(_encUnb64(obj.data.iv))}, key, _encUnb64(obj.data.ct));
  }).then(function(pt){ return new TextDecoder().decode(pt); });
}

function encGenRecoveryKey(){
  var bytes=_encRand(15), alph="ABCDEFGHJKMNPQRSTUVWXYZ23456789", s="";
  for (var i=0;i<bytes.length;i++) s += alph.charAt(bytes[i] % alph.length);
  return "US19-"+s.slice(0,5)+"-"+s.slice(5,10)+"-"+s.slice(10,15);
}

/* Activar cifrado: genera MK + clave de recuperación + sobre, cachea, marca settings */
function encSetup(passphrase){
  var mk=_encRand(32), recovery=encGenRecoveryKey();
  return Promise.all([_encWrapMK(mk.buffer, passphrase), _encWrapMK(mk.buffer, recovery)]).then(function(res){
    _encEnvelope={ pw:res[0], rec:res[1] };
    _encMkRaw=mk.buffer;
    _encCache();
    settings.encEnabled=true; saveSettings();
    return recovery;
  });
}

/* Descarga el sobre de llaves desde el state.json remoto (o usa cache) */
function encFetchEnvelope(){
  var url=getGitHubSyncUrl();
  if (!url) return Promise.resolve(_encEnvelope);
  return fetch(url + "?ref=" + DATA_BRANCH, { headers:getGitHubHeaders() }).then(function(r){
    if (!r.ok) return _encEnvelope;
    return r.json().then(function(meta){
      if (!meta || !meta.content) return _encEnvelope;
      var jsonStr = decodeURIComponent(escape(atob(String(meta.content).replace(/\n/g,""))));
      var obj = JSON.parse(jsonStr);
      return obj.enc ? obj.keys : null;
    });
  }).catch(function(){ return _encEnvelope; });
}
/* Desbloquear en este dispositivo con contraseña o clave de recuperación */
function encUnlock(secret, isRecovery){
  return encFetchEnvelope().then(function(env){
    if (!env) throw new Error("Aún no hay datos cifrados en la nube");
    return _encUnwrapMK(isRecovery ? env.rec : env.pw, secret).then(function(mkRaw){
      _encMkRaw=mkRaw; _encEnvelope=env; _encCache();
      if (!settings.encEnabled){ settings.encEnabled = true; saveSettings(); }
      return true;
    });
  });
}

/* Devuelve el string a subir: cifrado si corresponde, o el JSON plano */
function _syncPrepareContent(jsonStr){
  if (settings.encEnabled && encUnlocked()) return encEncryptPayload(jsonStr).then(function(env){ return JSON.stringify(env); });
  return Promise.resolve(jsonStr);
}
/* Si el remoto viene cifrado, lo descifra a objeto; si está bloqueado, pide desbloqueo */
function _syncMaybeDecrypt(remote){
  if (remote && remote.enc){
    if (!settings.encEnabled){ settings.encEnabled = true; saveSettings(); } // cifrado es "pegajoso" entre dispositivos
    if (!encUnlocked()){ encPromptUnlock(); return Promise.resolve(null); }
    return encDecryptPayload(remote).then(function(jsonStr){ return JSON.parse(jsonStr); }).catch(function(){ return null; });
  }
  return Promise.resolve(remote);
}

function encOpenSetupModal(){
  if (!_cryptoOk()){ toast("Este navegador no soporta cifrado (requiere HTTPS)","error"); return; }

var SYNC_PATH = "sync/state.json";
var _syncTimer = null;
var _syncSha = null; // SHA of the current sync file (needed for GitHub update)
var SYNC_DEBOUNCE_MS = 12000; // Espera 12s tras el último cambio (menos commits, misma seguridad)

function updateSyncBadge(status, text){
  var badge = document.getElementById("sync-badge");
  var label = document.getElementById("sync-label");
  if (!badge || !label) return;
  badge.className = "sync-badge " + status;
  if (text) label.textContent = text;
  else {
    var map = { off:"Sync off", idle:"Sync", syncing:"Sincronizando...", synced:"Sincronizado", error:"Error sync" };
    label.textContent = map[status] || status;
  }
}

function isSyncReady(){
  return settings.syncEnabled && settings.githubToken && settings.githubRepo;
}

function getGitHubSyncUrl(){
  var repoFull = getDerivedRepo() || settings.githubRepo;
  var parts = (repoFull || "").split("/");
  if (parts.length !== 2) return null;
  return "https://api.github.com/repos/" + parts[0] + "/" + parts[1] + "/contents/" + SYNC_PATH;
}

function getGitHubHeaders(){
  return {
    "Authorization": "token " + settings.githubToken,
    "Accept": "application/vnd.github+json",
    "Content-Type": "application/json"
  };
}

function buildSyncPayload(){
  return {
    app: "ultrasport19",
    v: 1,
    syncedAt: Date.now(),
    clients: state.clients,
    routines: state.routines,
    exercises: state.exercises,
    protocols: state.protocols
  };
}

function scheduleSyncUpload(){
  if (!isSyncReady()) return;
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(function(){ syncUploadNow(); }, SYNC_DEBOUNCE_MS);
}

function syncUploadNow(){
  if (!isSyncReady()){ updateSyncBadge("off"); return; }
  if (settings.encEnabled && !encUnlocked()){
    updateSyncBadge("error","🔒 Bloqueado");
    encPromptUnlock();
    return;
  }
  updateSyncBadge("syncing");
  var url = getGitHubSyncUrl();
  if (!url){ updateSyncBadge("error","Sin repo"); return; }
  var repoFull = getDerivedRepo() || settings.githubRepo;

  var payload = buildSyncPayload();
  var json = JSON.stringify(payload);

  _syncPrepareContent(json).then(function(contentStr){
    var b64 = btoa(unescape(encodeURIComponent(contentStr)));
    var body = {
      message: "ultrasport19: sync " + new Date().toISOString().slice(0,19),
      content: b64,
      branch: DATA_BRANCH
    };
    if (_syncSha) body.sha = _syncSha;

    return ensureDataBranch(repoFull, settings.githubToken).then(function(){
      return fetch(url, { method:"PUT", headers:getGitHubHeaders(), body:JSON.stringify(body) });
    }).then(function(res){
      if (res.status === 409){
        return fetchSyncSha().then(function(){
          body.sha = _syncSha;
          return fetch(url, { method:"PUT", headers:getGitHubHeaders(), body:JSON.stringify(body) });
        });
      }
      if (res.status === 422 && !_syncSha){
        return fetchSyncSha().then(function(){
          body.sha = _syncSha;
          return fetch(url, { method:"PUT", headers:getGitHubHeaders(), body:JSON.stringify(body) });
        });
      }
      return res;
    });
  }).then(function(res){
    if (!res || !res.ok){
      return (res && res.text ? res.text() : Promise.resolve("")).then(function(t){
        throw new Error((res?res.status:"?") + " " + t.slice(0,100));
      });
    }
    return res.json();
  }).then(function(data){
    if (data && data.content && data.content.sha){
      _syncSha = data.content.sha;
    }
    updateSyncBadge("synced");
    setTimeout(function(){
      var b = document.getElementById("sync-badge");
      if (b && b.className.indexOf("synced") >= 0) updateSyncBadge("idle");
    }, 4000);
  }).catch(function(err){
    console.error("Sync upload failed:", err);
    updateSyncBadge("error", "Error sync");
    setTimeout(function(){
      var b = document.getElementById("sync-badge");
      if (b && b.className.indexOf("error") >= 0) updateSyncBadge("idle");
    }, 6000);
  });
}

function fetchSyncSha(){
  var url = getGitHubSyncUrl();
  if (!url) return Promise.resolve();
  return fetch(url + "?ref=" + DATA_BRANCH, {
    headers: getGitHubHeaders()
  }).then(function(res){
    if (!res.ok){ _syncSha = null; return; }
    return res.json().then(function(data){
      _syncSha = data.sha || null;
    });
  }).catch(function(){ _syncSha = null; });
}

function syncDownload(){
  if (!isSyncReady()) return Promise.resolve(false);
  updateSyncBadge("syncing","Descargando...");

  var repoFull = getDerivedRepo() || settings.githubRepo;
  if ((repoFull||"").split("/").length !== 2){ updateSyncBadge("error"); return Promise.resolve(false); }

  return fetchRawWithFallback(SYNC_PATH, repoFull, DATA_BRANCH).catch(function(err){
    if (String(err.message||"").indexOf("404") >= 0){
      updateSyncBadge("idle","Sin datos remotos");
      setTimeout(function(){ updateSyncBadge("idle"); }, 3000);
      return null;
    }
    throw err;
  }).then(function(remote){
    if (!remote) return false;
    return _syncMaybeDecrypt(remote).then(function(data){
      if (!data || data.app !== "ultrasport19") return false;

      var localTime = 0;
      try {
        var raw = localStorage.getItem(APP_KEY);
        if (raw){
          var local = JSON.parse(raw);
          if (local.routines){
            for (var i=0;i<local.routines.length;i++){
              var t = local.routines[i].updatedAt || local.routines[i].createdAt || 0;
              if (t > localTime) localTime = t;
            }
          }
          if (local.clients){
            for (var j=0;j<local.clients.length;j++){
              var ct = local.clients[j].createdAt || 0;
              if (ct > localTime) localTime = ct;
            }
          }
        }
      } catch(e){}

      var remoteTime = data.syncedAt || 0;
      if (remoteTime > localTime){
        if (Array.isArray(data.clients)) state.clients = data.clients;
        if (Array.isArray(data.routines)) state.routines = data.routines;
        if (Array.isArray(data.exercises)) state.exercises = data.exercises;
        if (Array.isArray(data.protocols)) state.protocols = data.protocols;
        try { localStorage.setItem(APP_KEY, JSON.stringify(state)); } catch(e){}
        updateSyncBadge("synced","Sincronizado ↓");
        setTimeout(function(){ updateSyncBadge("idle"); }, 4000);
        return true; // data changed
      } else {
        updateSyncBadge("synced","Al día");
        setTimeout(function(){ updateSyncBadge("idle"); }, 3000);
        return false;
      }
    });
  }).then(function(changed){
    return fetchSyncSha().then(function(){ return changed; });
  }).catch(function(err){
    console.error("Sync download failed:", err);
    updateSyncBadge("error","Error sync");
    setTimeout(function(){ updateSyncBadge("idle"); }, 5000);
    return false;
  });
}

window.manualSync = function(){
  if (!isSyncReady()){
    toast("Configura GitHub y activa Sync en ⚙ Ajustes", "warn");
    return;
  }
  syncDownload().then(function(changed){
    if (changed){
      toast("Datos sincronizados desde la nube", "success");
      var activeView = document.querySelector(".view.active");
      if (activeView){
        var id = activeView.id.replace("view-","");
        if (id === "dashboard" || id === "clients" || id === "routines" || id === "library" || id === "rehab") showView(id);

};

function parseHash(){
  var h = location.hash || "";
  if (!h) return null;
  h = h.replace(/^#/, "");
  if (h.indexOf("cliente/") === 0) return { kind:"cliente", payload: h.slice(8) };
  if (h.indexOf("progreso/") === 0) return { kind:"progreso", payload: h.slice(9) };
  if (h.indexOf("r/") === 0) return { kind:"r", payload: h.slice(2) };
  if (h.indexOf("p/") === 0) return { kind:"p", payload: h.slice(2) };
  return null;
}

      if (!inSeg.length) continue;
      html += '<h2 style="font-family:var(--font-display);letter-spacing:.04em;font-size:1.05rem;color:var(--muted);margin:1.4rem 0 .7rem;text-transform:uppercase;">'
        + gseg.icon + ' ' + escapeHtml(gseg.label)
        + ' <span style="color:var(--border);">·</span> <span style="font-size:.85rem;">'+inSeg.length+'</span></h2>';
      for (var k=0;k<inSeg.length;k++) html += protocolCardHtml(inSeg[k]);
    }
  }

  document.getElementById("view-rehab").innerHTML = html;
}

function protocolCardHtml(p){
  var total = countProtocolExercises(p);
  var phaseDots = '';
  var colors = ["#ff6b6b","#ffa94d","#4dd0c7","#b4e650"];
  for (var ph=0; ph<4; ph++){
    var cnt = (p.phases && p.phases[ph] && p.phases[ph].exercises) ? p.phases[ph].exercises.length : 0;
    phaseDots += '<span class="phase-dot"><i style="background:'+colors[ph]+'"></i>F'+(ph+1)+': '+cnt+'</span>';
  }
  return '<div class="card protocol-card" style="cursor:pointer;" onclick="openProtocol(\''+p.id+'\')">'
    + '<div class="card-main">'
    + '<div class="card-title">'+escapeHtml(p.name||"Protocolo sin nombre")+'</div>'
    + '<div class="card-sub" style="gap:.6rem;margin-top:.35rem;flex-wrap:wrap;">'
      + segmentBadge(getProtocolSegment(p))
      + (p.region?'<span class="badge teal">'+escapeHtml(p.region)+'</span>':'')
      + (getPatologia(p.patologia)?'<span class="badge" style="background:rgba(180,230,80,.14);color:#b4e650;border:1px solid rgba(180,230,80,.35);">🏷 Estandarizada</span>':'')
      + '<span class="badge muted">'+total+' ejercicio'+(total===1?'':'s')+'</span>'
    + '</div>'
    + '<div class="card-sub" style="gap:.85rem;margin-top:.5rem;">'+phaseDots+'</div>'
    + (p.description?'<p class="text-xs text-muted" style="margin-top:.5rem;line-height:1.4;">'+escapeHtml(p.description)+'</p>':'')
    + '</div>'
    + '<div class="card-actions" onclick="event.stopPropagation()">'
      + '<button class="btn btn-secondary btn-sm" onclick="openProtocol(\''+p.id+'\')">Abrir</button>'
      + '<button class="btn btn-ghost btn-sm" onclick="openProtocolForm(\''+p.id+'\')" title="Editar datos">✎</button>'
      + '<button class="btn btn-ghost btn-sm" onclick="duplicateProtocol(\''+p.id+'\')" title="Duplicar">⧉</button>'
      + '<button class="btn btn-ghost btn-sm" onclick="deleteProtocol(\''+p.id+'\')" title="Eliminar">🗑</button>'
    + '</div>'
  + '</div>';
}

function filterProtocols(seg){ _protocolSegFilter = seg; renderProtocolList(); }
window.filterProtocols = filterProtocols;

function openProtocolForm(id){
  var p = id ? getProtocol(id) : null;
  var isEdit = !!p;
  var data = p || { name:"", region:"", description:"", segment:"" };

  var curSeg = data.segment || deriveSegment(data.region);
  var segHtml = '<select id="pf-segment">';
  for (var s=0;s<PROTOCOL_SEGMENTS.length;s++){
    segHtml += '<option value="'+escapeAttr(PROTOCOL_SEGMENTS[s].id)+'"'+(curSeg===PROTOCOL_SEGMENTS[s].id?" selected":"")+'>'+PROTOCOL_SEGMENTS[s].icon+' '+escapeHtml(PROTOCOL_SEGMENTS[s].label)+'</option>';
  }
  segHtml += '</select>';

  var regionOpts = ["Hombro","Codo","Muñeca / Mano","Columna cervical","Columna dorsal","Columna lumbar","Core","Cadera","Rodilla","Tobillo / Pie","Otro"];
  var regionHtml = '<select id="pf-region"><option value="">— Región (opcional) —</option>';
  for (var i=0;i<regionOpts.length;i++){
    regionHtml += '<option value="'+escapeAttr(regionOpts[i])+'"'+(data.region===regionOpts[i]?" selected":"")+'>'+escapeHtml(regionOpts[i])+'</option>';
  }
  if (data.region && regionOpts.indexOf(data.region)<0) regionHtml += '<option value="'+escapeAttr(data.region)+'" selected>'+escapeHtml(data.region)+'</option>';
  regionHtml += '</select>';

  // Catálogo estandarizado de patologías (agrupado por segmento)
  var patHtml = '<select id="pf-patologia"><option value="">— Otra / personalizada (texto libre) —</option>';
  for (var ps=0; ps<PROTOCOL_SEGMENTS.length; ps++){
    var segp = PROTOCOL_SEGMENTS[ps];
    var items = RC_PATOLOGIAS.filter(function(x){ return x.seg===segp.id; });
    if (!items.length) continue;
    patHtml += '<optgroup label="'+escapeAttr(segp.icon+' '+segp.label)+'">';
    for (var pi=0; pi<items.length; pi++){
      patHtml += '<option value="'+escapeAttr(items[pi].id)+'"'+(data.patologia===items[pi].id?" selected":"")+'>'+escapeHtml(items[pi].nombre)+'</option>';
    }
    patHtml += '</optgroup>';
  }
  patHtml += '</select>';

  var bodyHtml = '';
  bodyHtml += '<div class="form-row"><label class="form-label">Patología estandarizada</label>'+patHtml
    + '<div class="text-xs text-muted" style="margin-top:.3rem;">Elige del catálogo para autocompletar nombre, región y segmento. Luego puedes ajustar el nombre.</div></div>';
  bodyHtml += '<div class="form-row"><label class="form-label">Nombre del protocolo *</label>'
    + '<input type="text" id="pf-name" value="'+escapeAttr(data.name)+'" placeholder="Ej. Tendinopatía de Manguito Rotador"></div>';
  bodyHtml += '<div class="form-row"><label class="form-label">Segmento corporal</label>'+segHtml+'</div>';
  bodyHtml += '<div class="form-row"><label class="form-label">Región anatómica</label>'+regionHtml+'</div>';
  bodyHtml += '<div class="form-row"><label class="form-label">Descripción / Notas clínicas</label>'
    + '<textarea id="pf-desc" style="min-height:80px;" placeholder="Contexto, mecanismo de lesión, consideraciones generales...">'+escapeHtml(data.description||"")+'</textarea></div>';
  if (!isEdit){
    bodyHtml += '<div class="text-xs text-muted" style="line-height:1.5;background:var(--surface-2);border-radius:8px;padding:.7rem .85rem;">'
      + 'Se crearán automáticamente las <strong>4 fases</strong> (Aguda → Recuperación → Fortalecimiento → Retorno funcional), '
      + 'cada una con sus objetivos editables. Luego podrás vincular ejercicios de tu biblioteca a cada fase.'
      + '</div>';
  }

  openModal({
    title: isEdit ? "Editar protocolo" : "Nuevo protocolo de rehabilitación",
    bodyHtml: bodyHtml,
    footer: [
      { label:"Cancelar", cls:"btn-ghost" },
      { label: isEdit?"Guardar":"Crear protocolo", cls:"btn-primary", onClick: function(){ saveProtocolForm(id); } }
    ],
    bodyMount: function(){
      setTimeout(function(){ var n=document.getElementById("pf-name"); if(n) n.focus(); }, 50);
      // Auto-set segment when region changes
      var regSel = document.getElementById("pf-region");
      var segSel = document.getElementById("pf-segment");
      if (regSel && segSel){
        regSel.addEventListener("change", function(){
          var derived = deriveSegment(this.value);
          if (derived) segSel.value = derived;
        });
      }
      // Al elegir patología del catálogo: autocompletar nombre, región y segmento
      var patSel = document.getElementById("pf-patologia");
      if (patSel){
        patSel.addEventListener("change", function(){
          var pat = getPatologia(this.value);
          if (!pat) return;
          var nameEl = document.getElementById("pf-name");
          if (nameEl) nameEl.value = pat.nombre;
          if (regSel) regSel.value = pat.region;
          if (segSel) segSel.value = pat.seg;
        });
      }
    }
  });
}

function saveProtocolForm(id){
  var name = (document.getElementById("pf-name").value||"").trim();
  if (!name){ toast("Escribe la patología o condición", "error"); return; }
  var region = document.getElementById("pf-region").value || "";
  var segment = document.getElementById("pf-segment").value || "";
  var desc = (document.getElementById("pf-desc").value||"").trim();
  var patEl = document.getElementById("pf-patologia");
  var patologia = patEl ? (patEl.value || "") : "";

  var p = id ? getProtocol(id) : null;
  if (p){
    p.name = name; p.region = region; p.segment = segment; p.description = desc; p.patologia = patologia; p.updatedAt = Date.now();
    saveState(); closeModal(); toast("Protocolo actualizado", "success");
    renderRehab();
  } else {
    var np = {
      id: genId(), name:name, region:region, segment:segment, description:desc, patologia:patologia,
      phases: makeProtocolPhases(), references: [],
      createdAt: Date.now(), updatedAt: Date.now()
    };
    state.protocols.push(np);
    saveState(); closeModal(); toast("Protocolo creado con sus 4 fases", "success");
    _rehabState.openId = np.id; _rehabState.activePhase = 0;
    renderRehab();
  }
}

function duplicateProtocol(id){
  var p = getProtocol(id);
  if (!p) return;
  var copy = JSON.parse(JSON.stringify(p));
  copy.id = genId();
  copy.name = (p.name||"Protocolo") + " (copia)";
  copy.createdAt = Date.now(); copy.updatedAt = Date.now();
  state.protocols.push(copy);
  saveState(); toast("Protocolo duplicado", "success");
  renderRehab();
}

function deleteProtocol(id){
  var p = getProtocol(id);
  if (!p) return;
  if (!confirm('¿Eliminar el protocolo "'+(p.name||"")+'" y sus 4 fases? No se puede deshacer.')) return;
  state.protocols = state.protocols.filter(function(x){ return x.id !== id; });
  if (_rehabState.openId === id) _rehabState.openId = null;
  saveState(); toast("Protocolo eliminado", "success");
  renderRehab();
}

function openProtocol(id){
  _rehabState.openId = id;
  _rehabState.activePhase = 0;
  renderRehab();
}
function closeProtocol(){
  _rehabState.openId = null;
  renderRehab();
}

function renderProtocolDetail(){
  var p = getProtocol(_rehabState.openId);
  if (!p){ closeProtocol(); return; }

  var owner = p.ownerClientId ? getClient(p.ownerClientId) : null;

  var html = '';
  if (owner){
    html += '<div style="margin-bottom:1rem;"><button class="btn btn-ghost btn-sm" onclick="backToClients()">← Volver a clientes</button></div>';
  } else {
    html += '<div style="margin-bottom:1rem;"><button class="btn btn-ghost btn-sm" onclick="closeProtocol()">← Volver a protocolos</button></div>';
  }

  html += '<div class="section-head">';
  html += '<div><h1 class="section-title" style="margin-bottom:.3rem;">'+escapeHtml(p.name||"Protocolo")+'</h1>';
  html += '<div class="card-sub" style="gap:.6rem;flex-wrap:wrap;">'
    + segmentBadge(getProtocolSegment(p))
    + (p.region?'<span class="badge teal">'+escapeHtml(p.region)+'</span>':'')
    + '<span class="badge muted">'+countProtocolExercises(p)+' ejercicios en total</span>'
    + '</div></div>';
  html += '<button class="btn btn-secondary btn-sm" onclick="openProtocolForm(\''+p.id+'\')">✎ Editar datos</button>';
  html += '</div>';

  if (p.description){
    html += '<p class="text-sm text-muted" style="margin:-.3rem 0 1rem;line-height:1.5;">'+escapeHtml(p.description)+'</p>';
  }

  // Client assignment banner (only for client copies)
  if (owner){
    var cp = (typeof p.currentPhase === "number") ? p.currentPhase : 0;
    var cpFocus = (p.phases[cp] && p.phases[cp].focus) ? p.phases[cp].focus : "";
    html += '<div class="phase-banner ph'+(cp+1)+'" style="margin-bottom:1rem;">';
    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.6rem;flex-wrap:wrap;">';
    html += '<div><div style="font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;">Cliente en rehabilitación</div>';
    html += '<div style="font-family:var(--font-display);font-size:1.3rem;letter-spacing:.03em;">'+escapeHtml(owner.name||"")+'</div>';
    html += '<div class="text-sm" style="margin-top:.2rem;">Fase actual: <strong>Fase '+(cp+1)+'</strong>'+(cpFocus?' · '+escapeHtml(cpFocus):'')+'</div></div>';
    html += '<div style="display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;">';
    html += '<button class="btn btn-ghost btn-sm" onclick="setClientCurrentPhase(\''+p.id+'\','+(cp-1)+')"'+(cp<=0?' disabled style="opacity:.4;"':'')+'>◀ Retroceder</button>';
    html += '<button class="btn btn-secondary btn-sm" onclick="setClientCurrentPhase(\''+p.id+'\','+(cp+1)+')"'+(cp>=3?' disabled style="opacity:.4;"':'')+'>Avanzar fase ▶</button>';
    html += '<button class="btn btn-primary btn-sm" onclick="openPhaseShareModal(\''+p.id+'\','+cp+')">📤 Compartir fase actual</button>';
    html += '</div></div>';
    html += '<div class="text-xs text-muted" style="margin-top:.5rem;">Edita los ejercicios de cada fase abajo. Estás trabajando sobre la copia de '+escapeHtml(owner.name||"este cliente")+', no sobre tu plantilla.</div>';
    html += '<div style="margin-top:.5rem;"><button class="btn btn-ghost btn-sm" onclick="unassignClientProtocol(\''+p.ownerClientId+'\')" style="color:var(--danger);">Quitar protocolo de este cliente</button></div>';
    html += '</div>';
  }

  // Phase tabs
  html += '<div class="phase-tabs">';
  for (var i=0;i<4;i++){
    var ph = p.phases[i] || { name:"Fase "+(i+1), exercises:[] };
    var cnt = ph.exercises ? ph.exercises.length : 0;
    var active = i===_rehabState.activePhase ? " active" : "";
    var isCurrent = owner && (typeof p.currentPhase==="number") && p.currentPhase===i ? ' style="outline:2px solid var(--accent);outline-offset:1px;"' : '';
    html += '<div class="phase-tab ph'+(i+1)+active+'" onclick="setProtocolPhase('+i+')"'+isCurrent+'>'
      + '<span class="ph-num">F'+(i+1)+'</span>'
      + '<span class="ph-lbl">'+escapeHtml((ph.focus||"").split("·")[0].trim()||ph.name)+'</span>'
      + '<span class="ph-cnt">'+cnt+' ejerc.</span>'
      + '</div>';
  }
  html += '</div>';

  html += '<div class="phase-panel" id="phase-panel"></div>';

  html += '<div id="protocol-refs"></div>';

  document.getElementById("view-rehab").innerHTML = html;
  renderPhasePanel();
  renderProtocolRefs();
}

function setProtocolPhase(idx){
  _rehabState.activePhase = idx;
  var tabs = document.querySelectorAll(".phase-tab");
  for (var i=0;i<tabs.length;i++) tabs[i].classList.toggle("active", i===idx);
  renderPhasePanel();
}

function renderPhasePanel(){
  var panel = document.getElementById("phase-panel");
  if (!panel) return;
  var p = getProtocol(_rehabState.openId);
  if (!p) return;
  var idx = _rehabState.activePhase;
  var phase = p.phases[idx];
  if (!phase){ phase = { name:"Fase "+(idx+1), focus:"", objetivo:"", criterios:"", exercises:[] }; p.phases[idx] = phase; }
  var phNum = idx+1;

  var html = '';
  html += '<div class="phase-banner ph'+phNum+'">'
    + '<h4>'+escapeHtml(phase.name||("Fase "+phNum))+(phase.focus?' · <span style="font-weight:400;font-size:.9rem;">'+escapeHtml(phase.focus)+'</span>':'')+'</h4>'
    + '<div class="phase-field"><label>Objetivo de la fase</label>'
      + '<textarea data-phase-field="objetivo" placeholder="Objetivo principal...">'+escapeHtml(phase.objetivo||"")+'</textarea></div>'
    + '<div class="phase-field" style="margin-bottom:0;"><label>Criterios de avance a la siguiente fase</label>'
      + '<textarea data-phase-field="criterios" placeholder="¿Cuándo pasar a la fase siguiente?">'+escapeHtml(phase.criterios||"")+'</textarea></div>'
    + buildCritChecklistHtml(p.id, idx, phase.criterios)
    + phaseRefsStripHtml(p, idx)
    + '</div>';

  html += '<div class="day-header">';
  html += '<h3 style="font-family:var(--font-display);letter-spacing:.04em;font-size:1.2rem;">Ejercicios de esta fase</h3>';
  html += '<div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">';
  html += '<button class="btn btn-secondary btn-sm" onclick="addExerciseToPhase()">+ Ejercicio</button>';
  if (phase.exercises && phase.exercises.length){
    html += '<button class="btn btn-primary btn-sm" onclick="openPhaseShareModal(\''+p.id+'\','+idx+')">📤 Compartir fase</button>';
    html += '<button class="btn btn-ghost btn-sm" onclick="clearPhase()">Vaciar fase</button>';
  }
  html += '</div></div>';

  if (!phase.exercises || !phase.exercises.length){
    html += '<p class="text-muted text-sm" style="text-align:center;padding:1.5rem 0;">No hay ejercicios vinculados a esta fase. <a href="#" onclick="addExerciseToPhase();return false;">Agrega uno desde tu biblioteca</a>.</p>';
  } else {
    for (var i=0;i<phase.exercises.length;i++){
      html += phaseExerciseRowHtml(phase.exercises[i], i);
    }
  }

  panel.innerHTML = html;

  // Bind phase objective/criteria textareas
  var phaseFields = panel.querySelectorAll("[data-phase-field]");
  for (var f=0; f<phaseFields.length; f++){
    phaseFields[f].addEventListener("input", function(){
      var field = this.getAttribute("data-phase-field");
      var pp = getProtocol(_rehabState.openId);
      if (pp && pp.phases[_rehabState.activePhase]){
        pp.phases[_rehabState.activePhase][field] = this.value;
        pp.updatedAt = Date.now();
        saveState();
      }
    });
  }

  // Bind exercise param inputs
  var inputs = panel.querySelectorAll("[data-prow-idx]");
  for (var k=0;k<inputs.length;k++){
    inputs[k].addEventListener("input", function(){
      var ridx = parseInt(this.getAttribute("data-prow-idx"),10);
      var field = this.getAttribute("data-field");
      var pp = getProtocol(_rehabState.openId);
      var ex = pp && pp.phases[_rehabState.activePhase].exercises[ridx];
      if (ex){ ex[field] = this.value; pp.updatedAt = Date.now(); saveState(); }
    });
  }

  // Bind criteria checklist
  var critCbs = panel.querySelectorAll(".crit-cb");
  for (var cc=0; cc<critCbs.length; cc++){
    critCbs[cc].addEventListener("change", function(){
      toggleCrit(this.getAttribute("data-crit-key"), parseInt(this.getAttribute("data-crit-idx"),10), this.checked);
      var lbl = document.getElementById("crit-progress-label");
      if (lbl){
        var box = panel.querySelectorAll(".crit-cb");
        var done = 0;
        for (var z=0; z<box.length; z++) if (box[z].checked) done++;
        lbl.textContent = done+"/"+box.length+" cumplidos";
      }
    });
  }
}

function phaseExerciseRowHtml(ex, idx){
  var def = getExercise(ex.exerciseId);
  var name = def ? def.name : "Ejercicio";
  var sub = def ? ((def.muscle||"") + (def.equipment ? " · " + def.equipment : "")) : "";
  var hasGif = def && def.gif && /^https?:\/\//.test(def.gif);
  var thumb = hasGif
    ? '<img src="'+escapeAttr(def.gif)+'" alt="" loading="lazy" style="width:46px;height:46px;object-fit:cover;border-radius:8px;flex-shrink:0;" onerror="this.style.display=\'none\'">'
    : '';
  return '<div class="exercise-row">'
    + '<div class="ex-top">'
    + thumb
    + '<div class="ex-name">'+escapeHtml(name)+'<small>'+escapeHtml(sub)+'</small></div>'
    + '<div class="ex-actions">'
      + '<button class="btn btn-ghost btn-sm" onclick="changeProtocolExercise('+idx+')" title="Cambiar ejercicio">↻</button>'
      + '<button class="btn btn-ghost btn-sm" onclick="moveProtocolExercise('+idx+',-1)" title="Subir">↑</button>'
      + '<button class="btn btn-ghost btn-sm" onclick="moveProtocolExercise('+idx+',1)" title="Bajar">↓</button>'
      + '<button class="btn btn-ghost btn-sm" onclick="removeProtocolExercise('+idx+')" title="Eliminar">×</button>'
    + '</div>'
    + '</div>'
    + '<div class="ex-fields">'
      + '<div><span class="field-tag">Series</span><input type="text" data-prow-idx="'+idx+'" data-field="sets" value="'+escapeAttr(ex.sets||"")+'" placeholder="3"></div>'
      + '<div><span class="field-tag">Reps / Tiempo</span><input type="text" data-prow-idx="'+idx+'" data-field="reps" value="'+escapeAttr(ex.reps||"")+'" placeholder="10 ó 30s"></div>'
      + '<div><span class="field-tag">Carga</span><input type="text" data-prow-idx="'+idx+'" data-field="weight" value="'+escapeAttr(ex.weight||"")+'" placeholder="kg / banda"></div>'
      + '<div><span class="field-tag">Descanso</span><input type="text" data-prow-idx="'+idx+'" data-field="rest" value="'+escapeAttr(ex.rest||"")+'" placeholder="60s"></div>'
    + '</div>'
    + '<div><span class="field-tag">Indicaciones / Tempo / Progresión</span><input type="text" data-prow-idx="'+idx+'" data-field="notes" value="'+escapeAttr(ex.notes||"")+'" placeholder="Ej. excéntrico 3s, RIR 2, sin dolor" style="font-size:.82rem;padding:.4rem .5rem;"></div>'
    + '</div>';
}

function addExerciseToPhase(){
  var p = getProtocol(_rehabState.openId);
  if (!p) return;
  openExercisePicker(function(exId){
    p.phases[_rehabState.activePhase].exercises.push({ exerciseId: exId, sets:"3", reps:"10", weight:"", rest:"60s", notes:"" });
    p.updatedAt = Date.now();
    saveState();
    renderProtocolDetail();
  });
}
function changeProtocolExercise(idx){
  var p = getProtocol(_rehabState.openId);
  if (!p) return;
  openExercisePicker(function(exId){
    p.phases[_rehabState.activePhase].exercises[idx].exerciseId = exId;
    p.updatedAt = Date.now();
    saveState();
    renderPhasePanel();
  });
}
function moveProtocolExercise(idx, dir){
  var p = getProtocol(_rehabState.openId);
  if (!p) return;
  var arr = p.phases[_rehabState.activePhase].exercises;
  var ni = idx + dir;
  if (ni < 0 || ni >= arr.length) return;
  var tmp = arr[idx]; arr[idx] = arr[ni]; arr[ni] = tmp;
  p.updatedAt = Date.now();
  saveState();
  renderPhasePanel();
}
function removeProtocolExercise(idx){
  var p = getProtocol(_rehabState.openId);
  if (!p) return;
  p.phases[_rehabState.activePhase].exercises.splice(idx, 1);
  p.updatedAt = Date.now();
  saveState();
  renderProtocolDetail();
}
function clearPhase(){
  var p = getProtocol(_rehabState.openId);
  if (!p) return;
  if (!confirm("¿Vaciar todos los ejercicios de esta fase?")) return;
  p.phases[_rehabState.activePhase].exercises = [];
  p.updatedAt = Date.now();
  saveState();
  renderProtocolDetail();
}

function parseProtocolText(text){
  var lines = text.split("\n");
  var result = { name:"", region:"", description:"", segment:"", references:[], phases:[] };
  var currentPhase = null;
  var inRefs = false; // collecting general references block

  function extractRef(s){
    var url = "";
    var m = s.match(/(https?:\/\/\S+)/i);
    if (m){ url = m[1]; s = s.replace(m[1], "").trim(); }
    s = s.replace(/[–-]\s*$/,"").replace(/\s{2,}/g," ").trim();
    return { citation: s, url: url };
  }

  for (var i=0; i<lines.length; i++){
    var line = lines[i].trim();
    if (!line) continue;

    var mName = line.match(/^(?:protocolo|patolog[ií]a|condici[oó]n|nombre)\s*[:=]\s*(.+)/i);
    if (mName){ result.name = mName[1].trim(); inRefs=false; continue; }

    var mRegion = line.match(/^(?:regi[oó]n|zona)\s*[:=]\s*(.+)/i);
    if (mRegion){ result.region = mRegion[1].trim(); inRefs=false; continue; }

    var mSeg = line.match(/^(?:segmento|segment)\s*[:=]\s*(.+)/i);
    if (mSeg){
      var sv = mSeg[1].trim().toLowerCase();
      if (sv.indexOf("superior")>=0) result.segment="miembro-superior";
      else if (sv.indexOf("inferior")>=0) result.segment="miembro-inferior";
      else if (sv.indexOf("columna")>=0 || sv.indexOf("core")>=0 || sv.indexOf("tronco")>=0) result.segment="columna-core";
      else result.segment = deriveSegment(sv) || "otro";
      inRefs=false; continue;
    }

    var mDesc = line.match(/^(?:descripci[oó]n|notas?|observaciones?)\s*[:=]\s*(.+)/i);
    if (mDesc){ result.description = mDesc[1].trim(); inRefs=false; continue; }

    // References block header: "Referencias:", "Evidencia:", "Bibliografía:"
    var mRefHead = line.match(/^(?:referencias?|evidencia(?:\s+cient[ií]fica)?|bibliograf[ií]a|papers?)\s*[:=]?\s*(.*)$/i);
    if (mRefHead && !currentPhase){
      inRefs = true;
      var rest = (mRefHead[1]||"").trim();
      if (rest){ var rr = extractRef(rest); if (rr.citation || rr.url) result.references.push(rr); }
      continue;
    }

    // Phase header
    var mPhase = line.match(/^fase\s*(\d+)\s*[-–:.]*\s*(.*)$/i);
    if (mPhase){
      var pn = parseInt(mPhase[1],10) - 1;
      if (pn >= 0 && pn <= 3){
        currentPhase = { idx: pn, focus: (mPhase[2]||"").trim(), objetivo:"", criterios:"", exercises:[], references:[] };
        result.phases.push(currentPhase);
        inRefs = false;
        continue;
      }
    }

    // Inside general references block: each line is a reference
    if (inRefs && !currentPhase){
      var refLine = line.replace(/^[-*•·]+\s*/, "").replace(/^\d+[.)]\s*/, "").trim();
      if (refLine){ var gr = extractRef(refLine); if (gr.citation || gr.url) result.references.push(gr); }
      continue;
    }

    if (!currentPhase) continue;

    var mObj = line.match(/^(?:objetivo|meta)\s*[:=]\s*(.+)/i);
    if (mObj){ currentPhase.objetivo = mObj[1].trim(); continue; }

    var mCrit = line.match(/^(?:criterios?(?:\s+de\s+avance)?|avance|progresi[oó]n)\s*[:=]\s*(.+)/i);
    if (mCrit){ currentPhase.criterios = mCrit[1].trim(); continue; }

    // Per-phase reference: "Evidencia: ..." / "Referencia: ..." / "Paper: ..."
    var mPhaseRef = line.match(/^(?:evidencia|referencia|paper|cita)\s*[:=]\s*(.+)/i);
    if (mPhaseRef){ var pr = extractRef(mPhaseRef[1].trim()); if (pr.citation || pr.url) currentPhase.references.push(pr); continue; }

    // Otherwise: exercise line
    var exLine = line.replace(/^[-*•·]+\s*/, "").replace(/^\d+[.)]\s*/, "").trim();
    if (!exLine) continue;
    var parsed = parseExerciseLine(exLine);
    if (parsed){
      parsed.matchedId = fuzzyMatchExercise(parsed.name);
      currentPhase.exercises.push(parsed);
    }
  }
  return result;
}
