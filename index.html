<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#E21C25">
<title>Ultra-Sport 19 · Planificador de Rutinas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="US19">
<style>
:root{
  --bg:#0b1014;
  --surface-1:#131a21;
  --surface-2:#19232c;
  --surface-3:#1f2c37;
  --border:#283643;
  --text:#f1f5f9;
  --muted:#7d8e9f;
  --accent:#a8d139;
  --accent-dark:#8fb52f;
  --red:#d8392c;
  --red-dark:#b62e23;
  --teal:#2a5468;
  --success:#22c55e;
  --warn:#eab308;
  --danger:#ef4444;
  --radius:8px;
  --radius-sm:6px;
  --radius-lg:12px;
  --shadow:0 4px 18px rgba(0,0,0,.35);
  --shadow-lg:0 8px 32px rgba(0,0,0,.5);
  --font-display:'Bebas Neue', sans-serif;
  --font-body:'Manrope', system-ui, -apple-system, sans-serif;
  --font-mono:'JetBrains Mono', ui-monospace, monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);line-height:1.5;-webkit-font-smoothing:antialiased;}
body{min-height:100vh;min-height:100svh;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;color:inherit;background:var(--surface-3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.55rem .7rem;font-size:.9rem;outline:none;width:100%;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:60px;font-family:var(--font-body);}
a{color:var(--accent);text-decoration:none;}
img{max-width:100%;display:block;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--surface-1);}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:5px;}
::-webkit-scrollbar-thumb:hover{background:var(--border);}

/* ============ HEADER ============ */
.app-header{background:linear-gradient(180deg,var(--surface-2),var(--surface-1));border-bottom:1px solid var(--border);padding:1rem 1.25rem;position:sticky;top:0;z-index:50;}
.header-inner{display:flex;align-items:center;gap:1rem;max-width:1400px;margin:0 auto;}
.logo{width:64px;height:64px;flex:0 0 64px;border-radius:var(--radius);background:var(--surface-3);padding:4px;}
.logo img{width:100%;height:100%;object-fit:contain;border-radius:6px;}
.brand{flex:1;min-width:0;}
.brand-title{font-family:var(--font-display);font-size:2rem;letter-spacing:.06em;line-height:1;color:var(--text);}
.brand-title .num{color:var(--accent);}
.brand-tag{font-size:.7rem;letter-spacing:.25em;color:var(--muted);margin-top:.2rem;font-weight:600;}
.header-actions{display:flex;gap:.5rem;align-items:center;}
.icon-btn{width:42px;height:42px;display:inline-flex;align-items:center;justify-content:center;background:var(--surface-3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1.15rem;transition:all .15s;}
.icon-btn:hover{background:var(--surface-2);border-color:var(--accent);}

/* ============ TABS ============ */
.tab-bar{background:var(--surface-1);border-bottom:1px solid var(--border);padding:0 1.25rem;position:sticky;top:97px;z-index:40;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab-bar-inner{display:flex;gap:.25rem;max-width:1400px;margin:0 auto;}
.tab-btn{padding:.85rem 1.1rem;color:var(--muted);font-weight:600;font-size:.85rem;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent);border-color:var(--accent);}

/* ============ MAIN ============ */
.main{max-width:1400px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}
.view{display:none;}
.view.active{display:block;}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap;}
.section-title{font-family:var(--font-display);font-size:1.7rem;letter-spacing:.04em;}
.section-title .accent{color:var(--accent);}

/* ============ BUTTONS ============ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.45rem;padding:.65rem 1rem;border-radius:var(--radius);font-weight:700;font-size:.85rem;letter-spacing:.04em;text-transform:uppercase;transition:all .15s;border:1px solid transparent;line-height:1;}
.btn-primary{background:var(--accent);color:#0b1014;}
.btn-primary:hover{background:var(--accent-dark);}
.btn-secondary{background:var(--surface-3);color:var(--text);border-color:var(--border);}
.btn-secondary:hover{background:var(--surface-2);border-color:var(--accent);}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{background:var(--red-dark);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--accent);}
.btn-sm{padding:.45rem .7rem;font-size:.75rem;}
.btn-block{width:100%;}
.btn-wa{background:#25d366;color:#fff;}
.btn-wa:hover{background:#1fbf5b;}

/* ============ DASHBOARD ============ */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem;}
.stat-card{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;position:relative;overflow:hidden;}
.stat-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent);}
.stat-label{font-size:.7rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:.4rem;}
.stat-value{font-family:var(--font-display);font-size:2.5rem;line-height:1;letter-spacing:.04em;color:var(--text);}
.stat-extra{font-size:.75rem;color:var(--muted);margin-top:.3rem;}

/* ============ CARDS / LIST ============ */
.card{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.1rem;margin-bottom:.75rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;transition:border-color .15s;}
.card:hover{border-color:var(--surface-3);}
.card-main{flex:1;min-width:0;}
.card-title{font-weight:700;font-size:1.05rem;color:var(--text);margin-bottom:.2rem;line-height:1.2;}
.card-sub{font-size:.8rem;color:var(--muted);display:flex;flex-wrap:wrap;gap:.5rem .9rem;align-items:center;}
.card-actions{display:flex;gap:.4rem;flex-wrap:wrap;}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty-state h3{font-family:var(--font-display);font-size:1.5rem;color:var(--text);margin-bottom:.5rem;letter-spacing:.04em;}

/* ============ BADGES ============ */
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .55rem;border-radius:999px;font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:var(--surface-3);color:var(--muted);border:1px solid var(--border);}
.badge.green{background:rgba(168,209,57,.15);color:var(--accent);border-color:rgba(168,209,57,.3);}
.badge.red{background:rgba(216,57,44,.15);color:#f87171;border-color:rgba(216,57,44,.3);}
.badge.teal{background:rgba(42,84,104,.3);color:#7dd3fc;border-color:rgba(42,84,104,.5);}
.badge.warn{background:rgba(234,179,8,.15);color:var(--warn);border-color:rgba(234,179,8,.3);}
.badge.muted{background:var(--surface-2);}

/* ============ MODAL ============ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem;animation:fadeIn .15s;}
.modal-overlay.active{display:flex;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);max-width:640px;width:100%;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .2s;}
.modal.large{max-width:920px;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.modal-title{font-family:var(--font-display);font-size:1.4rem;letter-spacing:.04em;}
.modal-body{padding:1.25rem;overflow-y:auto;flex:1;}
.modal-footer{padding:1rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:.5rem;justify-content:flex-end;flex-wrap:wrap;}

/* ============ FORMS ============ */
.form-row{margin-bottom:.9rem;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.9rem;}
.form-grid.cols-2{grid-template-columns:repeat(2,1fr);}
.form-label{display:block;font-size:.75rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:.35rem;}
.field-hint{font-size:.7rem;color:var(--muted);margin-top:.25rem;line-height:1.3;}

/* ============ BUILDER ============ */
.builder-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.9rem;margin-bottom:1.1rem;background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;}
.day-tabs{display:flex;gap:.3rem;background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius);padding:.3rem;margin-bottom:1rem;overflow-x:auto;}
.day-tab{padding:.55rem .85rem;border-radius:var(--radius-sm);font-weight:700;font-size:.78rem;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;white-space:nowrap;flex:1;text-align:center;min-width:65px;transition:all .15s;position:relative;}
.day-tab:hover{color:var(--text);}
.day-tab.active{background:var(--accent);color:#0b1014;}
.day-tab .count{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:.6rem;width:16px;height:16px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;}
.day-tab.active .count{background:#0b1014;color:var(--accent);}
.day-panel{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;}
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;flex-wrap:wrap;gap:.5rem;}
.exercise-row{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem;margin-bottom:.6rem;display:grid;grid-template-columns:1fr;gap:.6rem;}
.exercise-row .ex-top{display:flex;align-items:center;gap:.6rem;}
.exercise-row .ex-name{flex:1;font-weight:700;font-size:.95rem;min-width:0;}
.exercise-row .ex-name small{display:block;font-weight:400;font-size:.72rem;color:var(--muted);margin-top:.1rem;}
.exercise-row .ex-fields{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;}
.exercise-row .ex-fields input{font-size:.82rem;padding:.4rem .5rem;}
.exercise-row .field-tag{font-size:.6rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;font-weight:700;display:block;margin-bottom:.15rem;}
.exercise-row .ex-actions{display:flex;gap:.3rem;}
.exercise-row .ex-actions button{padding:.3rem .5rem;font-size:.72rem;}

/* === MÓDULO PROTOCOLOS DE REHABILITACIÓN === */
.phase-tabs{display:flex;gap:.4rem;margin-bottom:1rem;overflow-x:auto;}
.phase-tab{flex:1;min-width:120px;padding:.7rem .6rem;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-1);cursor:pointer;text-align:center;transition:all .15s;position:relative;}
.phase-tab .ph-num{display:block;font-family:var(--font-display);font-size:1.2rem;letter-spacing:.04em;line-height:1;}
.phase-tab .ph-lbl{display:block;font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:.25rem;font-weight:700;}
.phase-tab .ph-cnt{display:block;font-size:.65rem;color:var(--muted);margin-top:.2rem;}
.phase-tab:hover{border-color:var(--muted);}
.phase-tab.active{border-width:2px;}
.phase-tab.ph1{color:#ff6b6b;} .phase-tab.ph1.active{border-color:#ff6b6b;background:rgba(255,107,107,.10);}
.phase-tab.ph2{color:#ffa94d;} .phase-tab.ph2.active{border-color:#ffa94d;background:rgba(255,169,77,.10);}
.phase-tab.ph3{color:var(--teal,#4dd0c7);} .phase-tab.ph3.active{border-color:var(--teal,#4dd0c7);background:rgba(77,208,199,.10);}
.phase-tab.ph4{color:var(--accent);} .phase-tab.ph4.active{border-color:var(--accent);background:rgba(180,230,80,.10);}
.phase-tab.active .ph-lbl,.phase-tab.active .ph-cnt{color:inherit;}
.phase-panel{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;}
.phase-banner{border-radius:var(--radius);padding:.85rem 1rem;margin-bottom:1rem;border-left:4px solid var(--accent);background:var(--surface-2);}
.phase-banner.ph1{border-left-color:#ff6b6b;} .phase-banner.ph2{border-left-color:#ffa94d;}
.phase-banner.ph3{border-left-color:var(--teal,#4dd0c7);} .phase-banner.ph4{border-left-color:var(--accent);}
.phase-banner h4{font-family:var(--font-display);letter-spacing:.04em;font-size:1.15rem;margin-bottom:.3rem;}
.phase-field{margin-bottom:.6rem;}
.phase-field label{font-size:.62rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;font-weight:700;display:block;margin-bottom:.2rem;}
.phase-field textarea{width:100%;min-height:48px;font-size:.85rem;line-height:1.45;resize:vertical;}
.protocol-card .card-sub{flex-wrap:wrap;}
.phase-dot{display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;color:var(--muted);}
.phase-dot i{width:9px;height:9px;border-radius:50%;display:inline-block;font-style:normal;}
.ref-section{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;margin-top:1rem;}
.ref-item{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:.7rem .85rem;margin-bottom:.55rem;display:flex;gap:.6rem;align-items:flex-start;}
.ref-item .ref-body{flex:1;min-width:0;}
.ref-item .ref-cite{font-size:.85rem;line-height:1.45;}
.ref-item .ref-note{font-size:.72rem;color:var(--muted);margin-top:.25rem;line-height:1.4;}
.ref-item .ref-link{font-size:.74rem;color:var(--teal,#4dd0c7);word-break:break-all;display:inline-flex;align-items:center;gap:.25rem;margin-top:.25rem;text-decoration:none;}
.ref-item .ref-link:hover{text-decoration:underline;}
.ref-item .ref-acts{display:flex;gap:.25rem;flex-shrink:0;}
.ref-item .ref-acts button{padding:.25rem .45rem;font-size:.72rem;}
.ref-badge{display:inline-block;font-size:.6rem;letter-spacing:.05em;text-transform:uppercase;font-weight:700;padding:.12rem .4rem;border-radius:999px;background:var(--surface-1);border:1px solid var(--border);color:var(--muted);margin-left:.4rem;vertical-align:middle;}
.phase-refs{margin-top:.7rem;padding-top:.6rem;border-top:1px dashed var(--border);}
.phase-refs .pr-title{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--muted);margin-bottom:.3rem;}
.phase-refs a{font-size:.78rem;color:var(--teal,#4dd0c7);text-decoration:none;display:block;margin-bottom:.2rem;line-height:1.35;word-break:break-word;}
.phase-refs a:hover{text-decoration:underline;}
.phase-refs .pr-plain{font-size:.78rem;color:var(--text);display:block;margin-bottom:.2rem;line-height:1.35;}

/* ============ EXERCISE LIBRARY ============ */
.exercise-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.85rem;}
.ex-card{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s;}
.ex-card:hover{border-color:var(--accent);}
.ex-card .ex-thumb{aspect-ratio:16/10;background:var(--surface-3);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:2rem;overflow:hidden;}
.ex-card .ex-thumb img{width:100%;height:100%;object-fit:cover;}
.ex-card .ex-body{padding:.75rem;flex:1;display:flex;flex-direction:column;gap:.4rem;}
.ex-card .ex-body h4{font-size:.92rem;font-weight:700;line-height:1.25;}
.ex-card .ex-body .ex-meta{display:flex;gap:.3rem;flex-wrap:wrap;}
.ex-card .ex-body .ex-acts{display:flex;gap:.3rem;margin-top:auto;padding-top:.5rem;}
.lib-toolbar{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.lib-toolbar input{flex:1;min-width:200px;}
.lib-toolbar select{flex:0 0 auto;width:auto;min-width:140px;}

/* ============ SHARE MODAL ============ */
.share-qr-wrap{text-align:center;background:#fff;padding:1.25rem;border-radius:var(--radius-lg);margin-bottom:1rem;}
.share-qr-wrap svg{display:block;margin:0 auto;max-width:100%;height:auto;}
.share-link-box{background:var(--surface-3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.6rem .8rem;font-family:var(--font-mono);font-size:.75rem;color:var(--muted);word-break:break-all;margin-bottom:.75rem;max-height:80px;overflow-y:auto;}
.share-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;}

/* ============ CLIENT VIEW ============ */
.client-hero{background:linear-gradient(135deg,var(--surface-2),var(--surface-1));border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;gap:1rem;}
.client-hero .hero-logo{width:72px;height:72px;flex:0 0 72px;border-radius:var(--radius);background:var(--surface-3);padding:4px;}
.client-hero .hero-logo img{width:100%;height:100%;object-fit:contain;border-radius:6px;}
.client-hero h1{font-family:var(--font-display);font-size:2rem;letter-spacing:.04em;line-height:1;}
.client-hero .hero-sub{font-size:.8rem;color:var(--muted);margin-top:.3rem;letter-spacing:.05em;text-transform:uppercase;font-weight:700;}
.client-hero .hero-meta{font-size:.95rem;color:var(--accent);margin-top:.4rem;font-weight:700;}
.day-section{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1rem;overflow:hidden;}
.day-section-header{padding:.85rem 1.1rem;background:var(--surface-2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
.day-section-header h3{font-family:var(--font-display);font-size:1.3rem;letter-spacing:.04em;}
.client-exercise{padding:.9rem 1.1rem;border-bottom:1px solid var(--border);}
.client-exercise:last-child{border-bottom:none;}
.client-ex-name{font-weight:700;font-size:1rem;cursor:pointer;color:var(--accent);display:inline-block;margin-bottom:.4rem;}
.client-ex-name:hover{text-decoration:underline;}
.client-ex-meta{font-size:.78rem;color:var(--muted);margin-bottom:.6rem;font-family:var(--font-mono);}
.set-row{display:grid;grid-template-columns:auto 60px 1fr 1fr;gap:.5rem;align-items:center;padding:.4rem 0;border-top:1px solid var(--border);}
.set-row:first-child{border-top:none;}
.set-row label.cb{display:flex;align-items:center;justify-content:center;}
.set-row .cb input{width:22px;height:22px;cursor:pointer;accent-color:var(--accent);}
.set-row .set-num{font-weight:700;color:var(--muted);font-size:.85rem;font-family:var(--font-mono);}
.set-row input[type="text"]{padding:.4rem .55rem;font-size:.8rem;}
.set-row.done{background:rgba(168,209,57,.05);}

/* ============ PROGRESS REPORT ============ */
.progress-summary{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem;}
.progress-pct{font-family:var(--font-display);font-size:3.5rem;letter-spacing:.04em;line-height:1;}
.progress-pct.high{color:var(--accent);}
.progress-pct.mid{color:var(--warn);}
.progress-pct.low{color:var(--danger);}
.progress-bar{height:8px;background:var(--surface-3);border-radius:4px;overflow:hidden;margin:.6rem 0;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));border-radius:4px;transition:width .5s;}
.report-set{display:inline-block;width:18px;height:18px;border-radius:4px;margin:0 2px 2px 0;background:var(--surface-3);border:1px solid var(--border);position:relative;cursor:default;}
.report-set.done{background:var(--success);border-color:var(--success);}
.report-set.partial{background:var(--warn);border-color:var(--warn);}

/* ============ TOAST ============ */
.toast-wrap{position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:.5rem;pointer-events:none;}
.toast{background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--accent);padding:.75rem 1.1rem;border-radius:var(--radius);font-size:.85rem;box-shadow:var(--shadow);animation:toastIn .25s;pointer-events:auto;max-width:90vw;}
.toast.error{border-left-color:var(--danger);}
.toast.warn{border-left-color:var(--warn);}
.toast.success{border-left-color:var(--accent);}
@keyframes toastIn{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ============ BANNER ============ */
.preview-banner{background:rgba(234,179,8,.15);border-bottom:1px solid rgba(234,179,8,.4);color:var(--warn);padding:.5rem 1rem;font-size:.78rem;text-align:center;font-weight:600;}
.preview-banner a{color:var(--warn);text-decoration:underline;}

/* ============ HELPERS ============ */
.flex{display:flex;}
.flex-col{display:flex;flex-direction:column;}
.gap-sm{gap:.5rem;}
.gap-md{gap:1rem;}
.mb-sm{margin-bottom:.5rem;}
.mb-md{margin-bottom:1rem;}
.mb-lg{margin-bottom:1.5rem;}
.mt-sm{margin-top:.5rem;}
.mt-md{margin-top:1rem;}
.text-muted{color:var(--muted);}
.text-sm{font-size:.85rem;}
.text-xs{font-size:.75rem;}
.hidden{display:none !important;}
.divider{height:1px;background:var(--border);margin:1rem 0;}
.kbd{font-family:var(--font-mono);background:var(--surface-3);border:1px solid var(--border);padding:.1rem .35rem;border-radius:4px;font-size:.78rem;}

/* ============ RESPONSIVE ============ */
@media (max-width:680px){
  .brand-title{font-size:1.6rem;}
  .brand-tag{font-size:.6rem;}
  .logo{width:52px;height:52px;flex:0 0 52px;}
  .icon-btn{width:38px;height:38px;font-size:1rem;}
  .tab-bar{top:84px;}
  .tab-btn{padding:.7rem .75rem;font-size:.78rem;}
  .stat-value{font-size:2rem;}
  .exercise-row .ex-fields{grid-template-columns:repeat(2,1fr);}
  .form-grid.cols-2{grid-template-columns:1fr;}
  .share-grid{grid-template-columns:1fr;}
  .main{padding:1rem 1rem 4rem;}
  .modal{max-height:95vh;}
  .client-hero{flex-direction:column;text-align:center;}
}
@media (max-width:420px){
  .header-actions .icon-btn{width:36px;height:36px;}
  .day-tab{font-size:.7rem;padding:.5rem .55rem;min-width:50px;}
  .set-row{grid-template-columns:auto 50px 1fr 1fr;font-size:.78rem;}
}

/* ============ ENHANCED CLIENT VIEW ============ */
.ex-block{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1rem;overflow:hidden;}
.ex-block-header{padding:.85rem 1.1rem;background:var(--surface-2);display:flex;align-items:flex-start;gap:.75rem;flex-wrap:wrap;}
.ex-block-num{width:28px;height:28px;background:var(--accent);color:#0b1014;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;flex:0 0 28px;margin-top:.1rem;}
.ex-block-name{flex:1;min-width:0;}
.ex-block-name h4{font-size:1.05rem;font-weight:700;line-height:1.25;color:var(--text);margin-bottom:.3rem;}
.ex-block-name .meta{display:flex;gap:.3rem;flex-wrap:wrap;}
.ex-block-status{display:flex;align-items:center;gap:.3rem;}
.status-pill{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .6rem;border-radius:999px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.status-pill.done{background:rgba(34,197,94,.15);color:var(--success);border:1px solid rgba(34,197,94,.3);}
.status-pill.partial{background:rgba(234,179,8,.15);color:var(--warn);border:1px solid rgba(234,179,8,.3);}
.status-pill.pending{background:var(--surface-3);color:var(--muted);border:1px solid var(--border);}

.ex-gif-block{background:#000;border-bottom:1px solid var(--border);display:flex;justify-content:center;align-items:center;max-height:240px;overflow:hidden;cursor:pointer;position:relative;}
.ex-gif-block img{max-height:240px;width:100%;object-fit:contain;display:block;}
.ex-gif-block .gif-placeholder{padding:2rem;color:var(--muted);font-size:2.5rem;text-align:center;}
.badge.terap{background:rgba(226,28,37,.16);color:#ff8a8f;border:1px solid rgba(226,28,37,.45);}
.badge.contr{background:rgba(58,134,255,.16);color:#7db2ff;border:1px solid rgba(58,134,255,.45);}
.ex-gif-expand{position:absolute;bottom:.4rem;right:.4rem;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:4px;padding:.2rem .45rem;font-size:.7rem;cursor:pointer;}

.ex-tips{padding:.75rem 1.1rem;border-bottom:1px solid var(--border);background:rgba(168,209,57,.04);}
.ex-tips h5{font-size:.7rem;letter-spacing:.15em;color:var(--accent);text-transform:uppercase;font-weight:700;margin-bottom:.4rem;}
.ex-tips ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:.3rem;}
.ex-tips ul li{font-size:.82rem;color:var(--text);padding-left:1rem;position:relative;line-height:1.4;}
.ex-tips ul li::before{content:"→";position:absolute;left:0;color:var(--accent);font-weight:700;}

.ex-sets-table{width:100%;border-collapse:collapse;}
.ex-sets-table th{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:.4rem .6rem;background:var(--surface-2);border-bottom:1px solid var(--border);text-align:center;font-weight:700;}
.ex-sets-table th.plan-col{color:var(--muted);}
.ex-sets-table th.actual-col{color:var(--accent);}
.ex-sets-table td{padding:.4rem .5rem;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle;}
.ex-sets-table tr:last-child td{border-bottom:none;}
.ex-sets-table tr.set-done{background:rgba(34,197,94,.05);}
.ex-sets-table tr.set-partial{background:rgba(234,179,8,.05);}
.ex-sets-table .set-num-cell{font-weight:700;color:var(--muted);font-size:.8rem;font-family:var(--font-mono);min-width:40px;}
.ex-sets-table .plan-cell{color:var(--muted);font-size:.8rem;font-family:var(--font-mono);}
.ex-sets-table td input[type="text"],
.ex-sets-table td input[type="number"]{width:64px;padding:.3rem .4rem;font-size:.8rem;text-align:center;font-family:var(--font-mono);}
.ex-sets-table td input.rpe-input{width:50px;}
.ex-sets-table td input.eva-input{width:50px;}
.ex-sets-table .cb-cell input{width:20px;height:20px;accent-color:var(--accent);}

.ex-comment-row{padding:.6rem 1rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:.6rem;}
.ex-comment-row label{font-size:.7rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;font-weight:700;white-space:nowrap;}
.ex-comment-row input{flex:1;font-size:.82rem;padding:.35rem .6rem;}

/* Session checklist summary */
.session-summary{background:var(--surface-1);border:2px solid var(--border);border-radius:var(--radius-lg);margin:1.5rem 0;overflow:hidden;}
.session-summary-header{background:var(--surface-2);padding:.85rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
.session-summary-header h3{font-family:var(--font-display);font-size:1.3rem;letter-spacing:.04em;}
.session-summary-body{padding:1rem 1.1rem;}
.summary-stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:.75rem;margin-bottom:1rem;}
.summary-stat{text-align:center;background:var(--surface-2);border-radius:var(--radius);padding:.75rem .5rem;}
.summary-stat .val{font-family:var(--font-display);font-size:2rem;letter-spacing:.04em;line-height:1;}
.summary-stat .lbl{font-size:.65rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-top:.2rem;}
.checklist-row{display:flex;align-items:center;gap:.6rem;padding:.4rem .2rem;border-bottom:1px solid var(--border);font-size:.88rem;}
.checklist-row:last-child{border-bottom:none;}
.checklist-row .ci{width:18px;height:18px;border-radius:4px;flex:0 0 18px;display:flex;align-items:center;justify-content:center;font-size:.75rem;}
.checklist-row .ci.done{background:var(--success);}
.checklist-row .ci.partial{background:var(--warn);}
.checklist-row .ci.pending{background:var(--surface-3);border:1px solid var(--border);}
.checklist-row .ex-name-cl{flex:1;}
.checklist-row .sets-cl{font-size:.75rem;color:var(--muted);font-family:var(--font-mono);}

.session-notes-row{margin-top:.75rem;}
.session-date-row{display:flex;align-items:center;gap:.6rem;margin-top:.6rem;}
.session-date-row label{font-size:.75rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;font-weight:700;white-space:nowrap;}

/* Client action bar */
.client-action-bar{position:sticky;bottom:0;background:var(--surface-1);border-top:1px solid var(--border);padding:.85rem 1.1rem;display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;z-index:30;box-shadow:0 -4px 16px rgba(0,0,0,.3);}
.cat-bar{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center;}
.cat-pill{display:inline-flex;align-items:center;gap:.3rem;padding:.4rem .75rem;border-radius:999px;font-size:.75rem;font-weight:700;letter-spacing:.04em;cursor:pointer;border:1px solid var(--border);background:var(--surface-2);color:var(--muted);transition:all .15s;white-space:nowrap;}
.cat-pill:hover{border-color:var(--accent);color:var(--text);}
.cat-pill.active{background:var(--accent);color:#0b1014;border-color:var(--accent);}
.cat-pill .cat-count{background:rgba(0,0,0,.15);padding:.05rem .35rem;border-radius:999px;font-size:.65rem;margin-left:.1rem;}
.cat-pill.active .cat-count{background:rgba(0,0,0,.25);}
.cat-icon{font-size:.9rem;line-height:1;}

/* ============ SYNC INDICATOR ============ */
.sync-badge{display:inline-flex;align-items:center;gap:.35rem;padding:.25rem .6rem;border-radius:999px;font-size:.65rem;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:all .2s;border:1px solid transparent;}
.sync-badge.idle{background:var(--surface-3);color:var(--muted);border-color:var(--border);}
.sync-badge.syncing{background:rgba(168,209,57,.12);color:var(--accent);border-color:rgba(168,209,57,.3);}
.sync-badge.synced{background:rgba(34,197,94,.12);color:var(--success);border-color:rgba(34,197,94,.3);}
.sync-badge.error{background:rgba(239,68,68,.12);color:var(--danger);border-color:rgba(239,68,68,.3);}
.sync-badge.off{background:var(--surface-3);color:var(--muted);border-color:var(--border);opacity:.6;}
.sync-dot{width:8px;height:8px;border-radius:50%;flex:0 0 8px;}
.sync-badge.syncing .sync-dot{background:var(--accent);animation:syncPulse 1s infinite;}
.sync-badge.synced .sync-dot{background:var(--success);}
.sync-badge.error .sync-dot{background:var(--danger);}
.sync-badge.idle .sync-dot,.sync-badge.off .sync-dot{background:var(--muted);}
@keyframes syncPulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ============ PRINT ============ */
@media print{
  .app-header,.tab-bar,.client-action-bar,.btn,.icon-btn,.modal-overlay,
  #preview-banner,.ex-comment-row label + input,
  .ex-gif-expand{display:none !important;}

  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  body{background:#fff !important;color:#000 !important;font-size:11pt;}
  .main{padding:.5cm 1cm;}
  .client-hero{background:#f8f8f8 !important;border:1px solid #ccc !important;color:#000 !important;border-radius:6px;page-break-inside:avoid;}
  .client-hero h1,.client-hero .hero-sub,.client-hero .hero-meta{color:#000 !important;}
  .day-section{border:1px solid #ccc !important;background:#fff !important;page-break-inside:avoid;margin-bottom:.4cm;}
  .day-section-header{background:#f3f3f3 !important;color:#000 !important;border-bottom:1px solid #ccc !important;}
  .day-section-header h3{color:#000 !important;}
  .ex-block{border:1px solid #ddd !important;background:#fff !important;page-break-inside:avoid;margin-bottom:.3cm;}
  .ex-block-header{background:#f8f8f8 !important;}
  .ex-block-name h4{color:#000 !important;}
  .ex-gif-block{max-height:160px;border-bottom:1px solid #ddd !important;}
  .ex-tips{background:#f9fff0 !important;}
  .ex-tips h5{color:#5a7a00 !important;}
  .ex-tips ul li{color:#000 !important;}
  .ex-tips ul li::before{color:#5a7a00 !important;}
  .ex-sets-table th{background:#f3f3f3 !important;color:#555 !important;}
  .ex-sets-table th.actual-col{color:#5a7a00 !important;}
  .ex-sets-table tr.set-done{background:#f0fff4 !important;}
  .ex-sets-table tr.set-partial{background:#fffbeb !important;}
  .ex-sets-table td input{
    border:none !important;background:transparent !important;
    color:#000 !important;font-family:monospace;
  }
  /* Convert checkboxes to text indicators */
  .ex-sets-table td input[type="checkbox"]{display:none;}
  .ex-sets-table tr.set-done .cb-cell::after{content:"✓";color:#22c55e;font-weight:700;font-size:1rem;}
  .ex-sets-table tr.set-partial .cb-cell::after{content:"○";color:#eab308;font-weight:700;font-size:1rem;}
  .ex-sets-table tr.set-pending .cb-cell::after{content:"—";color:#999;font-size:1rem;}
  .badge{border:1px solid #ccc !important;color:#444 !important;background:#f3f3f3 !important;}
  .badge.green{border-color:#a8d139 !important;color:#5a7a00 !important;background:#f0fff0 !important;}
  .session-summary{border:1px solid #ccc !important;background:#fff !important;}
  .session-summary-header{background:#f3f3f3 !important;color:#000 !important;}
  .summary-stat{background:#f8f8f8 !important;}
  .summary-stat .val,.summary-stat .lbl{color:#000 !important;}
  .progress-bar{background:#eee !important;}
  .progress-bar-fill{background:#a8d139 !important;}
  .text-muted{color:#666 !important;}
  .session-notes-row textarea{border:1px solid #ccc !important;background:#fff !important;color:#000 !important;}
  .checklist-row .ci.done{background:#22c55e !important;color:#fff;}
  .checklist-row .ci.partial{background:#eab308 !important;color:#fff;}
  .brand-print-footer{display:block !important;}
  .status-pill.done{background:#f0fff4 !important;color:#15803d !important;}
  .status-pill.partial{background:#fffbeb !important;color:#92400e !important;}
  .status-pill.pending{background:#f3f4f6 !important;color:#6b7280 !important;}
}
.brand-print-footer{display:none;text-align:center;margin-top:1cm;padding-top:.5cm;border-top:1px solid #ccc;}
</style>
</head>
<body>

<div id="preview-banner" class="preview-banner hidden"></div>

<header class="app-header" id="trainer-header">

      <span class="sync-badge off" id="sync-badge" onclick="window.manualSync()" title="Sincronización"><span class="sync-dot"></span><span id="sync-label">Sync off</span></span>

<style>
/* — Mejoras v1.1 — */
.rest-chip{border:1px solid var(--border);background:var(--surface-2);color:var(--accent);border-radius:999px;padding:.15rem .6rem;font-size:.72rem;font-weight:700;cursor:pointer;font-family:var(--font-mono);}
.rest-chip:active{transform:scale(.96);}
#rest-timer-float{position:fixed;bottom:90px;right:16px;z-index:9999;background:var(--surface-1,#111);border:2px solid var(--accent,#0af);border-radius:16px;padding:.9rem 1.2rem;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.45);min-width:130px;}
#rest-timer-float .rt-time{font-family:var(--font-mono);font-size:1.9rem;font-weight:800;color:var(--accent);line-height:1.1;}
#rest-timer-float .rt-label{font-size:.68rem;letter-spacing:.12em;color:var(--muted,#888);text-transform:uppercase;}
#rest-timer-float button{margin-top:.45rem;}
#rest-timer-float.rt-done .rt-time{color:var(--success,#2fbf71);font-size:1.3rem;}
.week-notes{margin-bottom:1rem;border:1px solid var(--border);border-radius:var(--radius-lg,12px);padding:.6rem .9rem;background:var(--surface-1);}
.week-notes summary{cursor:pointer;font-weight:700;font-size:.9rem;}
.week-notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.55rem;margin-top:.7rem;}
.hist-chart-wrap{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-lg,12px);padding:1rem;margin-top:1rem;}
.hist-session-row{display:flex;align-items:center;gap:.7rem;padding:.5rem .2rem;border-bottom:1px solid var(--border);font-size:.85rem;flex-wrap:wrap;}
.adh-row{display:flex;align-items:center;gap:.7rem;padding:.55rem .2rem;border-bottom:1px solid var(--border);font-size:.87rem;flex-wrap:wrap;}
.adh-row:last-child{border-bottom:none;}
.adh-alert{color:var(--warn);font-weight:700;}
.backup-banner{display:flex;align-items:center;justify-content:space-between;gap:.8rem;flex-wrap:wrap;background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.35);border-radius:var(--radius-lg,12px);padding:.7rem 1rem;margin-bottom:1rem;}
.prog-suggest{margin:.4rem 0 .5rem;padding:.45rem .7rem;border:1px dashed var(--accent);border-radius:8px;color:var(--accent);font-size:.8rem;font-weight:600;}
.today-banner{display:flex;align-items:center;justify-content:space-between;gap:.8rem;flex-wrap:wrap;background:var(--surface-1);border:1px solid var(--accent);border-radius:var(--radius-lg,12px);padding:.75rem 1rem;margin-bottom:1.25rem;}
.today-banner.rest{border-color:var(--border);color:var(--muted);}
.today-section{border-left:3px solid var(--accent);padding-left:.7rem;}
#live-player{position:fixed;inset:0;z-index:9998;background:var(--bg,#0b0f14);overflow-y:auto;padding:1rem;}
.lp-inner{max-width:640px;margin:0 auto;padding-bottom:3rem;}
.lp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;}
.lp-count{font-family:var(--font-mono);color:var(--muted);font-size:.85rem;}
.lp-name{font-family:var(--font-display);font-size:1.5rem;margin-bottom:.4rem;}
.lp-meta{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;margin-bottom:.7rem;}
.lp-gif{background:#000;border-radius:12px;text-align:center;margin-bottom:.8rem;}
.lp-gif img{max-height:38vh;max-width:100%;border-radius:12px;}
.lp-table{width:100%;}
.lp-nav{display:flex;justify-content:space-between;gap:.6rem;margin-top:1rem;}
.lp-nav .btn{flex:1;padding:.8rem;}
.crit-list{margin-top:.6rem;background:rgba(0,0,0,.15);border:1px solid var(--border);border-radius:10px;padding:.6rem .8rem;}
.crit-row{display:flex;gap:.55rem;align-items:flex-start;padding:.3rem 0;cursor:pointer;font-size:.85rem;}
.crit-row input{width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;margin-top:.1rem;}
.gsearch-wrap{position:relative;}
.gsearch-input{background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:.4rem .8rem;color:var(--text);font-size:.85rem;width:130px;}
.gsearch-input:focus{width:190px;outline:none;border-color:var(--accent);}
.gsearch-results{position:absolute;top:120%;right:0;min-width:260px;max-height:340px;overflow-y:auto;background:var(--surface-1,#111);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:9999;display:none;}
.gs-item{padding:.55rem .8rem;cursor:pointer;font-size:.85rem;border-bottom:1px solid var(--border);}
.gs-item:last-child{border-bottom:none;}
.gs-item:hover{background:var(--surface-2);}
/* — REHAB-CLÍNICO — */
.rc-sem{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:.3rem;vertical-align:middle;flex-shrink:0;}
.rc-sem.v{background:#2fbf71;}.rc-sem.a{background:#eab308;}.rc-sem.r{background:#e5484d;box-shadow:0 0 6px rgba(229,72,77,.6);}
.rc-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.55rem;margin:.7rem 0 .4rem;}
.rc-tile{display:flex;flex-direction:column;align-items:flex-start;gap:.15rem;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:.7rem .8rem;cursor:pointer;text-align:left;color:var(--text);font:inherit;transition:border-color .15s;}
.rc-tile:hover{border-color:var(--accent);}
.rc-tile .rc-tile-ic{font-size:1.15rem;}
.rc-tile .rc-tile-lb{font-weight:700;font-size:.85rem;}
.rc-tile .rc-tile-sub{font-size:.7rem;color:var(--muted);}
.rc-banner{border-radius:12px;padding:.65rem .9rem;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
.rc-banner.ok{background:rgba(47,191,113,.1);border:1px solid rgba(47,191,113,.35);color:#6fe0a8;}
.rc-banner.bad{background:rgba(229,72,77,.12);border:1px solid rgba(229,72,77,.45);color:#ff8a8e;}
.rc-banner.warn{background:rgba(234,179,8,.09);border:1px solid rgba(234,179,8,.35);color:var(--warn,#eab308);}
.rc-dynrow{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:.4rem;align-items:center;margin-bottom:.4rem;}
.rc-dynrow input,.rc-dynrow select{width:100%;font-size:.85rem;padding:.4rem .5rem;}
.rc-dynrow.t3{grid-template-columns:2.2fr 1fr auto;}
.rc-cmp{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:.5rem;}
.rc-cmp th{text-align:left;color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;padding:.4rem .5rem;border-bottom:1px solid var(--border);}
.rc-cmp td{padding:.45rem .5rem;border-bottom:1px solid var(--border);}
.rc-up{color:#2fbf71;font-weight:700;}.rc-down{color:#e5484d;font-weight:700;}.rc-eq{color:var(--muted);}
.rc-painrow{display:flex;align-items:center;gap:.6rem;padding:.4rem .1rem;border-bottom:1px solid var(--border);font-size:.83rem;flex-wrap:wrap;}
.rc-painrow:last-child{border-bottom:none;}
.rc-flagitem{display:flex;gap:.55rem;align-items:flex-start;padding:.35rem 0;cursor:pointer;font-size:.86rem;line-height:1.35;}
.rc-flagitem input{width:17px;height:17px;accent-color:#e5484d;flex-shrink:0;margin-top:.1rem;}
.rc-disclaimer{font-size:.68rem;color:var(--muted);opacity:.8;line-height:1.4;margin-top:.9rem;border-top:1px dashed var(--border);padding-top:.55rem;}
@media (max-width:560px){ .rc-dynrow{grid-template-columns:1.6fr 1fr 1fr 1fr auto;} }

// Builds the base URL for share links. When the app is served over http(s),
// it ALWAYS uses the real location where the app is running (ground truth),
// so a typo in the saved base URL can never break share links. Falls back to
// the saved/default base only when running from file://.
function getAppBaseUrl(preferred){
  if (location.protocol === "http:" || location.protocol === "https:"){
    var path = (location.pathname || "/").replace(/[^\/]*\.html?$/i, "");
    if (!/\/$/.test(path)) path += "/";
    return location.origin + path;
  }
  return (preferred || settings.baseUrl || DEFAULT_BASE_URL).replace(/#.*$/,"").replace(/\/+$/,"") + "/";
}

/* ============================================================
   ARQUITECTURA DE DATOS: rama "data" separada de GitHub Pages.
   Los guardados (rutinas compartidas, progresos, sync) van a la
   rama "data". GitHub Pages solo reconstruye el sitio cuando
   cambia "main" (el index.html), así el tráfico de datos nunca
   puede volver a botar la página (límite ~10 builds/hora).
   ============================================================ */
var DATA_BRANCH = "data";

// Deriva "owner/repo" desde la URL real cuando la app corre en GitHub Pages.
// Fuente de verdad que corrige nombres de repo desactualizados en Ajustes.
function getDerivedRepo(){
  try {
    if (!/\.github\.io$/i.test(location.hostname)) return null;
    var owner = location.hostname.replace(/\.github\.io$/i, "");
    var seg = (location.pathname || "/").split("/").filter(function(x){ return !!x; })[0];
    if (!owner || !seg) return null;
    return owner + "/" + seg;
  } catch(e){ return null; }
}

// Crea la rama de datos si no existe (una sola vez por sesión y repo).
var _branchReadyCache = {};
function ensureDataBranch(repoFull, token){
  var key = repoFull + "|" + DATA_BRANCH;
  if (_branchReadyCache[key]) return _branchReadyCache[key];
  var H = { "Authorization": "token " + token, "Accept": "application/vnd.github+json" };
  _branchReadyCache[key] = fetch("https://api.github.com/repos/" + repoFull + "/branches/" + DATA_BRANCH, { headers: H })
    .then(function(r){
      if (r.ok) return true;
      if (r.status !== 404) throw new Error("HTTP " + r.status + " verificando rama de datos");
      return fetch("https://api.github.com/repos/" + repoFull, { headers: H })
        .then(function(r0){ if (!r0.ok) throw new Error("HTTP " + r0.status + " leyendo repo"); return r0.json(); })
        .then(function(info){
          var base = info.default_branch || "main";
          return fetch("https://api.github.com/repos/" + repoFull + "/git/refs/heads/" + encodeURIComponent(base), { headers: H });
        })
        .then(function(r1){ if (!r1.ok) throw new Error("No pude leer la rama base"); return r1.json(); })
        .then(function(ref){
          return fetch("https://api.github.com/repos/" + repoFull + "/git/refs", {
            method: "POST",
            headers: { "Authorization": "token " + token, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
            body: JSON.stringify({ ref: "refs/heads/" + DATA_BRANCH, sha: ref.object.sha })
          });
        })
        .then(function(r2){
          if (r2.ok || r2.status === 422) return true; // 422 = ya existe (carrera)
          throw new Error("No pude crear la rama de datos (HTTP " + r2.status + ")");
        });
    })
    .catch(function(e){ delete _branchReadyCache[key]; throw e; });
  return _branchReadyCache[key];
}

// Candidatos (repo × rama) para descargar archivos compartidos, en orden de
// probabilidad. Cubre links viejos (rama main, repos renombrados) y nuevos.
function rawDownloadCandidates(cfgRepo, cfgBranch){
  var repos = [], branches = [], out = [];
  function addR(r){ if (r && r.split("/").length === 2 && repos.indexOf(r) < 0) repos.push(r); }
  function addB(b){ if (b && branches.indexOf(b) < 0) branches.push(b); }
  addR(cfgRepo); addR(getDerivedRepo()); addR(settings.githubRepo);
  addB(cfgBranch); addB(DATA_BRANCH); addB("main"); addB(settings.githubBranch);
  for (var i = 0; i < repos.length; i++)
    for (var j = 0; j < branches.length; j++)
      out.push({ repo: repos[i], branch: branches[j] });
  return out.slice(0, 6);
}

function fetchRawWithFallback(pathInRepo, cfgRepo, cfgBranch){
  var candidates = rawDownloadCandidates(cfgRepo, cfgBranch);
  var lastStatus = 0;
  function tryNext(i){
    if (i >= candidates.length) return Promise.reject(new Error("No se pudo descargar (" + (lastStatus || 404) + ")"));
    var c = candidates[i];
    var url = "https://raw.githubusercontent.com/" + c.repo + "/" + c.branch + "/" + pathInRepo + "?t=" + Date.now();
    return fetch(url).then(function(res){
      if (res.ok) return res.json();
      lastStatus = res.status;
      return tryNext(i + 1);
    }).catch(function(){ return tryNext(i + 1); });
  }
  return tryNext(0);
}

function escapeHtml(s){
  if (s == null) return "";
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function escapeAttr(s){ return escapeHtml(s); }

function maskToken(s){
  if (!s) return "";
  return "~" + btoa(s.split("").reverse().join(""));
}
function unmaskToken(s){
  if (!s) return "";
  if (s.charAt(0)==="~") s = s.slice(1);
  try { return atob(s).split("").reverse().join(""); }
  catch(e){ return ""; }
}

function fmtDate(ts){

  var d = new Date(ts);
  return d.toLocaleDateString("es-CL", { day:"2-digit", month:"short", year:"numeric" });
}

function pad(n){ return n<10 ? "0"+n : ""+n; }

function isThisWeek(ts){
  if (!ts) return false;
  var now = new Date();
  var d = new Date(ts);
  var diff = (now - d) / 86400000;
  return diff >= 0 && diff <= 7;
}

function parseWorkTime(reps){
  if (reps == null) return 30;
  var r = String(reps).trim().toLowerCase();
  if (!r) return 30;
  if (/^amrap/.test(r)) return 30;
  var m = r.match(/(\d+)\s*(s|seg|sec|segundos)\b/);
  if (m) return parseInt(m[1],10);
  m = r.match(/(\d+(?:\.\d+)?)\s*(min|m\b|minutos?)/);
  if (m) return Math.round(parseFloat(m[1]) * 60);
  m = r.match(/^(\d+)\s*[-a–]\s*(\d+)/);
  if (m) {
    var avg = (parseInt(m[1],10) + parseInt(m[2],10)) / 2;
    return Math.round(avg * 3);
  }
  m = r.match(/^(\d+)/);
  if (m) return parseInt(m[1],10) * 3;
  return 30;
}

function parseRestTime(rest){
  if (rest == null) return 60;
  var r = String(rest).trim().toLowerCase();
  if (!r) return 60;
  var m = r.match(/(\d+(?:\.\d+)?)\s*(min|m\b|minutos?)/);
  if (m) return Math.round(parseFloat(m[1]) * 60);
  m = r.match(/(\d+)\s*(s|seg|sec|segundos)?$/);
  if (m) return parseInt(m[1],10);
  m = r.match(/^(\d+)/);
  if (m) return parseInt(m[1],10);
  return 60;
}

function calculateDayDuration(day){
  if (!day || !day.exercises || !day.exercises.length) return 0;
  var total = 0;
  for (var i=0;i<day.exercises.length;i++){
    var ex = day.exercises[i];
    var sets = parseInt(ex.sets,10) || 1;
    var workSec = parseWorkTime(ex.reps);
    var restSec = parseRestTime(ex.rest);
    total += sets * workSec + (sets - 1) * restSec;
    if (i < day.exercises.length - 1) total += 60;
  }
  return total;
}

function calculateRoutineDuration(routine){
  var activeDays = 0;
  var total = 0;
  if (!routine || !routine.days) return { activeDays:0, totalSec:0, avgSec:0, perDay:[] };
  var perDay = [];
  for (var i=0;i<routine.days.length;i++){
    var d = routine.days[i];
    var sec = calculateDayDuration(d);
    perDay.push(sec);
    if (sec > 0){ activeDays++; total += sec; }
  }
  return {
    activeDays: activeDays,
    totalSec: total,
    avgSec: activeDays ? Math.round(total / activeDays) : 0,
    perDay: perDay
  };
}

function fmtDuration(sec){
  if (!sec || sec < 1) return "—";
  var min = Math.round(sec / 60);
  if (min < 60) return min + " min";
  var h = Math.floor(min / 60), m = min % 60;
  return h + "h " + (m ? m+"m" : "");
}

}

var _modalCloseHandler = null;

function openModal(opts){
  var ov = document.getElementById("modal-overlay");
  var modal = document.getElementById("modal");
  var title = document.getElementById("modal-title");
  var body = document.getElementById("modal-body");
  var footer = document.getElementById("modal-footer");
  modal.classList.toggle("large", !!opts.large);
  title.textContent = opts.title || "";
  body.innerHTML = opts.bodyHtml || "";
  footer.innerHTML = "";
  if (opts.bodyMount && typeof opts.bodyMount === "function") opts.bodyMount(body);
  if (opts.footer && opts.footer.length){
    opts.footer.forEach(function(b){
      var el = document.createElement("button");
      el.className = "btn " + (b.cls || "btn-secondary");
      el.textContent = b.label;
      if (b.id) el.id = b.id;
      el.addEventListener("click", function(){
        if (typeof b.onClick === "function") b.onClick();
        else closeModal();
      });
      footer.appendChild(el);
    });
  }
  _modalCloseHandler = opts.onClose || null;
  ov.classList.add("active");
}

function closeModal(){
  document.getElementById("modal-overlay").classList.remove("active");
  if (_modalCloseHandler) { try { _modalCloseHandler(); } catch(e){} _modalCloseHandler = null; }
}

document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("modal-overlay").addEventListener("click", function(e){
  if (e.target === this) closeModal();
});
document.addEventListener("keydown", function(e){
  if (e.key === "Escape") {
    var ov = document.getElementById("modal-overlay");
    if (ov.classList.contains("active")) closeModal();
  }
});

function showView(name){
  var views = document.querySelectorAll(".view");
  for (var i=0;i<views.length;i++) views[i].classList.remove("active");
  var v = document.getElementById("view-" + name);
  if (v) v.classList.add("active");
  var tabs = document.querySelectorAll(".tab-btn");
  for (var j=0;j<tabs.length;j++){
    tabs[j].classList.toggle("active", tabs[j].getAttribute("data-tab")===name);
  }
  if (name==="dashboard") renderDashboard();
  else if (name==="clients") renderClients();
  else if (name==="routines") renderRoutines();
  else if (name==="library") renderLibrary();
  else if (name==="rehab") renderRehab();
  else if (name==="finanzas") renderFinanzas();
  else if (name==="informes") renderInformes();
}

function clientCardHtml(c){
  var type = getClientType(c);
  var phoneClean = (c.phone || "").replace(/[^\d+]/g, "");
  var waBtn = phoneClean
    ? '<a class="btn btn-wa btn-sm" target="_blank" rel="noopener" href="https://wa.me/'+escapeAttr(phoneClean.replace(/^\+/,""))+'" title="WhatsApp">WhatsApp</a>'
    : '';

  var infoLine = '';
  var actionsExtra = '';

  if (type === "rehab"){
    var copy = c.rehabProtocolId ? getProtocol(c.rehabProtocolId) : null;
    /* REHAB-CLÍNICO: badges de estado clínico en la tarjeta */
    var rcBadges = '';
    if (rehabClinicoOn()){
      if (c.redFlags && c.redFlags.blocked) rcBadges += '<span class="badge" style="background:rgba(229,72,77,.15);color:#ff8a8e;border:1px solid rgba(229,72,77,.4);">🚩 Derivar a médico</span>';

    }
    if (copy){
      var cp = (typeof copy.currentPhase === "number") ? copy.currentPhase : 0;
      var focus = (copy.phases[cp] && copy.phases[cp].focus) ? copy.phases[cp].focus.split("·")[0].trim() : "";
      infoLine = '<span class="badge teal">📋 '+escapeHtml(copy.name||"Protocolo")+'</span>'
        + '<span class="badge muted">Fase '+(cp+1)+'/4'+(focus?' · '+escapeHtml(focus):'')+'</span>'
        + rcBadges;
      actionsExtra = (rehabClinicoOn() ? '<button class="btn btn-primary btn-sm" onclick="openPanelClinico(\''+c.id+'\')" title="Ficha, evaluación, dolor y reevaluación">🩺 Clínico</button>' : '')

    } else {
      infoLine = '<span class="badge muted">Sin protocolo asignado</span>' + rcBadges;
      actionsExtra = (rehabClinicoOn() ? '<button class="btn btn-primary btn-sm" onclick="openPanelClinico(\''+c.id+'\')" title="Ficha, evaluación, dolor y reevaluación">🩺 Clínico</button>' : '')
        + '<button class="btn btn-secondary btn-sm" onclick="openAssignProtocolModal(\''+c.id+'\')">+ Asignar protocolo</button>';
    }
  } else {
    var routinesCount = state.routines.filter(function(r){ return r.clientId === c.id; }).length;
    infoLine = '<span class="badge muted">'+routinesCount+' rutina'+(routinesCount===1?'':'s')+'</span>';
  }

  return '<div class="card">'
    + '<div class="card-main">'
      + '<div class="card-title">'+escapeHtml(c.name||"Sin nombre")+'</div>'
      + '<div class="card-sub" style="flex-wrap:wrap;gap:.5rem;">'
        + clientTypeBadge(type)
        + (c.phone ? '<span>📱 '+escapeHtml(c.phone)+'</span>' : '')
        + (c.goal ? '<span class="badge green">'+escapeHtml(c.goal)+'</span>' : '')
        + infoLine
        + clientDateBadges(c)
      + '</div>'
      + (c.notes ? '<div class="text-xs text-muted" style="margin-top:.4rem;">'+escapeHtml(c.notes)+'</div>' : '')
    + '</div>'
    + '<div class="card-actions">'
      + actionsExtra
      + '<button class="btn btn-ghost btn-sm" onclick="openClientTracking(\''+c.id+'\')" title="Medidas corporales y evaluaciones">📏 Seguimiento</button>'
      + (c.phone ? '<button class="btn btn-ghost btn-sm" onclick="sendClientSummary(\''+c.id+'\')" title="Enviar resumen semanal por WhatsApp">📊 Resumen</button>' : '')
      + waBtn
      + '<button class="btn btn-secondary btn-sm" onclick="openClientForm(\''+c.id+'\')">Editar</button>'
      + '<button class="btn btn-ghost btn-sm" onclick="deleteClient(\''+c.id+'\')" title="Eliminar">🗑</button>'
    + '</div>'
  + '</div>';
}

function deleteClient(id){
  var c = getClient(id);
  if (!c) return;
  var related = state.routines.filter(function(r){ return r.clientId === id; });

  var msg = '<p>¿Eliminar al cliente <strong>'+escapeHtml(c.name)+'</strong>?</p>';
  if (related.length){
    msg += '<p class="text-sm text-muted" style="margin-top:.6rem;">Tiene '+related.length+' rutina'+(related.length===1?'':'s')+' asociada'+(related.length===1?'':'s')+'.</p>';
    msg += '<div class="form-row" style="margin-top:.8rem;"><label class="form-label" style="display:flex;align-items:center;gap:.4rem;cursor:pointer;text-transform:none;letter-spacing:0;font-size:.85rem;color:var(--text);">'
      + '<input type="checkbox" id="del-routines" style="width:auto;margin:0;"> También eliminar sus rutinas</label></div>';
  }

  openModal({
    title: "Confirmar eliminación",
    bodyHtml: msg,
    footer: [
      { label:"Cancelar", cls:"btn-ghost" },
      { label:"Eliminar", cls:"btn-danger", onClick: function(){
        var alsoRoutines = document.getElementById("del-routines");
        if (alsoRoutines && alsoRoutines.checked){
          state.routines = state.routines.filter(function(r){ return r.clientId !== id; });
        } else {
          for (var i=0;i<state.routines.length;i++){
            if (state.routines[i].clientId === id) state.routines[i].clientId = "";
          }
        }
        // Remove this client's protocol copy (instance), if any
        if (c.rehabProtocolId){
          state.protocols = state.protocols.filter(function(p){ return p.id !== c.rehabProtocolId; });
        }
        state.clients = state.clients.filter(function(x){ return x.id !== id; });
        saveState();
        closeModal();
        renderClients();
        toast("Cliente eliminado","success");
      }}
    ]
  });
}

  html += '</div>';
  var filtered=state.routines.filter(function(r){if(!_routineFilter)return true;if(_routineFilter==="none")return!r.category;return r.category===_routineFilter;});
  filtered.sort(function(a,b){return(b.updatedAt||b.createdAt||0)-(a.updatedAt||a.createdAt||0);});
  if (!filtered.length){
    html += emptyState(!state.routines.length?"Sin rutinas":"Sin rutinas en esta categoría", !state.routines.length?"Crea una nueva rutina y asígnala a un cliente.":"Cambia el filtro o asigna categorías.", "+ Nueva Rutina", "openRoutineBuilder()");
  } else {
    for (var i=0;i<filtered.length;i++) html += routineCardHtml(filtered[i]);
  }
  document.getElementById("view-routines").innerHTML = html;
}
function filterRoutines(cat){_routineFilter=cat;renderRoutines();}
window.filterRoutines=filterRoutines;

function duplicateRoutine(id){
  var r = getRoutine(id);
  if (!r) return;
  var copy = JSON.parse(JSON.stringify(r));
  copy.id = genId();
  copy.name = (r.name||"Rutina") + " (copia)";
  copy.createdAt = Date.now();
  copy.updatedAt = Date.now();
  state.routines.push(copy);
  saveState();
  renderRoutines();
  renderDashboard();
  toast("Rutina duplicada", "success");
}

function deleteRoutine(id){
  var r = getRoutine(id);
  if (!r) return;
  openModal({
    title:"Eliminar rutina",
    bodyHtml: '<p>¿Eliminar <strong>'+escapeHtml(r.name||"esta rutina")+'</strong>? Se moverá a la papelera y podrás restaurarla durante 30 días.</p>',
    footer: [
      { label:"Cancelar", cls:"btn-ghost" },
      { label:"Eliminar", cls:"btn-danger", onClick: function(){
        if (!Array.isArray(state.trash)) state.trash = [];
        state.trash.push({ routine: r, deletedAt: Date.now() });
        state.routines = state.routines.filter(function(x){ return x.id !== id; });
        saveState();
        closeModal();
        renderRoutines();
        renderDashboard();
        toast("Rutina movida a la papelera","success");
      }}
    ]
  });
}
var _builderRoutine = null; // working copy
var _builderActiveDay = 0;
var _builderIsNew = false;

function openRoutineBuilder(id){
  if (id){
    var r = getRoutine(id);
    if (!r){ toast("Rutina no encontrada","error"); return; }
    _builderRoutine = JSON.parse(JSON.stringify(r));
    _builderIsNew = false;
  } else {
    _builderRoutine = newEmptyRoutine();
    _builderIsNew = true;
  }
  _builderActiveDay = 0;
  var tabs = document.querySelectorAll(".tab-btn");
  for (var i=0;i<tabs.length;i++) tabs[i].classList.remove("active");
  showView("builder");
  renderBuilder();
}

function newEmptyRoutine(){
  var days = [];
  for (var d=1; d<=7; d++) days.push({ day:d, exercises:[] });
  return {
    id: genId(),
    name: "",
    clientId: "",
    weeks: 4,
    startDate: "",
    notes: "",
    status: "active",
    days: days,
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
}

function renderBuilder(){
  if (!_builderRoutine) return;
  var r = _builderRoutine;
  var dur = calculateRoutineDuration(r);

  var html = '';
  html += '<div class="section-head">';
  html += '<h1 class="section-title">'+(_builderIsNew?"NUEVA":"EDITAR")+' <span class="accent">RUTINA</span></h1>';
  html += '<div style="display:flex;gap:.5rem;flex-wrap:wrap;">';
  html += '<button class="btn btn-ghost" onclick="exitBuilder()">← Volver</button>';
  if (!_builderIsNew) html += '<button class="btn btn-secondary" onclick="openShareModal(_builderRoutine.id, true)">Compartir</button>';
  html += '<button class="btn btn-primary" onclick="saveBuilder()">Guardar</button>';
  if (!_builderIsNew) html += '<button class="btn btn-ghost" onclick="deleteRoutine(_builderRoutine.id)" title="Eliminar">🗑</button>';
  html += '</div></div>';

  html += '<div class="builder-meta">';
  html += formField("Nombre de la rutina *", '<input type="text" id="rb-name" value="'+escapeAttr(r.name)+'" placeholder="Ej: Hipertrofia 4 días">');
  html += formField("Cliente", clientSelectHtml(r.clientId, "rb-client"));
  html += formField("Duración (semanas)", '<input type="number" min="1" max="52" id="rb-weeks" value="'+(r.weeks||4)+'">');
  html += formField("Fecha de inicio", '<input type="date" id="rb-start" value="'+escapeAttr(r.startDate||"")+'">');
  html += formField("Estado", '<select id="rb-status"><option value="active"'+(r.status!=="archived"?" selected":"")+'>Activa</option><option value="archived"'+(r.status==="archived"?" selected":"")+'>Archivada</option></select>');
  var catSel='<select id="rb-category"><option value="">— Sin categoría —</option>';
  for(var ci=0;ci<ROUTINE_CATEGORIES.length;ci++){var cc=ROUTINE_CATEGORIES[ci];catSel+='<option value="'+escapeAttr(cc.id)+'"'+(cc.id===(r.category||"")?" selected":"")+'>'+cc.icon+' '+escapeHtml(cc.label)+'</option>';}
  catSel+='</select>';
  html += formField("Categoría", catSel);
  html += formField("Notas", '<input type="text" id="rb-notes" value="'+escapeAttr(r.notes||"")+'" placeholder="Observaciones generales">');
  html += '</div>';

  var _hasWeekNotes = (r.weekNotes||[]).some(function(x){ return x; });
  html += '<details class="week-notes"'+(_hasWeekNotes?' open':'')+'><summary>📈 Progresión por semana (opcional)</summary><div class="week-notes-grid">';
  var _wkCount = Math.min(parseInt(r.weeks,10)||4, 52);
  for (var _wi=0; _wi<_wkCount; _wi++){
    var _wn = (r.weekNotes && r.weekNotes[_wi]) || "";
    html += '<div><span class="field-tag">Semana '+(_wi+1)+'</span><input type="text" class="rb-weeknote" data-week-idx="'+_wi+'" value="'+escapeAttr(_wn)+'" placeholder="Ej: +2,5% carga · RIR 2 · descarga"></div>';
  }
  html += '</div><button class="btn btn-ghost btn-sm" style="margin-top:.5rem;" onclick="applyDeloadWeek()">📉 Añadir semana de descarga</button></details>';

  html += '<div class="card" style="margin-bottom:1rem;background:var(--surface-2);">'
    + '<div class="card-main">'
    + '<div class="card-sub">'
    + '<span class="badge teal">📅 '+dur.activeDays+' días/semana</span>'
    + '<span class="badge teal">⏱ ~'+fmtDuration(dur.avgSec)+'/sesión</span>'
    + '<span class="badge teal">📊 '+fmtDuration(dur.totalSec)+'/semana</span>'
    + '</div>'
    + '<div class="card-sub" id="rb-volume" style="margin-top:.45rem;flex-wrap:wrap;gap:.3rem;">'+buildVolumeBadges(r)+'</div>'
    + '</div></div>';

  html += '<div class="day-tabs">';
  for (var i=0;i<7;i++){
    var d = r.days[i] || { day:i+1, exercises:[] };
    var count = d.exercises ? d.exercises.length : 0;
    var active = i===_builderActiveDay ? " active" : "";
    var badge = count ? '<span class="count">'+count+'</span>' : '';
    html += '<button class="day-tab'+active+'" onclick="setBuilderDay('+i+')">'+DAY_NAMES_SHORT[i]+badge+'</button>';
  }
  html += '</div>';

  html += '<div class="day-panel" id="day-panel"></div>';

  document.getElementById("view-builder").innerHTML = html;

  document.getElementById("rb-name").addEventListener("input", function(){ _builderRoutine.name = this.value; });
  document.getElementById("rb-client").addEventListener("change", function(){ _builderRoutine.clientId = this.value; });
  document.getElementById("rb-weeks").addEventListener("input", function(){ _builderRoutine.weeks = parseInt(this.value,10) || 4; });
  document.getElementById("rb-start").addEventListener("change", function(){ _builderRoutine.startDate = this.value; });
  document.getElementById("rb-status").addEventListener("change", function(){ _builderRoutine.status = this.value; });
  document.getElementById("rb-category").addEventListener("change", function(){ _builderRoutine.category = this.value; });
  document.getElementById("rb-notes").addEventListener("input", function(){ _builderRoutine.notes = this.value; });
  document.getElementById("rb-weeks").addEventListener("change", function(){ renderBuilder(); });
  var _wkInputs = document.querySelectorAll(".rb-weeknote");
  for (var _wj=0; _wj<_wkInputs.length; _wj++){
    _wkInputs[_wj].addEventListener("input", function(){
      var wi = parseInt(this.getAttribute("data-week-idx"),10);
      if (!_builderRoutine.weekNotes) _builderRoutine.weekNotes = [];
      _builderRoutine.weekNotes[wi] = this.value;
    });
  }

  renderDayPanel();
}

function clientSelectHtml(currentId, idAttr){
  var sel = '<select id="'+idAttr+'"><option value="">Sin asignar</option>';
  var sorted = state.clients.slice().sort(function(a,b){ return (a.name||"").localeCompare(b.name||""); });
  for (var i=0;i<sorted.length;i++){
    var c = sorted[i];
    sel += '<option value="'+escapeAttr(c.id)+'"'+(c.id===currentId?" selected":"")+'>'+escapeHtml(c.name)+'</option>';
  }
  sel += '</select>';
  return sel;
}

function setBuilderDay(idx){
  _builderActiveDay = idx;
  var tabs = document.querySelectorAll(".day-tab");
  for (var i=0;i<tabs.length;i++) tabs[i].classList.toggle("active", i===idx);
  renderDayPanel();
}

function renderDayPanel(){
  var panel = document.getElementById("day-panel");
  if (!panel) return;
  var dayIdx = _builderActiveDay;
  var day = _builderRoutine.days[dayIdx];
  if (!day){ day = { day: dayIdx+1, exercises:[] }; _builderRoutine.days[dayIdx] = day; }
  var dur = calculateDayDuration(day);

  var html = '<div class="day-header">';
  html += '<h3 style="font-family:var(--font-display);letter-spacing:.04em;font-size:1.3rem;">'+DAY_NAMES[dayIdx]+'</h3>';
  html += '<div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">';
  html += '<span class="badge teal">⏱ '+fmtDuration(dur)+'</span>';
  html += '<button class="btn btn-secondary btn-sm" onclick="addExerciseToDay()">+ Ejercicio</button>';
  if (day.exercises.length) html += '<button class="btn btn-ghost btn-sm" onclick="clearDay()">Vaciar día</button>';
  html += '</div></div>';

  if (!day.exercises.length){
    html += '<p class="text-muted text-sm" style="text-align:center;padding:1.5rem 0;">No hay ejercicios para este día. <a href="#" onclick="addExerciseToDay();return false;">Agrega uno</a> o marca el día como descanso.</p>';
  } else {
    for (var i=0;i<day.exercises.length;i++){
      html += exerciseRowHtml(day.exercises[i], i);
    }
  }

  panel.innerHTML = html;

  var inputs = panel.querySelectorAll("[data-row-idx]");
  for (var k=0;k<inputs.length;k++){
    inputs[k].addEventListener("input", function(){
      var idx = parseInt(this.getAttribute("data-row-idx"),10);
      var field = this.getAttribute("data-field");
      var ex = _builderRoutine.days[_builderActiveDay].exercises[idx];
      if (ex) ex[field] = this.value;
      updateDayDurationBadge();
    });
  }
}

function exerciseRowHtml(ex, idx){
  var def = getExercise(ex.exerciseId);
  var name = def ? def.name : "Ejercicio";
  var sub = def ? (def.muscle + (def.equipment ? " · " + def.equipment : "")) : "";
  return '<div class="exercise-row">'
    + '<div class="ex-top">'
    + '<div class="ex-name">'+escapeHtml(name)+'<small>'+escapeHtml(sub)+'</small></div>'
    + '<div class="ex-actions">'
      + '<button class="btn btn-ghost btn-sm" onclick="changeExercise('+idx+')" title="Cambiar ejercicio">↻</button>'
      + '<button class="btn btn-ghost btn-sm" onclick="moveExercise('+idx+',-1)" title="Subir">↑</button>'
      + '<button class="btn btn-ghost btn-sm" onclick="moveExercise('+idx+',1)" title="Bajar">↓</button>'
      + '<button class="btn btn-ghost btn-sm" onclick="removeExercise('+idx+')" title="Eliminar">×</button>'
    + '</div>'
    + '</div>'
    + '<div class="ex-fields">'
      + '<div><span class="field-tag">Series</span><input type="text" data-row-idx="'+idx+'" data-field="sets" value="'+escapeAttr(ex.sets||"")+'" placeholder="3"></div>'
      + '<div><span class="field-tag">Reps / Tiempo</span><input type="text" data-row-idx="'+idx+'" data-field="reps" value="'+escapeAttr(ex.reps||"")+'" placeholder="10 ó 30s"></div>'
      + '<div><span class="field-tag">Peso</span><input type="text" data-row-idx="'+idx+'" data-field="weight" value="'+escapeAttr(ex.weight||"")+'" placeholder="kg"></div>'
      + '<div><span class="field-tag">Descanso</span><input type="text" data-row-idx="'+idx+'" data-field="rest" value="'+escapeAttr(ex.rest||"")+'" placeholder="60s"></div>'
      + '<div><span class="field-tag">RIR objetivo</span><input type="text" data-row-idx="'+idx+'" data-field="rir" value="'+escapeAttr(ex.rir||"")+'" placeholder="1-2"></div>'
    + '</div>'
    + '</div>';
}

function updateDayDurationBadge(){
  var day = _builderRoutine.days[_builderActiveDay];
  var dur = calculateDayDuration(day);
  var head = document.querySelector("#day-panel .day-header .badge.teal");
  if (head) head.textContent = "⏱ " + fmtDuration(dur);
  var stats = document.querySelectorAll(".card-sub .badge.teal");
  if (stats.length >= 3){
    var total = calculateRoutineDuration(_builderRoutine);
    stats[0].textContent = "📅 " + total.activeDays + " días/semana";
    stats[1].textContent = "⏱ ~" + fmtDuration(total.avgSec) + "/sesión";
    stats[2].textContent = "📊 " + fmtDuration(total.totalSec) + "/semana";
  }
  var vol = document.getElementById("rb-volume");
  if (vol) vol.innerHTML = buildVolumeBadges(_builderRoutine);
}

function addExerciseToDay(){
  openExercisePicker(function(exId){
    var d = _builderRoutine.days[_builderActiveDay];
    d.exercises.push({ exerciseId: exId, sets:"3", reps:"10", weight:"", rest:"60s", notes:"" });
    renderDayPanel();
    updateDayTabBadge();
  });
}

function changeExercise(idx){
  openExercisePicker(function(exId){
    _builderRoutine.days[_builderActiveDay].exercises[idx].exerciseId = exId;
    renderDayPanel();
  });
}

function moveExercise(idx, dir){
  var arr = _builderRoutine.days[_builderActiveDay].exercises;
  var ni = idx + dir;
  if (ni < 0 || ni >= arr.length) return;
  var tmp = arr[idx]; arr[idx] = arr[ni]; arr[ni] = tmp;
  renderDayPanel();
}

function removeExercise(idx){
  _builderRoutine.days[_builderActiveDay].exercises.splice(idx, 1);
  renderDayPanel();
  updateDayTabBadge();
}

function clearDay(){
  _builderRoutine.days[_builderActiveDay].exercises = [];
  renderDayPanel();
  updateDayTabBadge();
}

function updateDayTabBadge(){
  var vol = document.getElementById("rb-volume");
  if (vol && _builderRoutine) vol.innerHTML = buildVolumeBadges(_builderRoutine);
  var tabs = document.querySelectorAll(".day-tab");
  for (var i=0;i<7;i++){
    var d = _builderRoutine.days[i];
    var count = d && d.exercises ? d.exercises.length : 0;
    if (!tabs[i]) continue;
    var existingBadge = tabs[i].querySelector(".count");
    if (count){
      if (existingBadge) existingBadge.textContent = count;
      else {
        var b = document.createElement("span");
        b.className = "count";
        b.textContent = count;
        tabs[i].appendChild(b);
      }
    } else if (existingBadge){
      existingBadge.parentNode.removeChild(existingBadge);
    }
  }
}

function openExercisePicker(onPick){
  var muscleSet = {};
  state.exercises.forEach(function(e){ if (e.muscle) muscleSet[e.muscle] = true; });
  var muscles = Object.keys(muscleSet).sort();

  var bodyHtml =
    '<div class="lib-toolbar" style="margin-bottom:.6rem;">'
    + '<input type="text" id="ep-search" placeholder="Buscar ejercicio...">'
    + '<select id="ep-muscle"><option value="">Todos los grupos</option>'
    + muscles.map(function(m){ return '<option value="'+escapeAttr(m)+'">'+escapeHtml(m)+'</option>'; }).join("")
    + '<optgroup label="🩺 Terapéuticos (rehab)">'
    + '<option value="terap:">Terapéuticos — todos</option>'
    + TERAP_ZONES.map(function(z){ return '<option value="terap:'+escapeAttr(z)+'">Terapéutico — '+escapeHtml(z)+'</option>'; }).join("")
    + '</optgroup>'
    + '<optgroup label="⚡ Tipo de contracción">'
    + '<option value="contr:">Contracción — todas</option>'
    + CONTR_TYPES.map(function(c){ return '<option value="contr:'+escapeAttr(c)+'">'+escapeHtml(c)+'</option>'; }).join("")
    + '</optgroup>'
    + '</select>'
    + '</div>'
    + '<div id="ep-list" style="max-height:50vh;overflow-y:auto;display:grid;grid-template-columns:1fr;gap:.4rem;"></div>';

  openModal({
    title: "Elegir ejercicio",
    large: true,
    bodyHtml: bodyHtml,
    footer: [{ label:"Cancelar", cls:"btn-ghost" }],
    bodyMount: function(){
      function refresh(){
        var q = document.getElementById("ep-search").value.trim().toLowerCase();
        var muscle = document.getElementById("ep-muscle").value;
        var list = document.getElementById("ep-list");
        var filtered = state.exercises.filter(function(e){
          if (muscle){
            if (muscle === "terap:"){ if (!e.terap) return false; }
            else if (muscle.indexOf("terap:") === 0){ if (e.terap !== muscle.slice(6)) return false; }
            else if (muscle === "contr:"){ if (!e.contr) return false; }
            else if (muscle.indexOf("contr:") === 0){ if (e.contr !== muscle.slice(6)) return false; }
            else if (e.muscle !== muscle) return false;
          }
          if (q){
            var hay = (e.name+" "+e.muscle+" "+(e.equipment||"")+" "+(e.terap?"terapeutico rehab "+e.terap:"")+" "+(e.contr||"")).toLowerCase();
            if (hay.indexOf(q) < 0) return false;
          }
          return true;
        }).sort(function(a,b){ return (a.name||"").localeCompare(b.name||""); });
        if (!filtered.length){
          list.innerHTML = '<p class="text-muted text-sm" style="padding:1rem;text-align:center;">Sin resultados.</p>';
          return;
        }
        list.innerHTML = filtered.map(function(e){
          var hasGif = e.gif && /^https?:\/\//.test(e.gif);
          var thumb = hasGif
            ? '<img src="'+escapeAttr(e.gif)+'" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentNode.innerHTML=\'🏋️\'">'
            : '<span style="font-size:1.5rem;">🏋️</span>';
          return '<div class="card" style="margin:0;display:flex;align-items:stretch;width:100%;background:var(--surface-2);overflow:hidden;">'
            + '<div class="ep-thumb" data-prev="'+escapeAttr(e.id)+'" title="Ver vista previa" style="flex:0 0 84px;min-height:70px;background:#000;display:flex;align-items:center;justify-content:center;cursor:zoom-in;overflow:hidden;">'+thumb+'</div>'
            + '<button class="card-main" data-id="'+escapeAttr(e.id)+'" style="flex:1;cursor:pointer;text-align:left;background:none;border:none;padding:.55rem .75rem;color:inherit;font:inherit;">'
            + '<div class="card-title" style="font-size:.95rem;">'+escapeHtml(e.name)+'</div>'
            + '<div class="card-sub">'
              + (e.muscle?'<span class="badge green">'+escapeHtml(e.muscle)+'</span>':'')
              + (e.equipment?'<span class="badge muted">'+escapeHtml(e.equipment)+'</span>':'')
              + (e.terap?'<span class="badge terap">🩺 Terapéutico — '+escapeHtml(e.terap)+'</span>':'')
              + (e.contr?'<span class="badge contr">⚡ '+escapeHtml(e.contr)+'</span>':'')
            + '</div>'
            + '</button>'
          + '</div>';
        }).join("");
        var items = list.querySelectorAll("[data-id]");
        for (var i=0;i<items.length;i++){
          items[i].addEventListener("click", function(){
            var id = this.getAttribute("data-id");
            closeModal();
            onPick(id);
          });
        }
        var prevs = list.querySelectorAll("[data-prev]");
        for (var p=0;p<prevs.length;p++){
          prevs[p].addEventListener("click", function(ev){
            ev.stopPropagation();
            showExercisePreview(this.getAttribute("data-prev"));
          });
        }
      }
      document.getElementById("ep-search").addEventListener("input", refresh);
      document.getElementById("ep-muscle").addEventListener("change", refresh);
      refresh();
      setTimeout(function(){
        var s = document.getElementById("ep-search");
        if (s) s.focus();
      }, 50);
    }
  });
}

function showExercisePreview(exId){
  var e = getExercise(exId);
  if (!e) return;
  var old = document.getElementById("ex-preview-overlay");
  if (old && old.parentNode) old.parentNode.removeChild(old);

  var media = (e.gif && /^https?:\/\//.test(e.gif))
    ? '<img src="'+escapeAttr(e.gif)+'" alt="" style="max-height:62vh;max-width:92vw;border-radius:10px;background:#000;" onerror="this.outerHTML=\'<div style=&quot;font-size:4rem;padding:2rem;&quot;>🏋️</div>\'">'
    : '<div style="font-size:4rem;padding:2rem;">🏋️</div>';

    + media
    + '<div style="color:#fff;font-weight:700;margin-top:.7rem;font-size:1.05rem;">'+escapeHtml(e.name||"")+'</div>'
    + (e.terap?'<div style="margin-top:.35rem;"><span class="badge terap">🩺 Terapéutico — '+escapeHtml(e.terap)+'</span></div>':'')
    + (e.contr?'<div style="margin-top:.35rem;"><span class="badge contr">⚡ '+escapeHtml(e.contr)+'</span></div>':'')
    + (e.desc?'<div style="color:rgba(255,255,255,.75);font-size:.85rem;margin-top:.4rem;line-height:1.45;">'+escapeHtml(e.desc)+'</div>':'')

window.showExercisePreview = showExercisePreview;

function saveBuilder(){
  if (!_builderRoutine) return;
  var name = (_builderRoutine.name||"").trim();
  if (!name){ toast("Asigna un nombre a la rutina", "error"); return; }
  _builderRoutine.name = name;
  _builderRoutine.updatedAt = Date.now();
  if (_builderIsNew){
    state.routines.push(_builderRoutine);
    _builderIsNew = false;
  } else {
    var idx = -1;
    for (var i=0;i<state.routines.length;i++) if (state.routines[i].id === _builderRoutine.id) { idx = i; break; }
    if (idx >= 0) state.routines[idx] = _builderRoutine;
    else state.routines.push(_builderRoutine);
  }
  saveState();
  toast("Rutina guardada", "success");
}

function exitBuilder(){
  if (_builderRoutine && _builderRoutine.name && _builderRoutine.name.trim()){
    saveBuilder();
  }
  _builderRoutine = null;
  showView("routines");
}
