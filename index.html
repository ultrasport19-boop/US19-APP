function previewProtocolImport(){
  var text = document.getElementById("pi-text").value;
  var pv = document.getElementById("pi-preview");
  if (!text.trim()){ pv.innerHTML = '<p class="text-muted text-sm">Escribe o pega el protocolo arriba.</p>'; return; }

  var parsed = parseProtocolText(text);
  window._lastParsedProtocol = parsed;

  var html = '<div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;">';
  html += '<div style="margin-bottom:.6rem;">';
  html += '<div style="font-family:var(--font-display);font-size:1.3rem;letter-spacing:.04em;">'+(parsed.name?escapeHtml(parsed.name):'<span class="text-muted">Sin nombre — agrega "Protocolo: ..."</span>')+'</div>';
  if (parsed.region) html += '<div class="text-sm text-muted">Región: '+escapeHtml(parsed.region)+'</div>';
  if (parsed.description) html += '<div class="text-sm text-muted">'+escapeHtml(parsed.description)+'</div>';
  html += '</div>';

  var colors = ["#ff6b6b","#ffa94d","#4dd0c7","#b4e650"];
  var totalEx = 0, matched = 0, unmatched = 0;

  // Show all 4 phases (mentioned or default)
  for (var pi=0; pi<4; pi++){
    var found = null;
    for (var k=0;k<parsed.phases.length;k++){ if (parsed.phases[k].idx===pi){ found = parsed.phases[k]; break; } }
    var def = PHASE_DEFAULTS[pi];
    html += '<div style="margin-top:.6rem;padding-top:.6rem;border-top:1px solid var(--border);">';
    html += '<div style="font-weight:700;font-size:.92rem;margin-bottom:.35rem;color:'+colors[pi]+';">'
      + 'Fase '+(pi+1)+' · '+escapeHtml((found && found.focus) ? found.focus : def.focus)
      + (found ? '' : ' <span class="text-muted" style="font-weight:400;">(no incluida — quedará con objetivo por defecto y sin ejercicios)</span>')
      + '</div>';
    if (found){
      if (found.objetivo) html += '<div class="text-xs text-muted" style="margin-bottom:.3rem;">🎯 '+escapeHtml(found.objetivo)+'</div>';
      for (var e=0; e<found.exercises.length; e++){
        var ex = found.exercises[e];
        totalEx++;
        var mEx = ex.matchedId ? getExercise(ex.matchedId) : null;
        if (mEx) matched++; else unmatched++;
        html += '<div style="display:flex;align-items:center;gap:.5rem;padding:.2rem 0;font-size:.83rem;">';
        html += mEx ? '<span class="badge green" style="min-width:16px;text-align:center;">✓</span>'
                    : '<span class="badge warn" style="min-width:16px;text-align:center;">?</span>';
        html += '<span style="flex:1;min-width:0;">'+(mEx?escapeHtml(mEx.name):'<span style="color:var(--warn);">'+escapeHtml(ex.name)+'</span> <span class="text-muted">(nuevo)</span>')+'</span>';
        html += '<span class="text-muted" style="font-family:var(--font-mono);font-size:.74rem;white-space:nowrap;">'+ex.sets+'×'+escapeHtml(ex.reps)+(ex.weight?' '+ex.weight+'kg':'')+(ex.rest?' '+escapeHtml(ex.rest):'')+'</span>';
        html += '</div>';
      }
      if (!found.exercises.length) html += '<div class="text-xs text-muted">Sin ejercicios en esta fase.</div>';
    }
    html += '</div>';
  }

  html += '<div style="margin-top:.8rem;padding-top:.6rem;border-top:1px solid var(--border);display:flex;gap:.8rem;flex-wrap:wrap;">';
  html += '<span class="badge green">'+matched+' emparejados</span>';
  if (unmatched) html += '<span class="badge warn">'+unmatched+' nuevos (se crearán)</span>';
  html += '<span class="badge teal">'+totalEx+' ejercicios total</span>';
  var refCount = (parsed.references?parsed.references.length:0);
  for (var rp=0; rp<parsed.phases.length; rp++) refCount += (parsed.phases[rp].references?parsed.phases[rp].references.length:0);
  if (refCount) html += '<span class="badge teal">📚 '+refCount+' referencia'+(refCount===1?'':'s')+'</span>';
  html += '</div>';
  html += '</div>';
  pv.innerHTML = html;
}

function createFromProtocolImport(){
  var parsed = window._lastParsedProtocol;
  if (!parsed){
    var text = document.getElementById("pi-text").value;
    if (!text.trim()){ toast("Escribe el protocolo primero", "error"); return; }
    parsed = parseProtocolText(text);
  }
  if (!parsed.name){ toast("Agrega una línea \"Protocolo: ...\" con el nombre", "error"); return; }

  var phases = makeProtocolPhases();
  var newExCount = 0;

  for (var pi=0; pi<parsed.phases.length; pi++){
    var src = parsed.phases[pi];
    var idx = src.idx;
    if (idx < 0 || idx > 3) continue;
    if (src.focus) phases[idx].focus = src.focus;
    if (src.objetivo) phases[idx].objetivo = src.objetivo;
    if (src.criterios) phases[idx].criterios = src.criterios;

    for (var e=0; e<src.exercises.length; e++){
      var pEx = src.exercises[e];
      var exId = pEx.matchedId;
      if (!exId){
        var newEx = { id: genId(), name: pEx.name, muscle:"", equipment:"", desc:"", gif:"" };
        state.exercises.push(newEx);
        exId = newEx.id;
        newExCount++;
      }
      phases[idx].exercises.push({
        exerciseId: exId,
        sets: pEx.sets || "3",
        reps: pEx.reps || "10",
        weight: pEx.weight || "",
        rest: pEx.rest || "60s",
        notes: ""
      });
    }
  }

  var protocol = {
    id: genId(),
    name: parsed.name,
    region: parsed.region || "",
    segment: parsed.segment || deriveSegment(parsed.region),
    description: parsed.description || "",
    phases: phases,
    references: [],
    createdAt: Date.now(),
    updatedAt: Date.now()
  };

  // General references
  if (parsed.references && parsed.references.length){
    for (var gr=0; gr<parsed.references.length; gr++){
      protocol.references.push({ id: genId(), citation: parsed.references[gr].citation||"", url: parsed.references[gr].url||"", note:"", phase:"" });
    }
  }
  // Per-phase references
  for (var pp2=0; pp2<parsed.phases.length; pp2++){
    var pref = parsed.phases[pp2].references || [];
    for (var pr2=0; pr2<pref.length; pr2++){
      protocol.references.push({ id: genId(), citation: pref[pr2].citation||"", url: pref[pr2].url||"", note:"", phase: parsed.phases[pp2].idx });
    }
  }

  state.protocols.push(protocol);
  saveState();
  closeModal();
  window._lastParsedProtocol = null;

  var total = countProtocolExercises(protocol);
  var refMsg = protocol.references.length ? (", "+protocol.references.length+" referencias") : "";
  toast("Protocolo creado: " + total + " ejercicios" + refMsg + (newExCount?(", "+newExCount+" nuevos en biblioteca"):""), "success");
  _rehabState.openId = protocol.id;
  _rehabState.activePhase = 0;
  renderRehab();
}

function buildPhaseShareData(protocol, phaseIdx){
  var phase = protocol.phases[phaseIdx];
  var focus = (phase.focus||"").trim();

  // Library subset used in this phase
  var usedExIds = {};
  for (var j=0;j<phase.exercises.length;j++){
    if (phase.exercises[j].exerciseId) usedExIds[phase.exercises[j].exerciseId] = true;
  }
  var skippedHeavy = 0;
  var exercises = [];
  for (var id in usedExIds){
    var ex = getExercise(id);
    if (!ex) continue;
    var copy = { id: ex.id, name: ex.name, muscle: ex.muscle||"", equipment: ex.equipment||"", desc: ex.desc||"", gif: ex.gif||"" };
    if (copy.gif && copy.gif.indexOf("data:") === 0){ copy.gif = ""; skippedHeavy++; }
    exercises.push(copy);
  }

  // Exercises copied into a single "day" so the client view renders them
  var dayExercises = phase.exercises.map(function(e){
    return { exerciseId: e.exerciseId, sets: e.sets||"", reps: e.reps||"", weight: e.weight||"", rest: e.rest||"", notes: e.notes||"" };
  });
  var days = [];
  for (var d=0; d<7; d++) days.push({ day:d+1, exercises: d===0 ? dayExercises : [] });

  var phaseTitle = "Fase " + (phaseIdx+1) + (focus ? " · " + focus : "");
  var dayLabels = {}; dayLabels[0] = phaseTitle;

  return {
    type: "routine",
    v: 1,
    routine: {
      id: protocol.id + "-f" + (phaseIdx+1),
      name: (protocol.name || "Protocolo") + " — Fase " + (phaseIdx+1),
      clientId: "",
      weeks: "",
      startDate: "",
      notes: phase.objetivo || "",
      subtitle: phaseTitle + " · " + dayExercises.length + " ejercicio" + (dayExercises.length===1?"":"s"),
      dayLabels: dayLabels,
      days: days
    },
    client: null,
    exercises: exercises,
    skippedHeavy: skippedHeavy,
    sharedAt: Date.now()
  };
}

        msg += "\nAccede a tus ejercicios aqui:\n" + currentUrl + "\n\n"

function openAssignProtocolModal(clientId){
  var c = getClient(clientId);
  if (!c) return;
  /* REHAB-CLÍNICO: tamizaje de banderas rojas antes de prescribir */
  if (rehabClinicoOn()){
    if (c.redFlags && c.redFlags.blocked){
      toast("🚩 Este paciente tiene banderas rojas activas: derivar a evaluación médica antes de prescribir.","error");
      openRedFlags(clientId);
      return;
    }
    if (!c.redFlags || !c.redFlags.fecha){
      if (confirm("Este paciente aún no tiene tamizaje de banderas rojas.\n\nSe recomienda realizarlo ANTES de asignar un protocolo.\n\nAceptar = hacer el tamizaje ahora · Cancelar = continuar sin tamizaje")){
        openRedFlags(clientId, function(){ openAssignProtocolModal(clientId); });
        return;
      }
    }
  }
  var templates = state.protocols.filter(function(p){ return !p.ownerClientId; });

    toast("Primero crea un protocolo en la pestaña Protocolos","warn");
    return;
  }

        + '</button>';
    }
  }
  bodyHtml += '</div>';

  openModal({
    title: "Asignar protocolo",
    large: true,

function assignProtocolToClient(clientId, templateId){
  var c = getClient(clientId);
  var tpl = getProtocol(templateId);
  if (!c || !tpl) return;
  /* REHAB-CLÍNICO: bloqueo duro si hay banderas rojas activas */
  if (rehabClinicoOn() && c.redFlags && c.redFlags.blocked){
    toast("🚩 Prescripción bloqueada: banderas rojas activas. Derivar a evaluación médica.","error");
    return;
  }
  if (c.rehabProtocolId){
    state.protocols = state.protocols.filter(function(p){ return p.id !== c.rehabProtocolId; });
  }
  var copy = JSON.parse(JSON.stringify(tpl));
  copy.id = genId();
  copy.ownerClientId = clientId;
  copy.sourceId = templateId;
  copy.currentPhase = 0;
  copy.startDate = new Date().toISOString().slice(0,10);
  copy.assignedAt = Date.now();
  copy.updatedAt = Date.now();
  state.protocols.push(copy);
  c.rehabProtocolId = copy.id;
  if (getClientType(c) !== "rehab") c.type = "rehab";
  saveState();
  closeModal();
  toast("Protocolo asignado a "+(c.name||"cliente"), "success");
  _rehabState.openId = copy.id;
  _rehabState.activePhase = 0;
  _rehabState.fromClient = clientId;
  showView("rehab");
}

function unassignClientProtocol(clientId){

function ensureRefs(p){ if (p && !Array.isArray(p.references)) p.references = []; return p ? p.references : []; }
function isValidUrl(u){ return u && /^https?:\/\//i.test(u); }
function refPhaseLabel(phase){
  if (phase === "" || phase === null || typeof phase === "undefined") return "General";
  var n = parseInt(phase,10);
  return (n>=0 && n<=3) ? ("Fase "+(n+1)) : "General";
}

function phaseRefsStripHtml(p, idx){
  var refs = ensureRefs(p).filter(function(r){ return String(r.phase) === String(idx); });
  if (!refs.length) return "";
  var html = '<div class="phase-refs"><div class="pr-title">📚 Evidencia de esta fase</div>';
  for (var i=0;i<refs.length;i++){
    var r = refs[i];
    if (isValidUrl(r.url)) html += '<a href="'+escapeAttr(r.url)+'" target="_blank" rel="noopener">'+escapeHtml(r.citation||r.url)+' ↗</a>';
    else html += '<span class="pr-plain">'+escapeHtml(r.citation||"")+'</span>';
  }
  html += '</div>';
  return html;
}

function renderProtocolRefs(){
  var cont = document.getElementById("protocol-refs");
  if (!cont) return;
  var p = getProtocol(_rehabState.openId);
  if (!p) return;
  var refs = ensureRefs(p);

  var html = '<div class="ref-section">';
  html += '<div class="day-header" style="margin-bottom:.85rem;">';
  html += '<h3 style="font-family:var(--font-display);letter-spacing:.04em;font-size:1.2rem;">📚 Evidencia científica</h3>';
  html += '<button class="btn btn-secondary btn-sm" onclick="addReference()">+ Agregar referencia</button>';
  html += '</div>';

  if (!refs.length){
    html += '<p class="text-muted text-sm" style="line-height:1.5;">Agrega los papers, guías clínicas o revisiones en que se basa este protocolo. Puedes asignar cada referencia a una fase específica o dejarla como general.</p>';
  } else {
    for (var i=0;i<refs.length;i++){
      var r = refs[i];
      html += '<div class="ref-item">';
      html += '<div class="ref-body">';
      html += '<div class="ref-cite">'+escapeHtml(r.citation||"(sin cita)")+'<span class="ref-badge">'+escapeHtml(refPhaseLabel(r.phase))+'</span></div>';
      if (isValidUrl(r.url)) html += '<a class="ref-link" href="'+escapeAttr(r.url)+'" target="_blank" rel="noopener">🔗 '+escapeHtml(r.url)+'</a>';

  html += '</div>';

function openReferenceForm(refId){
  var p = getProtocol(_rehabState.openId);

  ensureRefs(p);

  if (refId){ for (var i=0;i<p.references.length;i++) if (p.references[i].id===refId){ ref = p.references[i]; break; } }

  var phaseSel = '<select id="rf-phase">';

    phaseSel += '<option value="'+ph+'"'+(String(data.phase)===String(ph)?" selected":"")+'>Fase '+(ph+1)+'</option>';
  }

function saveReferenceForm(refId){
  var p = getProtocol(_rehabState.openId);
  if (!p) return;
  ensureRefs(p);
  var citation = (document.getElementById("rf-citation").value||"").trim();
  if (!citation){ toast("Escribe la cita o referencia", "error"); return; }
  var url = (document.getElementById("rf-url").value||"").trim();
  var note = (document.getElementById("rf-note").value||"").trim();
  var phase = document.getElementById("rf-phase").value;

  if (refId){
    for (var i=0;i<p.references.length;i++){
      if (p.references[i].id===refId){
        p.references[i].citation = citation;
        p.references[i].url = url;
        p.references[i].note = note;
        p.references[i].phase = phase;
        break;
      }
    }
  } else {
    p.references.push({ id: genId(), citation:citation, url:url, note:note, phase:phase });
  }
  p.updatedAt = Date.now();
  saveState();
  closeModal();
  toast("Referencia guardada", "success");
  renderProtocolRefs();
  renderPhasePanel();
}

function deleteReference(refId){
  var p = getProtocol(_rehabState.openId);
  if (!p) return;
  ensureRefs(p);
  if (!confirm("¿Eliminar esta referencia?")) return;
  p.references = p.references.filter(function(r){ return r.id !== refId; });
  p.updatedAt = Date.now();
  saveState();
  toast("Referencia eliminada", "success");
  renderProtocolRefs();
  renderPhasePanel();
}

function runDataFixups(){
  if (!Array.isArray(state.trash)) state.trash = [];
  var _cutoff = Date.now() - 30*86400000;
  var _tBefore = state.trash.length;
  state.trash = state.trash.filter(function(t){ return (t.deletedAt||0) > _cutoff; });
  var changed = (state.trash.length !== _tBefore) ? 1 : 0;
  for (var i=0;i<state.exercises.length;i++){
    var e = state.exercises[i];
    var fix = EXERCISE_FIXUPS[normExName(e.name)];
    if (!fix) continue;
    if (!e.muscle && fix.m){ e.muscle = fix.m; changed++; }
    if (!e.equipment && fix.e){ e.equipment = fix.e; changed++; }
    if (!e.desc && fix.d){ e.desc = fix.d; changed++; }
  }
  if (changed){ saveState(); console.log("Fixups aplicados:", changed); }
}

/* --- Duplicados en biblioteca --- */
function findDuplicateGroups(){
  var groups = {};
  state.exercises.forEach(function(e){
    var k = normExName(e.name);
    if (!k) return;
    if (!groups[k]) groups[k] = [];
    groups[k].push(e);
  });
  var dups = [];
  Object.keys(groups).forEach(function(k){ if (groups[k].length>1) dups.push(groups[k]); });
  return dups;
}
function exCompletenessScore(e){ return (e.muscle?1:0)+(e.equipment?1:0)+(e.desc?1:0)+(e.gif?2:0); }
function openDedupeModal(){
  var dups = findDuplicateGroups();
  if (!dups.length){ toast("No se encontraron ejercicios duplicados","success"); return; }
  var body = '<p class="text-sm text-muted" style="margin-bottom:.8rem;">Cada grupo se fusionará en la entrada más completa y todas las rutinas y protocolos se actualizarán automáticamente.</p>';
  dups.forEach(function(g){
    body += '<div class="card" style="margin-bottom:.5rem;"><div class="card-main"><div class="card-title">'+escapeHtml(g[0].name)+'</div><div class="card-sub">'+g.length+' entradas con el mismo nombre</div></div></div>';
  });
  openModal({ title:"Ejercicios duplicados ("+dups.length+")", bodyHtml: body, footer:[
    {label:"Cancelar",cls:"btn-ghost"},
    {label:"Fusionar todos",cls:"btn-primary",onClick:function(){ mergeAllDuplicates(); closeModal(); }}
  ]});
}
function mergeAllDuplicates(){
  var dups = findDuplicateGroups(); var merged=0;
  dups.forEach(function(g){
    g.sort(function(a,b){ return exCompletenessScore(b)-exCompletenessScore(a); });
    var keep = g[0];
    for (var i=1;i<g.length;i++){
      var drop = g[i];
      if (!keep.muscle && drop.muscle) keep.muscle = drop.muscle;
      if (!keep.equipment && drop.equipment) keep.equipment = drop.equipment;
      if (!keep.desc && drop.desc) keep.desc = drop.desc;
      if (!keep.gif && drop.gif) keep.gif = drop.gif;
      state.routines.forEach(function(r){ (r.days||[]).forEach(function(d){ ((d&&d.exercises)||[]).forEach(function(x){ if (x.exerciseId===drop.id) x.exerciseId = keep.id; }); }); });
      (state.protocols||[]).forEach(function(p){ (p.phases||[]).forEach(function(ph){ (ph.exercises||[]).forEach(function(x){ if (x.exerciseId===drop.id) x.exerciseId = keep.id; }); }); });
      state.exercises = state.exercises.filter(function(x){ return x.id!==drop.id; });
      merged++;
    }
  });
  saveState();
  renderLibrary();
  toast(merged+" duplicado"+(merged===1?"":"s")+" fusionado"+(merged===1?"":"s"),"success");
}

/* --- Temporizador de descanso --- */
var _restTimerInterval = null;
function parseRestSeconds(s){
  if (!s) return 0;
  s = String(s).toLowerCase().trim();
  var n = s.match(/(\d+(?:[.,]\d+)?)/);
  if (!n) return 0;
  var v = parseFloat(n[1].replace(",","."));
  if (s.indexOf("min")>=0 || /\d\s*m$/.test(s) || s.indexOf("'")>=0) return Math.round(v*60);
  if (s.indexOf("s")>=0) return Math.round(v);
  return v <= 10 ? Math.round(v*60) : Math.round(v);
}
window.startRestTimer = function(restStr){
  var secs = parseRestSeconds(restStr);
  if (!secs){ toast("Descanso no reconocido: "+restStr,"warn"); return; }
  window.stopRestTimer(false);
  var el = document.getElementById("rest-timer-float");
  if (!el){
    el = document.createElement("div");
    el.id = "rest-timer-float";
    el.innerHTML = '<div class="rt-label">Descanso</div><div class="rt-time" id="rt-time"></div><button class="btn btn-ghost btn-sm" onclick="stopRestTimer(true)">✕ Cerrar</button>';
    document.body.appendChild(el);
  }
  el.classList.remove("rt-done");
  el.style.display = "block";
  var remaining = secs;
  function renderRt(sec){
    if (sec<0) sec=0;
    var mm = Math.floor(sec/60), ss = sec%60;
    var t = document.getElementById("rt-time");
    if (t) t.textContent = mm+":"+(ss<10?"0":"")+ss;
  }
  renderRt(remaining);
  _restTimerInterval = setInterval(function(){
    remaining--;
    renderRt(remaining);
    if (remaining<=0){
      clearInterval(_restTimerInterval); _restTimerInterval=null;
      el.classList.add("rt-done");
      var t = document.getElementById("rt-time");
      if (t) t.textContent = "¡LISTO!";
      restBeep();
      if (navigator.vibrate) navigator.vibrate([200,100,200]);
      setTimeout(function(){ if (el && !_restTimerInterval) el.style.display="none"; }, 4000);
    }
  }, 1000);
};
window.stopRestTimer = function(hide){
  if (_restTimerInterval){ clearInterval(_restTimerInterval); _restTimerInterval=null; }
  var el = document.getElementById("rest-timer-float");
  if (el && hide) el.style.display = "none";
};
function restBeep(){
  try {
    var Ctx = window.AudioContext||window.webkitAudioContext;
    if (!Ctx) return;
    var ctx = new Ctx();
    var o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880; g.gain.value = .25;
    o.start();
    setTimeout(function(){ try { o.stop(); ctx.close(); } catch(e){} }, 600);
  } catch(e){}
}

function loadSessionHistory(){
  try { return JSON.parse(localStorage.getItem(_clientProgressKey+"_history") || "[]"); }
  catch(e){ return []; }

function saveSessionHistoryArr(h){
  try { localStorage.setItem(_clientProgressKey+"_history", JSON.stringify(h)); }
  catch(e){ toast("No se pudo guardar el historial","warn"); }

window.saveSessionToHistory = function(){
  if (!_clientShareData) return;
  var r = _clientShareData.routine;
  var progress = loadProgress();
  var stats = computeSessionStats(r, progress);
  if (!stats.done && !stats.partial){ toast("Aún no hay datos registrados en esta sesión","warn"); return; }
  var dateEl = document.getElementById("session-date-input");
  var date = (dateEl && dateEl.value) || new Date().toISOString().slice(0,10);
  var notes = ""; try { notes = localStorage.getItem(_clientProgressKey+"_notes")||""; } catch(e){}
  var perEx = [];
  var rpeSum=0, rpeCt=0, evaMax=0;
  for (var di=0; di<7; di++){
    var day = r.days[di]; if (!day||!day.exercises) continue;
    for (var ei=0; ei<day.exercises.length; ei++){
      var rowEx = day.exercises[ei];
      var setsCount = parseInt(rowEx.sets,10)||1;
      var top=0, reps=0, done=0, bestE1=0;
      for (var s=0;s<setsCount;s++){
        var p = progress[di+":"+ei+":"+s]||{};
        var w = parseFloat(String(p.weight||"").replace(",","."));
        if (!isNaN(w) && w>top) top=w;
        var rp = parseFloat(String(p.reps||"").replace(",","."));
        if (!isNaN(rp)) reps+=rp;
        if (p.done) done++;
        var rv = parseFloat(p.rpe); if(!isNaN(rv)){ rpeSum+=rv; rpeCt++; }
        var ev = parseFloat(p.eva); if(!isNaN(ev)&&ev>evaMax) evaMax=ev;
        if (!isNaN(w) && !isNaN(rp) && rp>0 && w>0){ var e1 = w*(1+rp/30); if (e1>bestE1) bestE1=e1; }
      }
      if (top>0 || reps>0 || done>0){
        var def = findExerciseInShare(_clientShareData, rowEx.exerciseId);
        perEx.push({ exId: rowEx.exerciseId, name: def?def.name:"Ejercicio", top: top, reps: reps, done: done, sets: setsCount, e1rm: bestE1?Math.round(bestE1*10)/10:0 });
      }
    }
  }
  var hist = loadSessionHistory();
  hist.push({ id: genId(), date: date, savedAt: Date.now(), pct: stats.pct, done: stats.done, total: stats.total, avgRpe: rpeCt?Math.round(rpeSum/rpeCt*10)/10:null, maxEva: evaMax||null, notes: notes, perEx: perEx });
  hist.sort(function(a,b){ return (a.date||"").localeCompare(b.date||""); });
  saveSessionHistoryArr(hist);
  toast("Sesión guardada en el historial ("+hist.length+" en total)","success");
  showClientView(_clientShareData);
};

function drawHistChart(){
  var sel = document.getElementById("hist-ex-select");
  var cv = document.getElementById("hist-chart");
  if (!sel || !cv) return;
  var exId = sel.value;
  var hist = loadSessionHistory();
  var metric = "top";
  var ms = document.getElementById("hist-metric-select");
  if (ms) metric = ms.value;
  var pts = [];
  if (metric==="eva"){
    hist.forEach(function(h){ if (h.maxEva) pts.push({x:h.date||"", y:h.maxEva}); });
  } else {
    hist.forEach(function(h){ (h.perEx||[]).forEach(function(pe){ var v = (metric==="e1rm") ? (pe.e1rm||0) : (pe.top||0); if (pe.exId===exId && v>0) pts.push({x:h.date||"", y:v}); }); });
  }
  var ctx = cv.getContext("2d");
  var W=cv.width, H=cv.height, padL=46, padB=26, padT=14, padR=10;
  ctx.clearRect(0,0,W,H);
  var css = getComputedStyle(document.documentElement);
  var accent = (css.getPropertyValue("--accent")||"#22d3ee").trim() || "#22d3ee";
  var muted = (css.getPropertyValue("--muted")||"#888").trim() || "#888";
  var border = (css.getPropertyValue("--border")||"#333").trim() || "#333";
  ctx.font = "11px monospace";
  if (!pts.length){ ctx.fillStyle=muted; ctx.fillText("Sin cargas numéricas registradas para este ejercicio", 20, H/2); return; }
  var ys = pts.map(function(p){ return p.y; });
  var maxY = Math.max.apply(null, ys), minY = Math.min.apply(null, ys);
  if (maxY===minY){ maxY+=5; minY=Math.max(0,minY-5); }
  var span = maxY-minY;
  maxY += span*.1; minY = Math.max(0, minY-span*.1);
  function X(i){ return pts.length===1 ? (padL+(W-padL-padR)/2) : padL + (W-padL-padR)*i/(pts.length-1); }
  function Y(v){ return padT + (H-padT-padB)*(1-(v-minY)/(maxY-minY)); }
  ctx.strokeStyle=border; ctx.fillStyle=muted; ctx.lineWidth=1;
  for (var g=0; g<=4; g++){
    var gv = minY + (maxY-minY)*g/4;
    var gy = Y(gv);
    ctx.beginPath(); ctx.moveTo(padL,gy); ctx.lineTo(W-padR,gy); ctx.stroke();
    ctx.fillText(String(Math.round(gv*10)/10), 4, gy+4);
  }
  ctx.strokeStyle=accent; ctx.lineWidth=2; ctx.beginPath();
  pts.forEach(function(p,i){ var x=X(i), y=Y(p.y); if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y); });
  ctx.stroke();
  ctx.fillStyle=accent;
  pts.forEach(function(p,i){ ctx.beginPath(); ctx.arc(X(i),Y(p.y),3.5,0,Math.PI*2); ctx.fill(); });
  ctx.fillStyle=muted;
  var step = Math.max(1, Math.ceil(pts.length/6));
  pts.forEach(function(p,i){
    if (i%step!==0 && i!==pts.length-1) return;
    ctx.fillText((p.x||"").slice(5), Math.min(Math.max(X(i)-16,padL), W-44), H-8);
  });
}

var _calendlyCache = null;
var _calendlyFetchedAt = 0;
var CALENDLY_TTL = 5 * 60 * 1000; // 5 min cache

function calendlyHeaders(){
  return { "Authorization": "Bearer " + settings.calendlyToken, "Content-Type": "application/json" };
}

function calendlyGetUserUri(){
  if (settings.calendlyUserUri) return Promise.resolve(settings.calendlyUserUri);
  return fetch("https://api.calendly.com/users/me", { headers: calendlyHeaders() })
    .then(function(r){ return r.json(); })
    .then(function(d){
      var uri = d && d.resource && d.resource.uri;
      if (!uri) throw new Error("No se pudo obtener el usuario de Calendly");
      settings.calendlyUserUri = uri;
      saveSettings();
      return uri;
    });
}

function calendlyFetchEvents(){
  if (_calendlyCache && (Date.now() - _calendlyFetchedAt < CALENDLY_TTL)) return Promise.resolve(_calendlyCache);
  return calendlyGetUserUri().then(function(userUri){
    var now = new Date();
    var dayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
    var dayEnd   = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59).toISOString();
    var url = "https://api.calendly.com/scheduled_events?user="+encodeURIComponent(userUri)
      +"&min_start_time="+encodeURIComponent(dayStart)
      +"&max_start_time="+encodeURIComponent(dayEnd)
      +"&status=active&count=50";
    return fetch(url, { headers: calendlyHeaders() }).then(function(r){ return r.json(); });
  }).then(function(data){
    var events = (data && data.collection) || [];
    // For each event, fetch invitees
    var promises = events.map(function(ev){
      var evUuid = ev.uri.split("/").pop();
      return fetch("https://api.calendly.com/scheduled_events/"+evUuid+"/invitees?count=50", { headers: calendlyHeaders() })
        .then(function(r){ return r.json(); })
        .then(function(inv){ ev._invitees = (inv && inv.collection) || []; return ev; })
        .catch(function(){ ev._invitees = []; return ev; });
    });
    return Promise.all(promises);
  }).then(function(events){
    _calendlyCache = events;
    _calendlyFetchedAt = Date.now();
    return events;
  });
}

function normalizeStr(s){ return (s||"|").toLowerCase().replace(/[^a-z0-9]/g,""); }

function matchClientToInvitee(invitee){
  var email = (invitee.email || "").toLowerCase();
  var nameParts = normalizeStr(invitee.name || "");
  return state.clients.find(function(c){
    if (email && c.email && c.email.toLowerCase() === email) return true;
    var cn = normalizeStr(c.name || "");
    if (cn.length > 3 && nameParts.length > 3 && (cn.indexOf(nameParts) >= 0 || nameParts.indexOf(cn) >= 0)) return true;
    return false;
  }) || null;
}

function fmtCalTime(isoStr){
  try {
    var d = new Date(isoStr);
    return d.toLocaleTimeString("es-CL", { hour: "2-digit", minute: "2-digit" });
  } catch(e){ return isoStr; }
}

  return '<div style="margin-bottom:1.25rem;">'
    + '<div class="section-head" style="margin-bottom:.75rem;">'

// Lee notion-sync.json desde el repo GitHub (escrito por el GitHub Action)
function getGithubRaw(path) {
  var cfg = getGitHubConfig();
  if (!cfg) return Promise.reject(new Error('GitHub no configurado'));
  var url = 'https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo
    + '/contents/' + path + '?ref=' + (cfg.branch || 'main');
  return fetch(url, {
    headers: { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github.v3+json' }
  }).then(function(r) { return r.json(); })
  .then(function(d) {
    if (!d.content) throw new Error('Archivo no encontrado: ' + path);
    return JSON.parse(atob(d.content.replace(/\n/g, '')));
  });
}

function triggerNotionWorkflow() {
  var cfg = getGitHubConfig();
  if (!cfg) return Promise.reject(new Error('GitHub no configurado'));
  var url = 'https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo
    + '/actions/workflows/notion-sync.yml/dispatches';
  return fetch(url, {
    method: 'POST',
    headers: {
      'Authorization': 'token ' + cfg.token,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ ref: cfg.branch || 'main' })
  }).then(function(r) {
    if (r.status === 204) return true;
    return r.json().then(function(d) { throw new Error(d.message || 'Error ' + r.status); });
  });
}

function writeNotionPending(updates, creates) {
  var cfg = getGitHubConfig();
  if (!cfg) return Promise.reject(new Error('GitHub no configurado'));
  var repoFull = getDerivedRepo() || (cfg.owner + '/' + cfg.repo);
  var content = { updates: updates || [], creates: creates || [], createdAt: new Date().toISOString() };
  var b64 = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
  var path = 'sync/notion-pending.json';
  var url = 'https://api.github.com/repos/' + repoFull + '/contents/' + path;
  // Get current SHA first (from the data branch)
  return ensureDataBranch(repoFull, cfg.token).then(function(){
    return fetch(url + '?ref=' + DATA_BRANCH, { headers: { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github.v3+json' } });
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var body = { message: 'app: notion pending updates', content: b64, branch: DATA_BRANCH };
      if (d.sha) body.sha = d.sha;
      return fetch(url, {
        method: 'PUT',
        headers: { 'Authorization': 'token ' + cfg.token, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    });
}

function normalizeNameN(s) { return (s || '').toLowerCase().trim().replace(/\s+/g, ' '); }

function mergeNotionClients(notionClients) {
  // Enriches app clients with Notion data, and flags Notion-only clients
  var enriched = state.clients.map(function(c) {
    var nc = notionClients.find(function(n) {
      if (c.email && n.email && c.email.toLowerCase() === n.email.toLowerCase()) return true;
      var cn = normalizeNameN(c.name); var nn = normalizeNameN(n.name);
      return cn.length > 3 && nn.length > 3 && (cn === nn || cn.includes(nn) || nn.includes(cn));
    });
    return Object.assign({}, c, nc ? { notion: nc } : {});
  });
  var notionOnly = notionClients.filter(function(n) {
    return !state.clients.find(function(c) {
      if (c.email && n.email && c.email.toLowerCase() === n.email.toLowerCase()) return true;
      var cn = normalizeNameN(c.name); var nn = normalizeNameN(n.name);
      return cn.length > 3 && nn.length > 3 && (cn === nn || cn.includes(nn) || nn.includes(cn));
    });
  });
  return { enriched: enriched, notionOnly: notionOnly };
}

    var useCache = _notionData && (Date.now() - _notionFetchedAt < NOTION_TTL);
    var dataPromise = useCache ? Promise.resolve(_notionData) :
      getGithubRaw('sync/notion-sync.json').then(function(d) {
        _notionData = d; _notionFetchedAt = Date.now(); return d;
      });

    dataPromise.then(function(data) {
      if (!box) return;
      var nc = data.clients || [];
      var bio = data.bioimpedancia || [];
      var merged = mergeNotionClients(nc);
      var syncedAt = data.syncedAt ? new Date(data.syncedAt).toLocaleString('es-CL') : '-';

      var html = '<div style="font-size:.75rem;color:var(--muted);margin-bottom:.75rem;">🕒 Última sync: ' + escapeHtml(syncedAt) + ' · ' + nc.length + ' clientes en Notion · ' + bio.length + ' evaluaciones</div>';

      // Clients with Notion match
      var withNotion = merged.enriched.filter(function(c) { return c.notion; });
      var withoutNotion = merged.enriched.filter(function(c) { return !c.notion; });

      if (withNotion.length) {
        html += '<div style="font-weight:700;font-size:.8rem;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-bottom:.5rem;">✅ Vinculados (' + withNotion.length + ')</div>';
        withNotion.forEach(function(c) {
          var n = c.notion;
          var clientBio = bio.filter(function(b) {
            return normalizeNameN(b.clientName).includes(normalizeNameN(c.name)) || normalizeNameN(c.name).includes(normalizeNameN(b.clientName));
          }).sort(function(a,b) { return (b.date||'') > (a.date||'') ? 1 : -1; });
          var lastBio = clientBio[0];
          html += '<div style="display:flex;align-items:flex-start;gap:.75rem;background:var(--surface-2);border:1px solid rgba(168,209,57,.25);border-radius:var(--radius);padding:.65rem 1rem;margin-bottom:.4rem;">';
          html += '<div style="flex:1;min-width:0;">';
          html += '<div style="font-weight:700;font-size:.88rem;">' + escapeHtml(c.name) + '</div>';
          html += '<div style="font-size:.78rem;color:var(--muted);margin-top:.15rem;display:flex;gap:.6rem;flex-wrap:wrap;">';
          if (n.plan) html += '<span>💳 ' + escapeHtml(n.plan) + '</span>';
          if (n.membershipAmount) html += '<span>💰 ' + Number(n.membershipAmount).toLocaleString('es-CL') + '</span>';
          if (n.membershipEnd) html += '<span>📅 Vence: ' + escapeHtml(n.membershipEnd) + '</span>';
          if (n.membershipStatus) {
            var stColor = n.membershipStatus === 'Activo' ? 'var(--success)' : 'var(--danger)';
            html += '<span style="color:' + stColor + ';font-weight:700;">' + escapeHtml(n.membershipStatus) + '</span>';
          }
          if (lastBio) html += '<span>⚖️ ' + (lastBio.weight ? lastBio.weight + ' kg' : '') + (lastBio.bodyFat ? ' · ' + lastBio.bodyFat + '% grasa' : '') + ' (' + escapeHtml(lastBio.date || '') + ')</span>';
          html += '</div>';
          html += '</div>';
          html += '<a href="' + escapeHtml(n.notionUrl || '#') + '" target="_blank" style="flex:0 0 auto;font-size:.75rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);border-radius:4px;padding:.2rem .5rem;white-space:nowrap;">🔗 Notion</a>';
          html += '</div>';
        });
      }

      if (merged.notionOnly.length) {
        html += '<div style="font-weight:700;font-size:.8rem;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin:.75rem 0 .5rem;">🟡 Solo en Notion (' + merged.notionOnly.length + ')</div>';
        merged.notionOnly.forEach(function(n) {
          html += '<div style="display:flex;align-items:center;gap:.75rem;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:.5rem 1rem;margin-bottom:.4rem;font-size:.85rem;">';
          html += '<div style="flex:1;">' + escapeHtml(n.name) + (n.plan ? ' <span style="color:var(--muted);">· ' + escapeHtml(n.plan) + '</span>' : '') + (n.membershipStatus === 'Inactivo' ? ' <span style="color:var(--danger);font-size:.75rem;">INACTIVO</span>' : '') + '</div>';
          html += '<button class="btn btn-secondary btn-sm" onclick="importarClienteNotion(' + JSON.stringify(n).replace(/"/g,"'") + ')">+ Importar</button>';
          html += '<a href="' + escapeHtml(n.notionUrl||'#') + '" target="_blank" style="font-size:.75rem;color:var(--muted);">Notion ↗</a>';
          html += '</div>';
        });
      }

      if (!withNotion.length && !merged.notionOnly.length) {
        html += '<p style="color:var(--muted);font-size:.85rem;">🗭 Sin datos aún. Pulsa «🔄 Sincronizar» para traer datos desde Notion.</p>';
      }

      box.innerHTML = html;
    }).catch(function(err) {
      if (box) {
        if (String(err.message).includes('no encontrado') || String(err.message).includes('Not Found')) {
          box.innerHTML = '<div style="color:var(--muted);font-size:.85rem;">📦 No hay datos aún. Instala el workflow en tu repo y pulsa «🔄 Sincronizar».</div>';
        } else {
          box.innerHTML = '<div style="color:var(--danger);font-size:.85rem;">❌ ' + escapeHtml(String(err.message)) + '</div>';
        }
      }
    });
  }, 0);

  return '<div style="margin-bottom:1.25rem;">'
    + '<div class="section-head" style="margin-bottom:.75rem;">'
      + '<h2 class="section-title">🟣 NOTION <span class="accent">/ CLIENTES</span></h2>'
      + '<div style="display:flex;gap:.5rem;">'
        + '<button class="btn btn-ghost btn-sm" onclick="notionSyncRefresh()">↻ Actualizar</button>'
        + '<button class="btn btn-secondary btn-sm" onclick="notionSyncTrigger()">🔄 Sincronizar</button>'
      + '</div>'
    + '</div>'
    + '<div id="notion-sync-dash"></div>'
    + '</div>';
}

  var btn = document.querySelector('[onclick="notionSyncTrigger()"]');

  triggerNotionWorkflow()
    .then(function() {

function buildAlertsHtml(){
  var html = "";
  var now = Date.now();
  var expiring = [];
  state.routines.forEach(function(r){
    if (r.status==="archived") return;
    var startMs = r.startDate ? new Date(r.startDate+"T00:00:00").getTime() : (r.createdAt||0);
    if (!startMs || !r.weeks) return;
    var daysLeft = Math.ceil((startMs + r.weeks*7*86400000 - now)/86400000);
    if (daysLeft <= 7) expiring.push({ r:r, daysLeft:daysLeft });
  });
  var reports = loadReports();
  var byClient = {};
  reports.forEach(function(rep){
    var k = rep.clientId || rep.clientName || "?";
    if (!byClient[k]) byClient[k] = [];
    byClient[k].push(rep);
  });
  var adhRows = [];
  state.clients.forEach(function(c){
    var hasActive = state.routines.some(function(r){ return r.clientId===c.id && r.status!=="archived"; });
    if (!hasActive) return;
    var reps = (byClient[c.id]||[]).concat(byClient[c.name]||[]);
    var recent = reps.filter(function(rp){ return now-(rp.sentAt||0) <= 14*86400000; });
    var lastMs = reps.reduce(function(mx,rp){ return Math.max(mx, rp.sentAt||0); }, 0);
    var avgPct = recent.length ? Math.round(recent.reduce(function(sum,rp){ return sum+(rp.pct||0); },0)/recent.length) : null;
    adhRows.push({ c:c, count:recent.length, lastMs:lastMs, avgPct:avgPct });
  });
  adhRows.sort(function(a,b){ return a.lastMs-b.lastMs; });

  if (expiring.length){
    expiring.sort(function(a,b){ return a.daysLeft-b.daysLeft; });
    html += '<div class="card" style="margin-bottom:1rem;"><div class="card-main">';
    html += '<div class="card-title">⏳ Rutinas por vencer</div>';
    expiring.slice(0,6).forEach(function(e2){
      var cl = getClient(e2.r.clientId);
      var lbl = e2.daysLeft < 0 ? '<span class="adh-alert">venció hace '+(-e2.daysLeft)+' días</span>' : (e2.daysLeft===0 ? '<span class="adh-alert">vence hoy</span>' : 'quedan '+e2.daysLeft+' días');
      html += '<div class="adh-row"><span style="font-weight:600;">'+escapeHtml(e2.r.name||"Rutina")+'</span>'
        +(cl?'<span class="text-muted">'+escapeHtml(cl.name)+'</span>':'')
        +'<span style="margin-left:auto;">'+lbl+'</span>'
        +'<button class="btn btn-ghost btn-sm" onclick="openRoutineBuilder(\''+e2.r.id+'\')">Renovar →</button></div>';
    });
    html += '</div></div>';
  }

  if (adhRows.length){
    html += '<div class="card" style="margin-bottom:1rem;"><div class="card-main">';
    html += '<div class="card-title">📊 Adherencia · últimos 14 días</div>';
    html += '<div class="text-xs text-muted" style="margin-bottom:.3rem;">Calculada con los reportes de progreso que abren aquí tus clientes (botón "Enviar progreso").</div>';
    adhRows.slice(0,10).forEach(function(a){
      var daysSince = a.lastMs ? Math.floor((now-a.lastMs)/86400000) : null;
      var alert = (daysSince===null || daysSince>7);
      html += '<div class="adh-row"><span style="font-weight:600;">'+escapeHtml(a.c.name)+'</span>'
        +'<span>'+a.count+' sesión'+(a.count===1?'':'es')+(a.avgPct!=null?' · '+a.avgPct+'% cumplimiento':'')+'</span>'
        +'<span style="margin-left:auto;" class="'+(alert?'adh-alert':'text-muted')+'">'+(daysSince===null?'sin reportes':(daysSince===0?'hoy':'hace '+daysSince+' días'))+(alert?' ⚠':'')+'</span></div>';
    });
    html += '</div></div>';
  }
  return html;
}

function buildVolumeBadges(r){
  var vol = {};
  ((r&&r.days)||[]).forEach(function(d){
    ((d&&d.exercises)||[]).forEach(function(x){
      var def = getExercise(x.exerciseId);
      var m = def && def.muscle;
      if (!m || m==="Cardio" || m==="Movilidad") return;
      vol[m] = (vol[m]||0) + (parseInt(x.sets,10)||0);
    });
  });
  var keys = Object.keys(vol).sort(function(a,b){ return vol[b]-vol[a]; });
  if (!keys.length) return '<span class="text-xs text-muted">Volumen semanal: aún sin series</span>';
  var html = '<span class="text-xs text-muted">Series/semana:</span>';
  keys.forEach(function(m){
    var v = vol[m];
    var out = (v<10 || v>20);
    html += '<span class="badge '+(out?'muted':'teal')+'"'+(out?' style="color:var(--warn);" title="Fuera del rango 10-20 series/semana"':'')+'>'+escapeHtml(m)+' '+v+(v<10?' ↓':(v>20?' ⚠':''))+'</span>';
  });
  html += '<span class="text-xs text-muted">(objetivo 10-20)</span>';
  return html;
}

function getProgressionSuggestion(exId){
  try {
    var hist = loadSessionHistory();
    if (!hist.length) return null;
    var last = hist[hist.length-1];
    var pe = null;
    (last.perEx||[]).forEach(function(p){ if (p.exId===exId) pe = p; });
    if (!pe) return null;
    if (pe.sets>0 && pe.done===pe.sets && pe.top>0){
      return "Completaste "+pe.sets+" sets con "+pe.top+" kg la sesión pasada ("+(last.date||"")+") — prueba subir 2,5-5% la carga";
    }
    return null;
  } catch(e){ return null; }
}

function daysUntil(dateStr){
  if (!dateStr) return null;
  var t = new Date(dateStr+"T00:00:00").getTime();
  if (isNaN(t)) return null;
  return Math.ceil((t-Date.now())/86400000);
}

function clientDateBadges(c){
  var html = "";
  var dr = daysUntil(c.reevalDate);
  if (dr!==null && dr<=3) html += '<span class="badge muted" style="color:var(--warn);">🔁 Reevaluación '+(dr<0?'vencida hace '+(-dr)+'d':(dr===0?'hoy':'en '+dr+'d'))+'</span>';

  return html;
}

function _rutMissing(){

function buildRutHygieneHtml(){

  return '<div class="card" style="margin-top:1rem;border-left:3px solid var(--warn);"><div class="card-main">'

function openRutFixModal(){
  var miss = _rutMissing();
  if (!miss.length){ toast("Todos los clientes tienen RUT 🎉","success"); return; }
  var body = '<p class="text-sm text-muted" style="line-height:1.5;margin-bottom:.7rem;">Ingresa el RUT de cada cliente. Se valida el dígito verificador en vivo y se formatea al guardar.</p>'
    + '<div style="max-height:52vh;overflow-y:auto;padding-right:.3rem;">';
  for (var i=0;i<miss.length;i++){
    var c = miss[i];
    body += '<div style="display:grid;grid-template-columns:1fr 155px 20px;align-items:center;gap:.5rem;margin-bottom:.45rem;">'
      + '<span style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escapeHtml(c.name)+'</span>'
      + '<input type="text" class="rut-fix-input" data-cid="'+c.id+'" value="'+escapeAttr(c.rut||"")+'" placeholder="12.345.678-9">'
      + '<span class="rut-fix-mark" data-for="'+c.id+'" style="font-weight:700;"></span>'
      + '</div>';
  }
  body += '</div>';
  openModal({ title:"🪪 Completar RUT", large:true, bodyHtml:body, footer:[
    { label:"Cancelar", cls:"btn-ghost" },
    { label:"Guardar RUTs", cls:"btn-primary", onClick:function(){ _saveRutFixes(); } }
  ], bodyMount:function(){
    var inputs = document.querySelectorAll(".rut-fix-input");
    function mark(inp){
      var v = inp.value.trim();
      var m = document.querySelector('.rut-fix-mark[data-for="'+inp.getAttribute("data-cid")+'"]');
      if (!m) return;
      if (!v){ m.textContent=""; inp.style.borderColor=""; }
      else if (validarRut(v)){ m.textContent="✓"; m.style.color="var(--success)"; inp.style.borderColor="var(--success)"; }
      else { m.textContent="✗"; m.style.color="var(--danger)"; inp.style.borderColor="var(--danger)"; }
    }
    for (var i=0;i<inputs.length;i++){ (function(inp){ inp.addEventListener("input", function(){ mark(inp); }); mark(inp); })(inputs[i]); }
  }});
}
function _saveRutFixes(){
  var inputs = document.querySelectorAll(".rut-fix-input");
  var n=0, bad=0;
  for (var i=0;i<inputs.length;i++){
    var v = inputs[i].value.trim();
    if (!v) continue;
    var c = getClient(inputs[i].getAttribute("data-cid"));
    if (!c) continue;
    if (validarRut(v)){ c.rut = formatearRut(v); n++; } else bad++;
  }
  saveState(); closeModal();
  toast(n+" RUT guardado"+(n===1?"":"s")+(bad?" · "+bad+" inválido"+(bad===1?"":"s")+" omitido"+(bad===1?"":"s"):""), n?"success":"warn");
  if (document.getElementById("view-dashboard")) showView("dashboard");
}
window.openRutFixModal = openRutFixModal;

/* ============================================================
   REACTIVACIÓN — clientes con plan vencido hace >7 días.
   Tarjeta que solo aparece si hay candidatos; botón WhatsApp con mensaje de marca.
   ============================================================ */
function _lapsedClients(){
  var out = [];
  state.clients.forEach(function(c){
    var d = daysUntil(c.planEndDate);
    if (d !== null && d <= -7) out.push({ c:c, dias:-d });
  });
  out.sort(function(a,b){ return a.dias - b.dias; }); // los más recientes primero (más recuperables)
  return out;
}
function _reactWaLink(c){
  var d = String(c.phone||"").replace(/[^0-9]/g,"");
  if (!d) return "";
  if (d.length===9 && d.charAt(0)==="9") d="56"+d; else if (d.length===8) d="569"+d;
  var nombre = (c.name||"").split(" ")[0];
  var msg = "Hola "+nombre+"! Te escribo de Ultra-Sport 19 💪 Vimos que tu plan venció y queremos que retomes tu entrenamiento. ¿Reactivamos tu membresía? Tenemos horarios disponibles, te esperamos. 🐺";
  return "https://wa.me/"+d+"?text="+encodeURIComponent(msg);
}
function buildReactivationHtml(){
  var lapsed = _lapsedClients();
  if (!lapsed.length) return "";
  var html = '<div class="card" style="margin-top:1rem;"><div class="card-main">'
    + '<div class="card-title">🔄 Reactivación <span class="badge muted">'+lapsed.length+'</span></div>'
    + '<p class="text-xs text-muted" style="margin:.3rem 0 .5rem;line-height:1.4;">Planes vencidos hace más de una semana. Un mensaje a tiempo los recupera.</p>'
    + '<div style="display:flex;flex-direction:column;gap:.4rem;">';
  var top = lapsed.slice(0,8);
  for (var i=0;i<top.length;i++){

    html += '<div class="adh-row"><span style="font-weight:600;">'+escapeHtml(r.c.name)+'</span>'
      + '<span class="text-xs text-muted" style="margin-left:auto;">vencido hace '+r.dias+' días</span>'
      + (wa ? '<a class="btn btn-ghost btn-sm" href="'+wa+'" target="_blank" rel="noopener">💬 Reactivar</a>'
            : '<button class="btn btn-ghost btn-sm" onclick="openClientForm(\''+r.c.id+'\')">Editar</button>')
      + '</div>';
  }
  if (lapsed.length > top.length) html += '<div class="text-xs text-muted" style="margin-top:.2rem;">+'+(lapsed.length-top.length)+' más en la lista de clientes.</div>';
  html += '</div></div></div>';
  return html;
}

window.sendClientSummary = function(clientId){
  var c = getClient(clientId);
  if (!c) return;
  if (!c.phone){ toast("El cliente no tiene teléfono registrado","warn"); return; }
  var reports = loadReports().filter(function(rp){ return rp.clientId===c.id || (rp.clientName && rp.clientName===c.name); });
  var now = Date.now();
  var recent = reports.filter(function(rp){ return now-(rp.sentAt||0) <= 7*86400000; });
  var avgPct = recent.length ? Math.round(recent.reduce(function(s,rp){ return s+(rp.pct||0); },0)/recent.length) : null;
  var lastMs = reports.reduce(function(mx,rp){ return Math.max(mx, rp.sentAt||0); }, 0);
  var firstName = (c.name||"").split(" ")[0];
  var msg = "Hola "+firstName+"! Resumen de tu semana en Ultra-Sport 19:\n";
  if (recent.length){
    msg += "• Sesiones reportadas: "+recent.length+"\n• Cumplimiento promedio: "+avgPct+"%\n";
    msg += (avgPct>=80) ? "Excelente constancia, seguimos así 💪" : "Esta semana vamos por más, tú puedes 💪";
  } else {
    msg += "• Aún no recibo reportes de esta semana.\n";
    msg += lastMs ? ("Tu último reporte fue el "+new Date(lastMs).toLocaleDateString("es-CL")+". ¡Retomemos! 💪") : "Abre tu rutina y usa el botón Enviar progreso al terminar cada sesión 💪";

/* --- Seguimiento corporal: medidas + evaluaciones --- */
function drawLinePts(cv, pts){
  var ctx = cv.getContext("2d");
  var W=cv.width, H=cv.height, padL=46, padB=26, padT=14, padR=10;
  ctx.clearRect(0,0,W,H);
  var css = getComputedStyle(document.documentElement);
  var accent = (css.getPropertyValue("--accent")||"#22d3ee").trim() || "#22d3ee";
  var muted = (css.getPropertyValue("--muted")||"#888").trim() || "#888";
  var border = (css.getPropertyValue("--border")||"#333").trim() || "#333";
  ctx.font = "11px monospace";
  if (!pts.length) return;
  var ys = pts.map(function(p){ return p.y; });
  var maxY = Math.max.apply(null, ys), minY = Math.min.apply(null, ys);
  if (maxY===minY){ maxY+=2; minY=Math.max(0,minY-2); }
  var span = maxY-minY;
  maxY += span*.1; minY = Math.max(0, minY-span*.1);
  function X(i){ return pts.length===1 ? (padL+(W-padL-padR)/2) : padL + (W-padL-padR)*i/(pts.length-1); }
  function Y(v){ return padT + (H-padT-padB)*(1-(v-minY)/(maxY-minY)); }
  ctx.strokeStyle=border; ctx.fillStyle=muted; ctx.lineWidth=1;
  for (var g=0; g<=4; g++){
    var gv = minY + (maxY-minY)*g/4;
    var gy = Y(gv);
    ctx.beginPath(); ctx.moveTo(padL,gy); ctx.lineTo(W-padR,gy); ctx.stroke();
    ctx.fillText(String(Math.round(gv*10)/10), 4, gy+4);
  }
  ctx.strokeStyle=accent; ctx.lineWidth=2; ctx.beginPath();
  pts.forEach(function(p,i){ var x=X(i), y=Y(p.y); if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y); });
  ctx.stroke();
  ctx.fillStyle=accent;
  pts.forEach(function(p,i){ ctx.beginPath(); ctx.arc(X(i),Y(p.y),3.5,0,Math.PI*2); ctx.fill(); });
  ctx.fillStyle=muted;
  var step = Math.max(1, Math.ceil(pts.length/6));
  pts.forEach(function(p,i){
    if (i%step!==0 && i!==pts.length-1) return;
    ctx.fillText((p.x||"").slice(5), Math.min(Math.max(X(i)-16,padL), W-44), H-8);
  });
}
function drawMeasureChart(c){
  var cv = document.getElementById("ms-chart");
  if (!cv) return;
  var pts = (c.measurements||[]).filter(function(m){ return m.weight; })

    .map(function(m){ return { x:m.date||"", y:m.weight }; });
  if (pts.length >= 2) drawLinePts(cv, pts);
}

function exportReportsCsv(){
  var reports = loadReports();
  if (!reports.length){ toast("Aún no hay reportes de progreso recibidos","warn"); return; }
  var rows = [["cliente","rutina","fecha_sesion","recibido","cumplimiento_pct","sets_completados","sets_totales"]];
  reports.forEach(function(rp){
    rows.push([rp.clientName||"", rp.routineName||"", rp.sessionDate||"", rp.sentAt?new Date(rp.sentAt).toISOString().slice(0,10):"", rp.pct!=null?rp.pct:"", rp.done!=null?rp.done:"", rp.total!=null?rp.total:""]);
  });
  var csv = rows.map(function(r){
    return r.map(function(v){
      v = String(v);
      return (v.indexOf(",")>=0 || v.indexOf('"')>=0) ? '"'+v.replace(/"/g,'""')+'"' : v;
    }).join(",");
  }).join("\n");
  var blob = new Blob(["\ufeff"+csv], { type:"text/csv;charset=utf-8" });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ultrasport19-metricas-"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
  toast("CSV descargado","success");
}
window.exportReportsCsv = exportReportsCsv;

function splitCriteria(text){
  if (!text) return [];
  return String(text).split(/[.;\n]+/).map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 3; });
}
function loadCritState(key){
  try { return JSON.parse(localStorage.getItem(key)||"[]"); } catch(e){ return []; }
}
window.toggleCrit = function(key, idx, val){
  var arr = loadCritState(key);
  arr[idx] = !!val;
  try { localStorage.setItem(key, JSON.stringify(arr)); } catch(e){}
};
function buildCritChecklistHtml(pid, phaseIdx, criteriosText){
  var items = splitCriteria(criteriosText);
  if (!items.length) return "";
  var key = "us19_crit_"+pid+"_"+phaseIdx;
  var stateArr = loadCritState(key);
  var done = 0;
  items.forEach(function(_, i){ if (stateArr[i]) done++; });
  var html = '<div class="crit-list"><div style="display:flex;justify-content:space-between;align-items:center;"><label style="font-size:.72rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;">Checklist de avance</label><span class="text-xs" id="crit-progress-label" style="color:var(--accent);font-family:var(--font-mono);">'+done+'/'+items.length+' cumplidos</span></div>';
  items.forEach(function(it, i){
    html += '<label class="crit-row"><input type="checkbox" class="crit-cb" data-crit-key="'+escapeAttr(key)+'" data-crit-idx="'+i+'"'+(stateArr[i]?' checked':'')+'> <span>'+escapeHtml(it)+'</span></label>';
  });
  html += '</div>';
  return html;
}

/* ============================================================
 * REHAB-CLÍNICO · Capa clínica de prescripción de ejercicio
 * terapéutico (lesiones musculoesqueléticas) — Ultra-Sport 19
 * Todo el dato clínico vive DENTRO del objeto cliente para que
 * sincronice y respalde con el sistema existente sin cambios:
 *   c.rut, c.ficha, c.redFlags, c.evals[], c.painLog[], c.alta
 * ============================================================ */

/* ---------- RUT (identificador definitivo, matching de pagos) ---------- */
function limpiarRut(r){ return String(r||"").replace(/[^0-9kK]/g,"").toUpperCase(); }
function validarRut(r){
  var s = limpiarRut(r);
  if (s.length < 7) return false;
  var cuerpo = s.slice(0,-1), dv = s.slice(-1);
  if (!/^\d+$/.test(cuerpo)) return false;
  var suma = 0, mul = 2;
  for (var i = cuerpo.length-1; i >= 0; i--){
    suma += parseInt(cuerpo[i],10) * mul;
    mul = (mul === 7) ? 2 : mul+1;
  }
  var res = 11 - (suma % 11);
  var dvCalc = (res === 11) ? "0" : (res === 10) ? "K" : String(res);
  return dv === dvCalc;
}
function formatearRut(r){
  var s = limpiarRut(r);
  if (s.length < 2) return r;
  var cuerpo = s.slice(0,-1), dv = s.slice(-1), out = "";
  while (cuerpo.length > 3){ out = "." + cuerpo.slice(-3) + out; cuerpo = cuerpo.slice(0,-3); }
  return cuerpo + out + "-" + dv;
}
window.validarRut = validarRut; window.formatearRut = formatearRut;

/* ---------- Semáforo del dolor ---------- */
/* Verde 0-3: continuar/progresar · Amarillo 4-5: mantener carga · Rojo ≥6: reducir/detener y reevaluar */
function semaforoClass(n){ n = Number(n)||0; return n <= 3 ? "v" : (n <= 5 ? "a" : "r"); }
function semaforoLabel(n){ n = Number(n)||0; return n <= 3 ? "Verde · progresar" : (n <= 5 ? "Amarillo · mantener carga" : "Rojo · reducir / reevaluar"); }
window.semaforoClass = semaforoClass;

/* ============================================================
   BANDEJA CLÍNICA — alertas de seguimiento (offline, sin backend)
   3 reglas sobre datos ya existentes (painLog, redFlags, reevalDate).
   Se calculan al abrir la app y se muestran en el Panel de inicio.
   ============================================================ */
function _rcDaysSince(dateStr){
  if (!dateStr) return null;
  var d = new Date(String(dateStr).slice(0,10) + "T00:00:00");
  if (isNaN(d.getTime())) return null;
  var now = new Date(); now.setHours(0,0,0,0);
  return Math.round((now - d) / 86400000);
}
function _rcWaLink(phone){
  var d = String(phone||"").replace(/[^0-9]/g,"");
  if (!d) return "";
  if (d.length === 9 && d.charAt(0) === "9") d = "56" + d;   // 9 XXXX XXXX -> +56
  else if (d.length === 8) d = "569" + d;                    // fallback fijo antiguo
  return "https://wa.me/" + d;
}
function computeClinicalAlerts(){
  var out = [];
  if (!rehabClinicoOn()) return out;
  var today = new Date().toISOString().slice(0,10);
  for (var i=0;i<state.clients.length;i++){
    var c = state.clients[i];
    if (getClientType(c) !== "rehab") continue;
    if (c.alta && c.alta.fecha) continue; // dado de alta: fuera de seguimiento
    var pains = Array.isArray(c.painLog) ? c.painLog : [];

    // R1 — Pico de dolor (último registro ≥6, o salto ≥3 vs sesión previa)
    if (pains.length){
      var last = pains[pains.length-1];
      var lastMax = Math.max(last.durante||0, last.despues||0);
      var salto = 0;
      if (pains.length >= 2){ var pv = pains[pains.length-2]; salto = lastMax - Math.max(pv.durante||0, pv.despues||0); }
      if (lastMax >= 6 || salto >= 3){
        out.push({ clientId:c.id, name:c.name||"", sev:"alta", icon:"🔴",
          msg:"Dolor "+lastMax+"/10"+(salto>=3?" (↑"+salto+" vs sesión previa)":"")+" · reducir carga / reevaluar",
          phone:c.phone||"" });
      }
    }

    // R2 — Baja adherencia (con protocolo activo y sin registro hace ≥7 días)
    if (c.rehabProtocolId){
      var refDate = pains.length ? pains[pains.length-1].fecha
                    : (c.createdAt ? new Date(c.createdAt).toISOString().slice(0,10) : null);
      var dias = _rcDaysSince(refDate);
      if (dias != null && dias >= 7){
        out.push({ clientId:c.id, name:c.name||"", sev:"media", icon:"⚠",
          msg: (pains.length ? "Sin registro de sesión hace "+dias+" días" : "Protocolo asignado sin ninguna sesión registrada ("+dias+" días)"),
          phone:c.phone||"" });
      }
    }

    // R3 — Derivación / reevaluación pendiente
    if (c.redFlags && c.redFlags.blocked){
      out.push({ clientId:c.id, name:c.name||"", sev:"alta", icon:"🚩",
        msg:"Banderas rojas activas · derivación médica pendiente", phone:c.phone||"" });
    }
    if (c.reevalDate && c.reevalDate <= today){
      out.push({ clientId:c.id, name:c.name||"", sev:"media", icon:"🔁",
        msg:"Reevaluación programada para "+c.reevalDate, phone:c.phone||"" });
    }
  }
  function _rcRank(s){ return s==="alta" ? 0 : (s==="media" ? 1 : 2); }
  out.sort(function(a,b){ return _rcRank(a.sev) - _rcRank(b.sev); });
  return out;
}
window.computeClinicalAlerts = computeClinicalAlerts;

function buildClinicalInboxHtml(){
  if (!rehabClinicoOn()) return "";
  var alerts = computeClinicalAlerts();
  if (!alerts.length) return "";
  var sevCls = { alta:"bad", media:"warn", baja:"ok" };
  var html = '<div class="card" style="margin-top:1.2rem;border-left:3px solid var(--danger);">'
    + '<div class="card-main">'
    + '<div class="card-title">🩺 Bandeja clínica <span class="badge muted">'+alerts.length+'</span></div>'

    + '<div style="display:flex;flex-direction:column;gap:.5rem;margin-top:.6rem;">';
  for (var i=0;i<alerts.length;i++){

      + '<span>'+a.icon+'</span>'

function rcEvalResumen(ev){
  var parts = [];
  if (ev.evaReposo != null || ev.evaActividad != null) parts.push("EVA "+(ev.evaReposo!=null?ev.evaReposo:"—")+"/"+(ev.evaActividad!=null?ev.evaActividad:"—"));
  if (ev.rom && ev.rom.length) parts.push(ev.rom.length+" ROM");
  if (ev.fuerza && ev.fuerza.length) parts.push(ev.fuerza.length+" fuerza");
  if (ev.tests && ev.tests.length) parts.push(ev.tests.length+" tests");
  return parts.join(" · ");
}

/* ---------- Reevaluación comparativa (inicial vs actual) ---------- */
function rcDelta(ini, act, mejorSiSube){
  if (ini == null || act == null || isNaN(ini) || isNaN(act)) return '<span class="rc-eq">—</span>';
  var d = act - ini;
  if (d === 0) return '<span class="rc-eq">= igual</span>';
  var mejora = mejorSiSube ? d > 0 : d < 0;
  var arrow = d > 0 ? "▲" : "▼";
  return '<span class="'+(mejora?"rc-up":"rc-down")+'">'+arrow+' '+(d>0?"+":"")+Math.round(d*10)/10+(mejora?" mejora":" empeora")+'</span>';
}
function danielsNum(v){
  if (v == null || v === "") return null;
  var map = {"0":0,"1":1,"2":2,"3":3,"3+":3.3,"4-":3.7,"4":4,"4+":4.3,"5":5};
  return (v in map) ? map[v] : null;
}
function openReevalCompare(clientId){
  var c = getClient(clientId); if (!c) return;
  var evs = Array.isArray(c.evals) ? c.evals : [];
  if (evs.length < 2){
    toast("Necesitas al menos 2 evaluaciones para comparar (inicial vs actual)","warn");
    if (evs.length < 1) openEvalForm(clientId);
    return;
  }
  var ini = evs[0], act = evs[evs.length-1];
  var body = '<p class="text-sm text-muted" style="margin-bottom:.6rem;">Comparando <strong>'+escapeHtml(ini.fecha)+'</strong> (inicial) vs <strong>'+escapeHtml(act.fecha)+'</strong> (actual) · '+evs.length+' evaluaciones en total.</p>';

  body += '<table class="rc-cmp"><tr><th>Dolor (EVA)</th><th>Inicial</th><th>Actual</th><th>Evolución</th></tr>';
  body += '<tr><td>En reposo</td><td>'+(ini.evaReposo!=null?ini.evaReposo:"—")+'</td><td>'+(act.evaReposo!=null?act.evaReposo:"—")+'</td><td>'+rcDelta(ini.evaReposo, act.evaReposo, false)+'</td></tr>';
  body += '<tr><td>Con actividad</td><td>'+(ini.evaActividad!=null?ini.evaActividad:"—")+'</td><td>'+(act.evaActividad!=null?act.evaActividad:"—")+'</td><td>'+rcDelta(ini.evaActividad, act.evaActividad, false)+'</td></tr></table>';

  function matchList(listIni, listAct, keyFn, valFn, titulo, unidad, mejorSiSube){
    var rows = "";
    for (var i=0;i<listAct.length;i++){
      var a = listAct[i], m = null;
      for (var j=0;j<listIni.length;j++){
        if (keyFn(listIni[j]).toLowerCase() === keyFn(a).toLowerCase()){ m = listIni[j]; break; }
      }
      var vi = m ? valFn(m) : null, va = valFn(a);
      rows += '<tr><td>'+escapeHtml(keyFn(a))+'</td><td>'+(vi!=null?vi+unidad:"—")+'</td><td>'+(va!=null?va+unidad:"—")+'</td><td>'+rcDelta(vi, va, mejorSiSube)+'</td></tr>';
    }
    if (!rows) return "";
    return '<table class="rc-cmp"><tr><th>'+titulo+'</th><th>Inicial</th><th>Actual</th><th>Evolución</th></tr>'+rows+'</table>';
  }
  body += matchList(ini.rom||[], act.rom||[], function(x){ return (x.mov||"")+" ("+(x.lado||"")+")"; }, function(x){ return x.grados; }, "📐 ROM", "°", true);
  body += matchList(ini.fuerza||[], act.fuerza||[], function(x){ return (x.grupo||"")+" ("+(x.lado||"")+")"; }, function(x){ return danielsNum(x.af); }, "💪 Fuerza (Daniels)", "", true);

  if (act.tests && act.tests.length){
    body += '<table class="rc-cmp"><tr><th>🧪 Tests (actual)</th><th>Resultado</th></tr>';
    for (var t=0;t<act.tests.length;t++){
      body += '<tr><td>'+escapeHtml(act.tests[t].nombre)+'</td><td>'+escapeHtml(act.tests[t].res||"")+'</td></tr>';
    }
    body += '</table>';
  }
  body += '<p class="rc-disclaimer">⚕ Criterios de alta sugeridos: dolor EVA ≤2 en actividad, fuerza ≥90% vs lado sano, tests funcionales negativos y retorno a la actividad sin aprensión.</p>';

  openModal({
    title: "🔁 Reevaluación · " + (c.name||""),
    large: true,
    bodyHtml: body,
    footer: [
      { label:"Cerrar", cls:"btn-ghost" },
      { label:"✔ Dar de alta terapéutica", cls:"btn-primary", onClick: function(){ darAltaClinica(clientId); } }
    ]
  });
}
window.openReevalCompare = openReevalCompare;

        + '<button class="btn btn-ghost btn-sm" onclick="deleteEval(\''+clientId+'\',\''+ev.id+'\')" title="Eliminar">🗑</button>'
        + '</span></div>';
    }
  }
  if (pains.length){
    body += '<div class="form-label" style="margin-top:.8rem;">Semáforo del dolor (últimas sesiones)</div>';
    var last = pains.slice(-8).reverse();
    for (var p=0;p<last.length;p++){
      var pl = last[p], mx = Math.max(pl.durante||0, pl.despues||0);
      body += '<div class="rc-painrow"><span class="rc-sem '+semaforoClass(mx)+'"></span><strong>'+escapeHtml(pl.fecha)+'</strong>'
        + '<span>Durante: '+(pl.durante!=null?pl.durante:"—")+'/10 · 24h: '+(pl.despues!=null?pl.despues:"—")+'/10</span>'
        + (pl.notas ? '<span class="text-muted text-xs">'+escapeHtml(pl.notas)+'</span>' : '')
        + '<span class="text-xs" style="margin-left:auto;color:var(--muted);">'+semaforoLabel(mx)+'</span></div>';
    }
  }
  body += '<p class="rc-disclaimer">⚕ Herramienta de apoyo a la prescripción de ejercicio terapéutico. No reemplaza la evaluación clínica presencial ni el diagnóstico médico. El paciente ve solo su protocolo compartido; esta información es interna.</p>';

  openModal({
    title: "🩺 Panel clínico · " + (c.name||"") + (c.rut ? " · " + c.rut : ""),
    large: true,
    bodyHtml: body,
    footer: [{ label:"Cerrar", cls:"btn-ghost" }]
  });
}

/* ---------- Siembra idempotente (no duplica, no toca lo existente) ---------- */
function ensureRehabClinico(){
  var changed = false;
  for (var i=0;i<RC_EJERCICIOS_BASE.length;i++){
    if (!getExercise(RC_EJERCICIOS_BASE[i].id)){ state.exercises.push(RC_EJERCICIOS_BASE[i]); changed = true; }
  }
  var protos = rcProtocolosBase();
  for (var j=0;j<protos.length;j++){
    if (!getProtocol(protos[j].id)){ state.protocols.push(protos[j]); changed = true; }
  }
  for (var k=0;k<state.clients.length;k++){
    var c = state.clients[k];
    if (typeof c.rut === "undefined"){ c.rut = ""; changed = true; }
  }
  if (changed) saveState();
}

var _finData = null;

function _finCachedLoad(){
  if (_finData) return _finData;

function finNormalize(d){
  var out = { clientes:null, ticket:null, ingresos:null, historial:[], mix:[], sinMonto:0 };
  if (d.clientes!=null) out.clientes = Math.round(Number(d.clientes));
  if (d.ticket!=null)   out.ticket   = Math.round(Number(d.ticket));
  if (d.ingresos!=null) out.ingresos = Math.round(Number(d.ingresos));
  if (Array.isArray(d.historial)) out.historial = d.historial.map(function(x){
    return { mes:String(x.mes||x.m||"?"),

function _finLocal(){

  var ingresos = conPrecio.reduce(function(a,c){ return a + (c.planPrice||0); }, 0);
  var ticket = conPrecio.length ? ingresos/conPrecio.length : 0;
  var byPrice = {};
  conPrecio.forEach(function(c){ var p = c.planPrice||0; byPrice[p] = (byPrice[p]||0) + 1; });
  var mix = Object.keys(byPrice).map(function(p){ return { nm:_finCLP(Number(p))+"/mes", p:Number(p), n:byPrice[p] }; });

/* Calcula finanzas reales desde el roster de la Base Unificada (Monto membresía + Plan). */
function finFromRoster(list){
  var activos = list.filter(function(c){ return c.activo !== false; });
  var conMonto = activos.filter(function(c){ return c.monto!=null && Number(c.monto)>0; });
  var ingresos = conMonto.reduce(function(a,c){ return a+(Number(c.monto)||0); }, 0);
  var ticket = conMonto.length ? ingresos/conMonto.length : 0;
  var byPlan = {};
  activos.forEach(function(c){
    var k = (c.plan||"").trim() || "Sin plan";
    if(!byPlan[k]) byPlan[k] = { nm:k, n:0, sum:0, cnt:0 };
    byPlan[k].n++;
    if(c.monto!=null){ byPlan[k].sum += (Number(c.monto)||0); byPlan[k].cnt++; }
  });
  var mix = Object.keys(byPlan).map(function(k){ var b=byPlan[k]; return { nm:b.nm, p:(b.cnt?Math.round(b.sum/b.cnt):0), n:b.n }; });
  mix.sort(function(a,b){ return b.n-a.n; });

}

function finChartSvg(hist, costo){

  var bw = ((W-pad*2)/hist.length)*0.5;

function init(){
  loadSettings();
  if (typeof encRestoreFromCache === "function") encRestoreFromCache();
  loadState();
  runDataFixups();
  ensureRehabClinico(); /* REHAB-CLÍNICO: siembra protocolos base + campo rut */
  showPreviewBannerIfNeeded();

  // Self-heal: when served over http(s), the real location is the source of
  // truth for the base URL. This fixes any stale/typo base URL saved in settings.
  if (location.protocol === "http:" || location.protocol === "https:"){
    var realBase = getAppBaseUrl();
    if (settings.baseUrl !== realBase){
      settings.baseUrl = realBase;
      saveSettings();
    }
    // Y el repo real también manda: corrige nombres desactualizados (ej. repo renombrado).
    var realRepo = getDerivedRepo();
    if (realRepo && settings.githubRepo !== realRepo){
      settings.githubRepo = realRepo;
      saveSettings();
    }
  }

  if (isSyncReady()){
    updateSyncBadge("idle");
  } else {
    updateSyncBadge("off");
  }

  var route = parseHash();
  if (!route){
    showTrainerUI();
    showView("dashboard");
    if (settings.encEnabled && !encUnlocked() && _cryptoOk()){ encPromptUnlock(); }
    if (isSyncReady()){
      syncDownload().then(function(changed){
        if (changed){
          toast("Datos sincronizados desde la nube", "success");
          showView("dashboard"); // re-render with fresh data
        }
      });
    }
    return;
  }

  if (route.kind === "cliente"){
    try {
      var data = decodeShareData(route.payload);
      if (!data || !data.routine) throw new Error("Datos inválidos");
      showClientView(data);
    } catch(e){
      showErrorView("No se pudo decodificar el enlace: " + e.message);
    }
  } else if (route.kind === "progreso"){
    try {
      var data2 = decodeShareData(route.payload);
      if (!data2) throw new Error("Datos inválidos");
      showProgressReport(data2);
    } catch(e){
      showErrorView("No se pudo decodificar el reporte: " + e.message);
    }
  } else if (route.kind === "r"){
    showLoadingView("Descargando rutina compartida...");
    downloadFromCloud(route.payload).then(function(data){
      if (!data || !data.routine) throw new Error("Datos inválidos");
      showClientView(data);
    }).catch(function(err){
      showErrorView("No se pudo descargar la rutina: " + err.message);
    });
  } else if (route.kind === "p"){
    showLoadingView("Descargando reporte...");
    downloadFromCloud(route.payload).then(function(data){
      if (!data) throw new Error("Datos inválidos");
      showProgressReport(data);
    }).catch(function(err){
      showErrorView("No se pudo descargar el reporte: " + err.message);
    });
  }
}

var US19_CATALOGO_URL = "us19_catalogo.json";

function importarCatalogoUS19(){
  var bodyHtml = '<div class="hint" style="margin-bottom:.8rem;">'
    + 'Importa o <strong>repara</strong> los ejercicios con GIF propio. Si un ejercicio ya existe, se le actualiza el GIF y la técnica (no se duplica).</div>'
    + '<div id="cus19-status" style="margin-bottom:.8rem;color:var(--text);">Cargando catálogo��</div>'
    + '<div id="cus19-groups"></div>'
    + '<input type="file" id="cus19-file" accept=".json" style="display:none;">';
  openModal({
    title: "Importar / Reparar Catálogo US19",
    bodyHtml: bodyHtml,
    footer: [
      { label:"Cancelar", cls:"btn-ghost" },
      { label:"Aplicar", cls:"btn-primary", onClick:function(){ _cus19Import(); return true; } }
    ]
  });
  _cus19Data = null;
  fetch(US19_CATALOGO_URL, {cache:"no-store"})
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(_cus19Ready)
    .catch(function(){
      var st = document.getElementById("cus19-status");
      if (!st) return;
      st.innerHTML = 'No se pudo cargar automáticamente. '
        + '<button class="btn btn-secondary btn-sm" onclick="document.getElementById(\'cus19-file\').click()">Elegir us19_catalogo.json</button>';
      var inp = document.getElementById("cus19-file");
      inp.onchange = function(){
        var f = inp.files[0]; if(!f) return;
        var rd = new FileReader();
        rd.onload = function(){ try { _cus19Ready(JSON.parse(rd.result)); } catch(e){ toast("JSON inválido","error"); } };
        rd.readAsText(f);
      };
    });
}

var _cus19Data = null;
function _cus19Ready(data){
  _cus19Data = data || [];
  var st = document.getElementById("cus19-status");
  var gp = document.getElementById("cus19-groups");
  if (!st || !gp) return;
  var idx = {};
  state.exercises.forEach(function(e){ idx[(e.name||"").toLowerCase()] = e; });
  var grupos = {};
  _cus19Data.forEach(function(e){
    var g = e.muscle || "Otro";
    if (!grupos[g]) grupos[g] = { nuevos:0, reparar:0 };
    var ex = idx[(e.name||"").toLowerCase()];
    if (!ex) grupos[g].nuevos++;
    else if (ex.gif !== e.gif) grupos[g].reparar++;
  });
  var nuevos = 0, reparar = 0;
  Object.keys(grupos).forEach(function(k){ nuevos+=grupos[k].nuevos; reparar+=grupos[k].reparar; });
  st.innerHTML = '<strong>'+nuevos+'</strong> nuevos · <strong>'+reparar+'</strong> a reparar (GIF corregido). Elige grupos:';
  var html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.4rem;">';
  Object.keys(grupos).sort().forEach(function(g){
    var tot = grupos[g].nuevos + grupos[g].reparar;
    html += '<label style="display:flex;gap:.45rem;align-items:center;font-size:.85rem;cursor:pointer;">'
      + '<input type="checkbox" class="cus19-g" value="'+escapeAttr(g)+'" checked> '
      + escapeHtml(g)+' <span style="color:var(--text-dim);">('+tot+')</span></label>';
  });
  html += '</div>';
  gp.innerHTML = html;
}

function _cus19Import(){
  if (!_cus19Data){ toast("Catálogo no cargado aún","warning"); return; }
  var sel = {};
  document.querySelectorAll(".cus19-g").forEach(function(b){ if (b.checked) sel[b.value]=true; });
  var idx = {};
  state.exercises.forEach(function(e){ idx[(e.name||"").toLowerCase()] = e; });
  var added = 0, fixed = 0;
  _cus19Data.forEach(function(e){
    if (!sel[e.muscle || "Otro"]) return;
    var key = (e.name||"").toLowerCase();
    var ex = idx[key];
    if (ex){
      // reparar/actualizar existente
      var changed = false;
      if (e.gif && ex.gif !== e.gif){ ex.gif = e.gif; changed = true; }
      if (e.desc && !ex.desc){ ex.desc = e.desc; changed = true; }
      if (e.muscle && !ex.muscle){ ex.muscle = e.muscle; changed = true; }
      if (e.equipment && !ex.equipment){ ex.equipment = e.equipment; changed = true; }
      if (changed) fixed++;
    } else {
      var nuevo = {
        id: e.id || genId(),
        name: e.name || "",
        muscle: e.muscle || "",
        equipment: e.equipment || "",
        desc: e.desc || "",
        gif: e.gif || ""
      };
      state.exercises.push(nuevo);
      idx[key] = nuevo;
      added++;
    }
  });
  saveState();
  closeModal();
  renderLibrary();
  toast(added + " nuevos · " + fixed + " reparados", "success");
}

<script>
(function(){
  "use strict";

  // --- Registro del service worker (no bloquea nada; falla en silencio) ---
  if ("serviceWorker" in navigator &&
      (location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1")){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("sw.js").then(function(reg){
        console.log("US19 SW registrado:", reg.scope);
      }).catch(function(err){
        console.warn("US19 SW no se pudo registrar:", err);
      });
    });
  }

  // --- Botón discreto "Instalar app": solo aparece si el navegador ofrece instalar ---
  var deferredPrompt = null;
  var btn = null;

  function makeButton(){
    if (btn) return btn;
    btn = document.createElement("button");
    btn.type = "button";
    btn.id = "us19-install-btn";
    btn.textContent = "⬇ Instalar app";
    btn.setAttribute("aria-label", "Instalar Ultra-Sport 19");
    var s = btn.style;
    s.position = "fixed"; s.right = "14px"; s.bottom = "14px"; s.zIndex = "9999";
    s.padding = "10px 14px"; s.border = "0"; s.borderRadius = "999px";
    s.background = "#E21C25"; s.color = "#fff";
    s.font = "600 13px/1 system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif";
    s.boxShadow = "0 4px 14px rgba(0,0,0,.35)"; s.cursor = "pointer";
    s.display = "none";
    btn.addEventListener("click", function(){
      if (!deferredPrompt){ hideButton(); return; }
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(){
        deferredPrompt = null;
        hideButton();
      });
    });
    (document.body || document.documentElement).appendChild(btn);
    return btn;
  }
  function showButton(){ makeButton().style.display = "block"; }
  function hideButton(){ if (btn) btn.style.display = "none"; }

  window.addEventListener("beforeinstallprompt", function(e){
    e.preventDefault();     // evita el mini-infobar automático de Chrome
    deferredPrompt = e;
    showButton();           // muestra nuestro botón discreto
  });

  window.addEventListener("appinstalled", function(){
    deferredPrompt = null;
    hideButton();
  });
})();
</script>
</body>
</html>
